<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicago 1893 — Interactive Story V1</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="panel">
          <h2>Case File</h2>
          <div id="objective"></div>
          <div class="case-status-row">
            <span class="label">Status</span>
            <div id="case-status" class="case-status"></div>
          </div>
        </div>

        <div class="panel">
          <h2>Persons of Interest</h2>
          <ul id="npcs"></ul>
        </div>

        <div class="panel">
          <h2>Clues <span id="clue-count" class="clue-count"></span></h2>
          <ul id="clues"></ul>
        </div>
      </aside>

      <main class="main-column">
        <div id="begin-overlay" class="begin-overlay">
          <div class="begin-overlay-inner">
            <h2>Chicago, 1893</h2>
            <p>Shadows gather beneath the White City.</p>
            <button type="button" id="begin-btn" class="begin-btn">Begin Experience</button>
            <span class="begin-note">Enables narration &amp; unlocks audio</span>
          </div>
        </div>

        <header class="hero">
          <div class="hero-title-row">
            <h1>Chicago, 1893</h1>
            <div class="hero-controls">
              <button type="button" id="driving-btn" class="driving-btn" aria-label="Enable driving mode" title="Driving mode">Drive</button>
              <button type="button" id="tts-toggle" class="tts-toggle" aria-label="Enable read-aloud" title="Read aloud: off"></button>
            </div>
          </div>
          <p>Shadows gather beneath the White City.</p>
        </header>

        <section id="story" class="story-feed"></section>

        <div id="tts-bar" class="tts-bar">
          <button type="button" id="tts-stop" class="tts-stop-btn">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true"><polygon points="0,0 10,5 0,10"/></svg>
            Start reading
          </button>
        </div>

        <div id="autotest-bar" class="autotest-bar" hidden>
          <span class="autotest-label">Auto Test running…</span>
          <button type="button" id="autotest-stop-btn" class="autotest-stop-btn">Stop</button>
        </div>

        <section id="choices" class="choices"></section>

        <form id="input-form" class="input-row">
          <div class="input-textarea-wrap">
            <textarea id="player-input" placeholder="Type what you do or say..." rows="3"></textarea>
            <button type="button" id="mic-btn" class="mic-btn" aria-label="Start voice input" title="Voice input">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <rect x="5" y="1" width="6" height="9" rx="3"/>
                <path d="M2.5 8a5.5 5.5 0 0 0 11 0" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
                <line x1="8" y1="13.5" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="5.5" y1="15.5" x2="10.5" y2="15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="input-actions">
            <button type="button" id="notes-btn" class="notes-btn" aria-label="Review case notes" title="Review case notes">Notes</button>
            <button type="button" id="autotest-btn" class="autotest-btn" title="Run automated test script">Auto Test</button>
            <button type="submit">Send</button>
          </div>
        </form>
      </main>
    </div>

    <div id="notes-overlay" class="notes-overlay hidden" role="dialog" aria-modal="true" aria-label="Case notes">
      <div class="notes-panel">
        <div class="notes-panel-header">
          <h2>Case Notes</h2>
          <button type="button" id="notes-close" class="notes-close" aria-label="Close notes">&times;</button>
        </div>
        <div id="notes-content" class="notes-content"></div>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
