<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger 250 — Set New Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a08;
      color: #e8e4da;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      border: 1px solid #2a2a26;
      border-radius: 8px;
      background: #111110;
    }
    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 8px;
    }
    .title {
      font-size: 22px;
      font-weight: 400;
      color: #e8e4da;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a18;
      border: 1px solid #2a2a26;
      border-radius: 4px;
      color: #e8e4da;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #c9a84c; }
    button {
      width: 100%;
      padding: 12px;
      background: #c9a84c;
      color: #0a0a08;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    button:hover { background: #d4b660; }
    button:disabled { background: #444; cursor: not-allowed; }
    .error { font-size: 13px; color: #e05555; margin-top: 16px; display: none; }
    .error.visible { display: block; }
    .success { font-size: 13px; color: #4ade80; margin-top: 16px; display: none; }
    .success.visible { display: block; }
    .invalid { text-align: center; color: #888780; font-size: 14px; }
    .invalid a { color: #c9a84c; text-decoration: none; }
    .invalid a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Ledger 250</div>

    <div id="invalid-state" class="invalid" style="display:none">
      <p>This reset link is invalid or has expired.</p>
      <p style="margin-top:16px"><a href="/admin/login">Back to sign in</a></p>
    </div>

    <div id="reset-state" style="display:none">
      <div class="title">Set new password</div>
      <form id="reset-form">
        <div class="field">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" name="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm" autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" id="save-btn">Set password</button>
        <div class="error" id="reset-error"></div>
        <div class="success" id="reset-success"></div>
      </form>
    </div>
  </div>

  <script>
    // Supabase sends the recovery token in the URL hash as #access_token=...&type=recovery
    const hash = new URLSearchParams(window.location.hash.replace('#', ''))
    const accessToken = hash.get('access_token')
    const type = hash.get('type')

    if (!accessToken || type !== 'recovery') {
      document.getElementById('invalid-state').style.display = 'block'
    } else {
      document.getElementById('reset-state').style.display = 'block'
    }

    document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('save-btn')
      const errorEl = document.getElementById('reset-error')
      const successEl = document.getElementById('reset-success')
      const password = document.getElementById('new-password').value
      const confirm = document.getElementById('confirm-password').value

      errorEl.classList.remove('visible')
      successEl.classList.remove('visible')

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.'
        errorEl.classList.add('visible')
        return
      }
      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.'
        errorEl.classList.add('visible')
        return
      }

      btn.disabled = true
      btn.textContent = 'Saving...'

      try {
        const res = await fetch('/admin/auth/update-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accessToken, password })
        })
        const data = await res.json()

        if (data.success) {
          successEl.textContent = 'Password updated. Redirecting to sign in...'
          successEl.classList.add('visible')
          setTimeout(() => { window.location.href = '/admin/login' }, 2000)
        } else {
          errorEl.textContent = data.error || 'Could not update password.'
          errorEl.classList.add('visible')
          btn.disabled = false
          btn.textContent = 'Set password'
        }
      } catch {
        errorEl.textContent = 'Connection error. Please try again.'
        errorEl.classList.add('visible')
        btn.disabled = false
        btn.textContent = 'Set password'
      }
    })
  </script>
</body>
</html>
