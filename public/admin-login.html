<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger 250 — Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a08;
      color: #e8e4da;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      border: 1px solid #2a2a26;
      border-radius: 8px;
      background: #111110;
    }
    .login-logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 8px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 400;
      color: #e8e4da;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a18;
      border: 1px solid #2a2a26;
      border-radius: 4px;
      color: #e8e4da;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #c9a84c; }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #c9a84c;
      color: #0a0a08;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #d4b660; }
    .btn-primary:disabled { background: #444; cursor: not-allowed; }
    .btn-ghost {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #888780;
      border: 1px solid #2a2a26;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 10px;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: #e8e4da; border-color: #444; }
    .btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      font-size: 13px;
      color: #e05555;
      margin-top: 16px;
      display: none;
    }
    .error.visible { display: block; }
    .success {
      font-size: 13px;
      color: #4ade80;
      margin-top: 16px;
      display: none;
    }
    .success.visible { display: block; }
    .back-link {
      font-size: 12px;
      color: #c9a84c;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-top: 20px;
      display: block;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .back-link:hover { text-decoration: underline; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Ledger 250</div>

    <!-- Login panel -->
    <div id="panel-login" class="panel active">
      <div class="login-title">Admin access</div>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
        <button type="button" class="btn-ghost" onclick="showPanel('forgot')">Forgot password</button>
        <div class="error" id="login-error"></div>
      </form>
    </div>

    <!-- Forgot password panel -->
    <div id="panel-forgot" class="panel">
      <div class="login-title">Reset password</div>
      <form id="forgot-form">
        <div class="field">
          <label for="reset-email">Email</label>
          <input type="email" id="reset-email" name="email" autocomplete="email" required>
        </div>
        <button type="submit" class="btn-primary" id="reset-btn">Send reset link</button>
        <div class="error" id="forgot-error"></div>
        <div class="success" id="forgot-success"></div>
      </form>
      <button class="back-link" onclick="showPanel('login')">← Back to sign in</button>
    </div>
  </div>

  <script>
    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      document.getElementById('panel-' + name).classList.add('active')
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('login-btn')
      const errorEl = document.getElementById('login-error')

      btn.disabled = true
      btn.textContent = 'Signing in...'
      errorEl.classList.remove('visible')

      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      try {
        const res = await fetch('/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        const data = await res.json()

        if (data.success) {
          window.location.href = data.redirect || '/admin'
        } else {
          errorEl.textContent = data.error || 'Invalid email or password.'
          errorEl.classList.add('visible')
          btn.disabled = false
          btn.textContent = 'Sign in'
        }
      } catch {
        errorEl.textContent = 'Connection error. Please try again.'
        errorEl.classList.add('visible')
        btn.disabled = false
        btn.textContent = 'Sign in'
      }
    })

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('reset-btn')
      const errorEl = document.getElementById('forgot-error')
      const successEl = document.getElementById('forgot-success')

      btn.disabled = true
      btn.textContent = 'Sending...'
      errorEl.classList.remove('visible')
      successEl.classList.remove('visible')

      const email = document.getElementById('reset-email').value.trim()

      try {
        const res = await fetch('/admin/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        })
        const data = await res.json()

        if (data.success) {
          successEl.textContent = 'Reset link sent — check your email.'
          successEl.classList.add('visible')
          btn.textContent = 'Sent'
        } else {
          errorEl.textContent = data.error || 'Could not send reset email.'
          errorEl.classList.add('visible')
          btn.disabled = false
          btn.textContent = 'Send reset link'
        }
      } catch {
        errorEl.textContent = 'Connection error. Please try again.'
        errorEl.classList.add('visible')
        btn.disabled = false
        btn.textContent = 'Send reset link'
      }
    })
  </script>
</body>
</html>
