<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1610">
<title>Interactive Stories</title>
<style>
:root {
  --bg:          #1a1610;
  --card:        #221e14;
  --card-hover:  #2a251a;
  --border:      #3a3020;
  --text:        #f6e9c8;
  --text-soft:   #9a8f7a;
  --muted:       #6a6050;
  --accent:      #c9993a;
  --accent-dim:  rgba(201,153,58,0.12);
  --accent-ring: rgba(201,153,58,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────────────────────────────────────── */
.site-header {
  padding: 48px 24px 28px;
  text-align: center;
}
.site-eyebrow {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.site-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}
.site-tagline {
  font-size: 0.9rem;
  color: var(--text-soft);
  line-height: 1.5;
}
.header-rule {
  width: 40px;
  height: 1px;
  background: var(--border);
  margin: 24px auto 0;
}

/* ── Story list ─────────────────────────────────────────────────────── */
.stories {
  max-width: 560px;
  margin: 28px auto 0;
  padding: 0 16px 64px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Story card ─────────────────────────────────────────────────────── */
.story-card {
  display: block;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 20px 18px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.18s, background 0.18s, transform 0.12s;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
.story-card:hover {
  border-color: var(--accent);
  background: var(--card-hover);
}
.story-card:active {
  transform: scale(0.985);
}
.story-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.story-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.story-time {
  flex-shrink: 0;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-ring);
  border-radius: 999px;
  padding: 3px 10px;
  white-space: nowrap;
  margin-top: 2px;
}
.story-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.story-tag {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-soft);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 2px 9px;
}
.story-desc {
  font-size: 0.88rem;
  color: var(--text-soft);
  line-height: 1.65;
}
.story-cta {
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
  font-family: system-ui, sans-serif;
}
.cta-arrow {
  display: inline-block;
  transition: transform 0.18s;
}
.story-card:hover .cta-arrow { transform: translateX(4px); }

/* ── States ─────────────────────────────────────────────────────────── */
.state-msg {
  text-align: center;
  padding: 60px 0;
  color: var(--muted);
  font-size: 0.9rem;
  font-family: system-ui, sans-serif;
}
.spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="site-header">
  <p class="site-eyebrow">Interactive Fiction</p>
  <h1 class="site-title">Choose Your Story</h1>
  <p class="site-tagline">Step into history. Every decision shapes what happens next.</p>
  <div class="header-rule"></div>
</header>

<main class="stories" id="stories">
  <div class="state-msg">
    <div class="spinner"></div>
    Loading stories…
  </div>
</main>

<script>
async function load() {
  const el = document.getElementById('stories');
  try {
    const res = await fetch('/game/api/scenarios');
    if (!res.ok) throw new Error(res.status);
    const scenarios = await res.json();

    if (!scenarios.length) {
      el.innerHTML = '<p class="state-msg">No stories available yet — check back soon.</p>';
      return;
    }

    el.innerHTML = scenarios.map(s => {
      const tags  = (s.genre || []).map(g => `<span class="story-tag">${g}</span>`).join('');
      const time  = s.sessionTargetMinutes ? `<span class="story-time">${s.sessionTargetMinutes} min</span>` : '';
      const url   = `/game?scenarioId=${encodeURIComponent(s.id)}`;
      const title = s.title
        ? s.title.charAt(0).toUpperCase() + s.title.slice(1)
        : s.id;
      return `
        <a class="story-card" href="${url}">
          <div class="story-card-top">
            <h2 class="story-title">${title}</h2>
            ${time}
          </div>
          ${tags ? `<div class="story-tags">${tags}</div>` : ''}
          <p class="story-desc">${s.description || ''}</p>
          <div class="story-cta">Begin investigation <span class="cta-arrow">→</span></div>
        </a>`;
    }).join('');
  } catch (err) {
    el.innerHTML = '<p class="state-msg">Could not load stories. Please try again.</p>';
    console.error('[landing] failed to load scenarios:', err);
  }
}

load();
</script>
</body>
</html>
