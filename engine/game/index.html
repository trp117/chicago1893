  closeBtn.type = 'button';
  closeBtn.className = 'intro-panel-close';
  closeBtn.textContent = 'Close ↑';
  content.appendChild(closeBtn);

  wrap.appendChild(toggle);
  wrap.appendChild(content);
  return wrap;
}

function bindIntroPanelToggle(panelEl) {
  const toggle  = panelEl.querySelector('.intro-panel-toggle');
  const content = panelEl.querySelector('.intro-panel-content');
  const close   = panelEl.querySelector('.intro-panel-close');
  const arrow   = panelEl.querySelector('.intro-panel-arrow');
  if (!toggle || !content) return;

  toggle.addEventListener('click', () => {
    const isOpen = !content.hidden;
    content.hidden = isOpen;
    toggle.setAttribute('aria-expanded', String(!isOpen));
    if (arrow) arrow.textContent = isOpen ? '↓' : '↑';
    if (!isOpen) content.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  close?.addEventListener('click', () => {
    content.hidden = true;
    toggle.setAttribute('aria-expanded', 'false');
    if (arrow) arrow.textContent = '↓';
    toggle.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function getScenarioTagline(sc, arc) {
  const premise = sc.premise?.trim() || arc?.premise?.trim() || '';
  if (premise.length > 20) return premise;
  return sc.tagline?.trim() || sc.setting?.trim() || '';
}

function renderStreamlinedScreen1() {
  const roleOverlay    = document.getElementById('role-overlay');
  const roleCardsEl    = document.getElementById('role-cards');
  const overlayTitleEl = document.getElementById('overlay-title');
  const overlayTagline = document.getElementById('overlay-tagline');
  const overlayDesc    = document.getElementById('overlay-desc');
  const overlayObj     = document.getElementById('overlay-objective');
  const beginBtn       = document.getElementById('role-begin-btn');

  // CSS class enables tagline + always-visible card descriptions on mobile
  roleOverlay.classList.add('sl-onboard');

  if (overlayTitleEl) overlayTitleEl.textContent = scenario.title || 'Investigation';

  if (overlayTagline) overlayTagline.textContent = getScenarioTagline(scenario);

  // No multi-paragraph description on this screen — tagline carries the premise
  if (overlayDesc) overlayDesc.innerHTML = '';
  if (overlayObj) overlayObj.style.display = 'none';

  // No Enter button — tapping a role card is the action that advances
  if (beginBtn) beginBtn.style.display = 'none';

  // Remove intro zone / style zone / section label left from a previous call (e.g., restart)
  roleOverlay.querySelectorAll('.intro-zone, .style-zone, .role-section-label').forEach(el => el.remove());

  // Gather intro section texts
  const introSections = scenario.introduction?.sections || [];
  const worldText  = introSections.find(s => s.type === 'world')?.text  || '';
  const stakesText = introSections.find(s => s.type === 'stakes')?.text || '';
  const sceneText  = introSections.find(s => s.type === 'scene')?.text  || '';
  const hasIntro = !!(worldText || stakesText || sceneText);

  // Introduction zone — ruled, centered link, panel expands inside
  if (hasIntro) {
    const introZone = document.createElement('div');
    introZone.className = 'intro-zone';

    const introToggle = document.createElement('button');
    introToggle.type = 'button';
    introToggle.className = 'intro-panel-toggle';
    introToggle.setAttribute('aria-expanded', 'false');
    introToggle.appendChild(document.createTextNode('Read the full historical introduction '));
    const arrow = document.createElement('span');
    arrow.className = 'intro-panel-arrow';
    arrow.textContent = '↓';
    introToggle.appendChild(arrow);
    introZone.appendChild(introToggle);

    const introContent = document.createElement('div');
    introContent.className = 'intro-panel-content';
    introContent.hidden = true;

    const introNarrationText = [worldText, stakesText, sceneText].filter(Boolean).join(' ');

    // Listen button FIRST — visible immediately on panel open
    const listenBar  = document.createElement('div');
    listenBar.className = 'intro-listen-bar';
    const listenBtn  = document.createElement('button');
    listenBtn.type   = 'button';
    listenBtn.className = 'intro-listen-btn';
    listenBtn.setAttribute('aria-label', 'Listen to historical introduction');
    const listenIcon  = document.createElement('span');
    listenIcon.className = 'intro-listen-icon';
    listenIcon.textContent = '🔊';
    const listenLabel = document.createElement('span');
    listenLabel.className = 'intro-listen-label';
    listenLabel.textContent = 'Listen';
    listenBtn.appendChild(listenIcon);
    listenBtn.appendChild(listenLabel);
    listenBar.appendChild(listenBtn);
    introContent.appendChild(listenBar);

    // Prose paragraphs after
    for (const txt of [worldText, stakesText, sceneText].filter(Boolean)) {
      const p = document.createElement('p');
      p.className = 'intro-panel-text';
      p.textContent = txt;
      introContent.appendChild(p);
    }

    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'intro-panel-close';
    closeBtn.textContent = 'Close ↑';
    introContent.appendChild(closeBtn);
    introZone.appendChild(introContent);

    // Listen button state
    let isNarrating = false;
    let loadingCheckInterval = null;
    let loadingTimeoutId = null;

    const cancelLoading = () => {
      if (loadingCheckInterval) { clearInterval(loadingCheckInterval); loadingCheckInterval = null; }
      if (loadingTimeoutId)     { clearTimeout(loadingTimeoutId);     loadingTimeoutId     = null; }
    };

    const resetListenBtn = () => {
      isNarrating = false;
      cancelLoading();
      listenBtn.classList.remove('intro-listen-loading');
      listenBtn.disabled = false;
      listenIcon.textContent = '🔊';
      listenLabel.textContent = 'Listen';
    };

    listenBtn.addEventListener('click', () => {
      if (isNarrating) {
        ttsStop();
        resetListenBtn();
        return;
      }
      // Initialize audio element if not yet unlocked (Listen tap is a user gesture)
      if (!audioEl) {
        audioUnlocked = true;
        audioEl = new Audio();
        audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAIARKwAABCxAgAEABAAZGF0YQAAAAA=';
        audioEl.play().catch(() => {});
        updateTtsToggleUI();
        updateTtsBarUI();
      }

      // Show loading state immediately
      listenIcon.textContent = '';
      listenLabel.textContent = '';
      listenBtn.classList.add('intro-listen-loading');
      listenBtn.disabled = true;

      // Start narration (bypasses ttsEnabled check)
      const wasEnabled = ttsEnabled;
      if (!wasEnabled) setTtsEnabled(true);
      ttsSpeak(introNarrationText, null).finally(() => {
        if (!wasEnabled) setTtsEnabled(false);
      });

      // Poll until audio element is playing
      loadingCheckInterval = setInterval(() => {
        if (audioEl && !audioEl.paused) {
          cancelLoading();
          listenBtn.classList.remove('intro-listen-loading');
          listenBtn.disabled = false;
          listenIcon.textContent = '⏹';
          listenLabel.textContent = 'Stop';
          isNarrating = true;
          // Reset when audio ends naturally
          audioEl.addEventListener('ended', function onEnd() {
            if (isNarrating) resetListenBtn();
            audioEl?.removeEventListener('ended', onEnd);
          });
        }
      }, 100);

      // Safety timeout — reset if audio never starts within 8 seconds
      loadingTimeoutId = setTimeout(() => {
        cancelLoading();
        if (!isNarrating) resetListenBtn();
      }, 8000);
    });

    introToggle.addEventListener('click', () => {
      const isOpen = !introContent.hidden;
      introContent.hidden = isOpen;
      introToggle.setAttribute('aria-expanded', String(!isOpen));
      arrow.textContent = isOpen ? '↓' : '↑';
      if (!isOpen) {
        setTimeout(() => {
          listenBar.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    });
    closeBtn.addEventListener('click', () => {
      ttsStop();
      resetListenBtn();
      introContent.hidden = true;
      introToggle.setAttribute('aria-expanded', 'false');
      arrow.textContent = '↓';
      introToggle.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    roleCardsEl.insertAdjacentElement('beforebegin', introZone);
  }

  // Style zone — centered pill buttons, outside the ruled zone
  const styleZone = document.createElement('div');
  styleZone.className = 'style-zone';
  const styleOptions = document.createElement('div');
  styleOptions.className = 'narrative-style-options';
  for (const { value, label } of [{ value: 'focused', label: 'Focused' }, { value: 'cinematic', label: 'Cinematic' }]) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ns-btn' + (value === 'focused' ? ' active' : '');
    btn.dataset.style = value;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      styleOptions.querySelectorAll('.ns-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    styleOptions.appendChild(btn);
  }
  styleZone.appendChild(styleOptions);
  roleCardsEl.insertAdjacentElement('beforebegin', styleZone);

  // Section label sits directly above the first role card
  const sectionLabel = document.createElement('p');
  sectionLabel.className = 'role-section-label';
  sectionLabel.textContent = 'Select a role to begin.';
  roleCardsEl.insertAdjacentElement('beforebegin', sectionLabel);
  roleCardsEl.innerHTML = '';
  for (const role of scenario.playerRoleOptions || []) {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'role-card';
    card.innerHTML = `<span class="role-card-name">${getCardDisplayName(role)}</span><span class="role-card-desc">${role.description || ''}</span>`;
    card.addEventListener('click', () => {
      ttsStop(); // stop any intro panel narration in progress
      audioUnlocked = true;
      audioEl = new Audio();
      audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAIARKwAABCxAgAEABAAZGF0YQAAAAA=';
      audioEl.play().catch(() => {});
      updateTtsToggleUI();
      updateTtsBarUI();
      roleOverlay.classList.add('hidden');

      const selectedStyle = document.querySelector('.ns-btn.active')?.dataset.style || 'focused';
      const hooks        = Array.isArray(role.character_hooks) ? role.character_hooks.filter(Boolean) : [];
      const hookIndex    = hooks.length > 0 ? Math.floor(Math.random() * hooks.length) : -1;
      const activeHook   = hookIndex >= 0 ? hooks[hookIndex] : null;
      const baseBriefing = typeof role.briefing === 'string' && role.briefing.trim()
        ? role.briefing.trim() : (role.description || '');
      const characterContext = activeHook ? `${baseBriefing} ${activeHook}` : baseBriefing;

      // Pre-warm /start the moment a role is tapped — same pattern as original flow
      warmStart = {
        roleId: role.id,
        style:  selectedStyle,
        activeHook,
        characterContext,
        promise: fetch(`${API_BASE}/start`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            scenarioId:        scenario.id,
            roleId:            role.id,
            narrativeStyle:    selectedStyle,
            character_context: characterContext,
            player_addition:   null,
            active_hook:       activeHook,
            ttsEnabled,
            onboardingFlow:    'streamlined',
          }),
        }),
      };

      renderStreamlinedScreen2(role, selectedStyle, activeHook, characterContext);
    });
    roleCardsEl.appendChild(card);
  }

  roleOverlay.classList.remove('hidden');
}

function buildCharacterHeader(role) {
  const realName = role.real_name?.trim() || null;
  const fullName  = role.name?.trim() || role.display_name?.trim() || '';

  if (realName) {
    // Strip the embedded real name from the combined role.name string
    const parts = fullName.split(/\s*[—–]\s*/);
    const roleTitle = parts.find(p => p.trim().toLowerCase() !== realName.toLowerCase())?.trim() || fullName;
    return `${realName} — ${roleTitle}`;
  }

  // No explicit real_name — if role.name is "ROLE — REAL NAME", reverse it
  const dashMatch = fullName.match(/^(.+?)\s*[—–]\s*(.+)$/);
  if (dashMatch) return `${dashMatch[2].trim()} — ${dashMatch[1].trim()}`;

  // Pure role title, no real name
  return fullName;
}

function renderStreamlinedScreen2(role, narrativeStyle, activeHook, characterContext) {
  const overlay    = document.getElementById('intro-overlay');
  const titleEl    = document.getElementById('intro-title');
  const sectionsEl = document.getElementById('intro-sections');
  const skipBtn    = document.getElementById('intro-skip-btn');

  // Label the action button "Enter" instead of "Continue"
  const beginBtnEl = document.getElementById('intro-begin-btn');
  if (beginBtnEl) beginBtnEl.textContent = 'Enter';

  // Tighten Screen 2 layout: remove section bottom padding, apply ruled separator to footer
  sectionsEl.classList.add('streamlined-screen2-content');
  const footerEl = document.getElementById('intro-overlay').querySelector('.intro-footer');
  if (footerEl) footerEl.classList.add('intro-begin-actions');

  // Collect character texts: bridge → context → entry (same logic as showIntroScene)
  const bridgeSentence = (role.bridge_sentence || '').replace(/^\[DRAFT\]\s*/i, '').trim();
  const charTexts = [];
  if (bridgeSentence) charTexts.push({ text: bridgeSentence, isBridge: true });
  if (role.context_sentence?.trim()) charTexts.push({ text: role.context_sentence.trim(), isContext: true });
  for (const section of (scenario.introduction?.sections || [])) {
    if (!section.character_entries) continue;
    const text = section.character_entries[role.id] || Object.values(section.character_entries)[0] || '';
    if (text.trim()) charTexts.push({ text: text.trim() });
  }

  function buildContent() {
    const paragraphs = [], texts = [];
    charTexts.forEach(({ text, isBridge, isContext }) => {
      const p = document.createElement('p');
      const semantic = isBridge ? 'bridge-sentence' : isContext ? 'context-sentence' : 'entry-paragraph';
      p.className = `intro-section ${semantic}`;
      p.style.opacity = '1';
      p.style.animation = 'none';
      p.textContent = text;
      paragraphs.push(p);
      texts.push(text);
    });
    return { paragraphs, texts };
  }

  function onContinue() {
    overlay.classList.add('hidden');
    startGame(role.id, narrativeStyle, {
      character_context: characterContext,
      player_addition:   null,
      active_hook:       activeHook,
    });
  }

  if (!charTexts.length) { onContinue(); return; }

  _buildIntroScreen({
    overlay, titleEl, sectionsEl, skipBtn,
    titleClass: 'intro-role-header',
    titleText:  buildCharacterHeader(role),
    buildContent,
    onContinue,
    showSkip: false,
    logTag:   'streamlined-screen2',
  });
}

// ── Introduction screens ──────────────────────────────────────────────────────

function initProgressiveReveal(sectionsEl) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { root: sectionsEl, threshold: 0.1 });
  sectionsEl.querySelectorAll('.intro-paragraph').forEach(p => {
    p.classList.add('fade-in');
    observer.observe(p);
  });
}

function initScrollContinue(sectionsEl, continueBtn) {
  continueBtn.style.opacity = '0';
  continueBtn.style.pointerEvents = 'none';
  continueBtn.style.transition = 'opacity 0.4s ease';
  function checkScroll() {
    const scrollBottom = sectionsEl.scrollTop + sectionsEl.clientHeight;
    const contentBottom = sectionsEl.scrollHeight - 100;
    if (scrollBottom >= contentBottom) {
      continueBtn.style.opacity = '1';
      continueBtn.style.pointerEvents = 'auto';
      sectionsEl.removeEventListener('scroll', checkScroll);
    }
  }
  sectionsEl.addEventListener('scroll', checkScroll);
  checkScroll();
}

// Shared TTS+teleprompter helper used by both intro screens
function _buildIntroScreen({ overlay, titleEl, sectionsEl, skipBtn, titleClass, titleText,
                              buildContent, onContinue, showSkip, logTag, onReveal }) {
  titleEl.className = titleClass;
  titleEl.textContent = titleText;

  // Reset screen-specific classes added by renderStreamlinedScreen2
  sectionsEl.classList.remove('streamlined-screen2-content');
  overlay.querySelector('.intro-footer')?.classList.remove('intro-begin-actions');

  const { paragraphs, texts } = buildContent();

  function revealText() {
    sectionsEl.innerHTML = '';
    for (const el of paragraphs) sectionsEl.appendChild(el);
    sectionsEl.scrollTop = 0;
    if (onReveal) onReveal(paragraphs);
  }

  sectionsEl.innerHTML = '';
  sectionsEl.scrollTop = 0;
  skipBtn.style.display = showSkip ? '' : 'none';
  overlay.classList.remove('hidden');

  const oldTtsBtn = document.getElementById('intro-tts-btn');
  const ttsBtnEl  = oldTtsBtn.cloneNode(false);
  oldTtsBtn.replaceWith(ttsBtnEl);

  function syncTtsBtn() {
    const label = ttsEnabled ? 'Narration on' : 'Narration off';
    ttsBtnEl.innerHTML = `<span>🔊</span><span>${label}</span>`;
    ttsBtnEl.classList.toggle('active', ttsEnabled);
    ttsBtnEl.setAttribute('aria-label', ttsEnabled ? 'Disable narration' : 'Enable narration');
  }
  syncTtsBtn();

  function startTeleprompter() {
    cancelAnimationFrame(teleprompterRafId);
    if (!audioEl || !audioEl.duration || !isFinite(audioEl.duration)) return;
    const scrollDist = sectionsEl.scrollHeight - sectionsEl.clientHeight;
    if (scrollDist <= 0) return;
    const dur = audioEl.duration;
    function tick() {
      if (!audioEl || audioEl.paused || audioEl.ended) { teleprompterRafId = null; return; }
      sectionsEl.scrollTop = (audioEl.currentTime / dur) * scrollDist;
      teleprompterRafId = requestAnimationFrame(tick);
    }
    teleprompterRafId = requestAnimationFrame(tick);
  }

  async function loadAndPlay() {
    if (!texts.length || !audioUnlocked || !ttsEnabled) { revealText(); return; }
    sectionsEl.innerHTML = '<div class="intro-loading"><span></span><span></span><span></span></div>';
    try {
      ttsStop();
      const body = { text: texts.join('\n\n') };
      if (ttsNarrationSpeed !== 1.0) body.narrative_speed = ttsNarrationSpeed;
      const resp = await fetch(`${API_BASE}/tts`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) { revealText(); ttsSpeakFallback(texts.join('\n\n')); return; }
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      audioEl.src = url;
      audioEl.playbackRate = 1.0;
      audioEl.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
      audioEl.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; revealText(); ttsSpeakFallback(texts.join('\n\n')); };
      currentAudio = audioEl;
      if (audioEl.readyState < 2) {
        await new Promise(res => audioEl.addEventListener('canplay', res, { once: true }));
      }
      revealText();
      try { await audioEl.play(); } catch {}
      startTeleprompter();
    } catch (e) {
      console.warn(`[TTS] ${logTag} load failed`, e);
      revealText();
    }
  }

  loadAndPlay();

  ttsBtnEl.addEventListener('click', () => {
    setTtsEnabled(!ttsEnabled);
    if (!ttsEnabled) {
      ttsStop();
      if (sectionsEl.querySelector('.intro-loading')) revealText();
    } else {
      loadAndPlay();
    }
    syncTtsBtn();
    updateTtsToggleUI();
    updateTtsBarUI();
  });

  const oldBegin = document.getElementById('intro-begin-btn');
  const newBegin = oldBegin.cloneNode(true);
  oldBegin.replaceWith(newBegin);
  newBegin.addEventListener('click', () => { ttsStop(); onContinue(); });

  if (showSkip) {
    const oldSkip = document.getElementById('intro-skip-btn');
    const newSkip = oldSkip.cloneNode(true);
    oldSkip.replaceWith(newSkip);
    newSkip.addEventListener('click', () => { ttsStop(); onContinue(); });
  }
}

function showWorldIntro() {
  const overlay    = document.getElementById('intro-overlay');
  const titleEl    = document.getElementById('intro-title');
  const sectionsEl = document.getElementById('intro-sections');
  const skipBtn    = document.getElementById('intro-skip-btn');

  // Screen 2 shows world + stakes + scene — all non-character-entry sections
  const worldSections = (scenario.introduction?.sections || []).filter(
    s => !s.character_entries && s.text?.trim()
  );

  function buildContent() {
    const paragraphs = [], texts = [];
    for (const section of worldSections) {
      const p = document.createElement('p');
      p.className = 'intro-section intro-paragraph';
      p.textContent = section.text;
      paragraphs.push(p);
      texts.push(section.text);
    }
    return { paragraphs, texts };
  }

  function onContinue() {
    markWorldIntroSeen();
    overlay.classList.add('hidden');
    document.getElementById('role-overlay').classList.remove('hidden');
    showRoleSelection();
  }

  if (!worldSections.length) { onContinue(); return; }

  function onReveal() {
    if (window.innerWidth >= 640) return;
    initProgressiveReveal(sectionsEl);
    requestAnimationFrame(() => {
      initScrollContinue(sectionsEl, document.getElementById('intro-begin-btn'));
    });
  }

  _buildIntroScreen({
    overlay, titleEl, sectionsEl, skipBtn,
    titleClass: 'intro-header-title',

    buildContent,
    onContinue,
    onReveal,

// Screen 3 — Character entry only (bridge sentence + context sentence + entry prose)
function showIntroScene(scenario, role, activeHook, characterContext) {
  const overlay    = document.getElementById('intro-overlay');
  const titleEl    = document.getElementById('intro-title');
  const sectionsEl = document.getElementById('intro-sections');
  const skipBtn    = document.getElementById('intro-skip-btn');

  // Collect character entry texts in order: bridge → context → entry
  const bridgeSentence = (role.bridge_sentence || '').replace(/^\[DRAFT\]\s*/i, '').trim();
  const charTexts = [];
  if (bridgeSentence) charTexts.push({ text: bridgeSentence, isBridge: true });
  if (role.context_sentence?.trim()) charTexts.push({ text: role.context_sentence.trim(), isContext: true });
  for (const section of (scenario.introduction?.sections || [])) {
    if (!section.character_entries) continue;
    const text = section.character_entries[role.id] || Object.values(section.character_entries)[0] || '';
    if (text.trim()) charTexts.push({ text: text.trim() });
  }

  function buildContent() {
    const paragraphs = [], texts = [];
    charTexts.forEach(({ text, isBridge, isContext }) => {
      const p = document.createElement('p');
      const semantic = isBridge ? 'bridge-sentence' : isContext ? 'context-sentence' : 'entry-paragraph';
      p.className = `intro-section ${semantic}`;
      p.style.opacity = '1';
      p.style.animation = 'none';
      p.textContent = text;
      paragraphs.push(p);
      texts.push(text);
    });
    return { paragraphs, texts };
  }

  function onContinue() {
    overlay.classList.add('hidden');
    startGame(role.id, 'focused', {
      character_context: characterContext,
      player_addition:   null,
      active_hook:       activeHook,
    });
  }

  if (!charTexts.length) { onContinue(); return; }

  _buildIntroScreen({
    overlay, titleEl, sectionsEl, skipBtn,
    titleClass: 'intro-role-header',
    titleText:  buildCharacterHeader(role),
    buildContent,
    onContinue,
    showSkip: true,
    logTag: 'intro-scene',
  });
}

}

// ── Start game ────────────────────────────────────────────────────────────────

async function startGame(roleId, narrativeStyle, briefingContext = {}) {
  const role = (scenario.playerRoleOptions || []).find(r => r.id === roleId);
  if (!role) return;

  currentRoleId = roleId;
  applyFreeInputMode(scenario.allow_free_input !== false);

  // Temporary local state so the sidebar is visible while /start is in flight
  gameState = buildClientInitialState(scenario, role);
  gameState.narrativeStyle = narrativeStyle || 'focused';
  gameState.onboardingFlow = USE_STREAMLINED_ONBOARDING ? 'streamlined' : 'standard';

  sessionId = crypto.randomUUID();
  conversationHistory = [];
  locationFeed   = [];
  feedLocationId = null;
  pendingEntryEl = null;
  locationShowing = false;
  lastChoices = [];

  const h1 = document.getElementById('header-title');
  if (h1) h1.textContent = scenario.title || 'Investigation';

  document.querySelector('header.hero').classList.add('game-active');
  renderSidebar();
  updateLocationDisplay(gameState.location);

  // Hide choices area and show streaming dots while opening generates
  scrollHintEl.classList.remove('visible');
  choicesAreaWrapEl.classList.add('hidden');
  streamOptionsDots.classList.remove('hidden');
  submitBtn.disabled = true;

  // Show thinking dots while waiting for first chunk
  const loadingEl = document.createElement('div');
  loadingEl.className = 'feed-entry';
  const dotsEl = document.createElement('div');
  dotsEl.className = 'thinking-dots';
  dotsEl.innerHTML = '<span></span><span></span><span></span>';
  loadingEl.appendChild(dotsEl);
  feedAppend(loadingEl);
  feedScrollTop(loadingEl);

  let openingOutput, openingNextState;
  try {
    // Use pre-warmed response if it matches this request and no player_addition was added
    const canUseWarm = warmStart
      && warmStart.roleId  === roleId
      && warmStart.style   === gameState.narrativeStyle
      && !briefingContext.player_addition;
    const startResp = canUseWarm
      ? await warmStart.promise
      : await fetch(`${API_BASE}/start`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            scenarioId:        scenario.id,
            roleId,
            narrativeStyle:    gameState.narrativeStyle,
            character_context: briefingContext.character_context || null,
            player_addition:   briefingContext.player_addition   || null,
            active_hook:       briefingContext.active_hook       || null,
            ttsEnabled,
            onboardingFlow:    USE_STREAMLINED_ONBOARDING ? 'streamlined' : 'standard',
          }),
        });
    warmStart = null;

    // Consume SSE stream — identical pattern to submitTurn
    let streamEl     = null;
    let streamBuffer = '';
    const sseReader  = startResp.body.getReader();
    const sseDecoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const { done, value } = await sseReader.read();
      if (done) break;
      sseBuffer += sseDecoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        if (evt.type === 'chunk') {
          if (!streamEl) {
            dotsEl.remove();
            streamEl = document.createElement('div');
            streamEl.className = 'scene-card';
            loadingEl.appendChild(streamEl);
            feedScrollTop(streamEl);
          }
          streamBuffer += evt.text;
          streamEl.innerHTML = '<p>' + streamBuffer.replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
        } else if (evt.type === 'done') {
          openingOutput    = evt.output;
          openingNextState = evt.nextState;
        } else if (evt.type === 'error') {
          throw new Error(evt.error || '/start SSE error');
        }
      }
    }

    if (!openingOutput || !openingNextState) throw new Error('No opening data received');

  } catch (err) {
    warmStart = null;
    loadingEl.remove();
    streamOptionsDots.classList.add('hidden');
    choicesAreaWrapEl.classList.remove('hidden');
    submitBtn.disabled = false;
    console.error('[START]', err);
    const fallback = role.opening?.narrative
      ? role.opening
      : { narrative: `The investigation begins. You are ${role.name}.`, choices: [] };
    renderOutput(fallback);
    return;
  }

  // Promote server state as authoritative
  gameState = { ...openingNextState, narrativeStyle: gameState.narrativeStyle };

  loadingEl.remove();
  renderOutput(openingOutput);
  updateCandleIndicator(gameState.remainingMinutes, scenario?.sessionTargetMinutes || 15);

  streamOptionsDots.classList.add('hidden');
  choicesAreaWrapEl.classList.remove('hidden');
  choicesAreaWrapEl.style.opacity = '0';
  void choicesAreaWrapEl.offsetHeight;
  choicesAreaWrapEl.style.transition = 'opacity 250ms ease';
  choicesAreaWrapEl.style.opacity = '1';
  showScrollHint();
  submitBtn.disabled = false;
}

let lastFetchedNotes = {};

const notesBtn       = document.getElementById('notes-btn');

function openNotes() {
  notesOverlay.classList.remove('hidden');

  fetchNotes();
}

function closeNotes() {
  notesOverlay.classList.add('hidden');

async function fetchNotes() {
  try {
    const resp = await fetch(`${API_BASE}/notes`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: gameState, sessionId })
    });
    const data = await resp.json();
    if (data.error) { notesContentEl.innerHTML = `<p class="notes-error">${data.error}</p>`; return; }
    lastFetchedNotes = data.notes;
    renderNotes(data.notes);
  } catch {
    notesContentEl.innerHTML = '<p class="notes-error">Could not load notes.</p>';
  }
}

function renderNotes(notes = lastFetchedNotes) {
  const sections = [];

  // WHAT YOU KNOW — accumulated facts (starts from role's starting knowledge, grows each turn)
  const knowledge = gameState?.discoveredFacts || gameState?.playerStartingKnowledge || [];
  if (knowledge.length) {
    sections.push(`<section class="notes-section"><h3>What You Know</h3><ul>${
      knowledge.map(k => `<li>${k}</li>`).join('')
    }</ul></section>`);
  }

  // WHERE YOU ARE — current location
  const loc = locationsList.find(l => l.id === gameState?.location);
  if (loc) {
    const desc = loc.description ? `<p style="font-size:0.85rem;color:var(--muted);margin:4px 0 0;font-style:italic">${loc.description}</p>` : '';
    sections.push(`<section class="notes-section"><h3>Where You Are</h3><p style="font-size:0.9rem;margin:0"><strong>${loc.name}</strong></p>${desc}</section>`);
  }

  // IMPRESSIONS — people encountered
  if (notes.characterImpressions?.length) {
    sections.push(`<section class="notes-section"><h3>Impressions</h3><ul>${
      notes.characterImpressions.map(c => `<li><strong>${c.name}</strong> — ${c.impression}</li>`).join('')
    }</ul></section>`);
  }

  notesContentEl.innerHTML = sections.length
    ? sections.join('')
    : '<p class="notes-empty">Nothing noted yet.</p>';
}

async function extractAndStoreFacts(narrative) {
  if (!narrative || !sessionId) return;
  try {
    const resp = await fetch(`${API_BASE}/extract-facts`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        narrative,
        existingFacts: gameState.discoveredFacts || [],
        sessionId
      })
    });
    const data = await resp.json();
    if (Array.isArray(data.newFacts) && data.newFacts.length) {
      const existing = new Set(gameState.discoveredFacts || []);
      for (const f of data.newFacts) {
        if (!existing.has(f)) { existing.add(f); (gameState.discoveredFacts ||= []).push(f); }
      }
    }
  } catch {
    // silent — fact extraction is best-effort
  }
}

// ── Voice input ───────────────────────────────────────────────────────────────

const micBtn = document.getElementById('mic-btn');
const drivingBtn = document.getElementById('driving-btn');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  micBtn.remove();
  drivingBtn.remove();
} else {
  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent));

  const recognition = new SpeechRecognition();
  recognition.continuous     = !isMobile;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let listening       = false;
  let finalTranscript = '';
  let restartScheduled = false;
  let postRestartDedup = false;
  let submissionLock   = false;
  let drivingMode      = false;
  let drivingTimer     = null;

  function safeSend(text) {
    if (submissionLock) return;
    submissionLock = true;
    Promise.resolve(submitTurn(text)).finally(() => { submissionLock = false; });
  }

  const VOICE_COMMANDS = {
    'send':          () => { if (finalTranscript.trim()) { const t = finalTranscript.trim(); finalTranscript = ''; inputEl.value = ''; safeSend(t); } },
    'stop reading':  () => { setTtsEnabled(false); ttsStop(); updateTtsBarUI(); updateTtsToggleUI(); },
    'start reading': () => { setTtsEnabled(true); if (audioUnlocked && lastRenderedSpeakText) ttsSpeak(lastRenderedSpeakText); updateTtsBarUI(); updateTtsToggleUI(); },
    'notes':         () => openNotes(),
  };

  function checkVoiceCommand(chunk) {
    const normalized = chunk.trim().toLowerCase().replace(/[.,!?]+$/,'');
    const handler = VOICE_COMMANDS[normalized];
    if (handler) { handler(); return true; }
    return false;
  }

  function appendFinalChunk(chunk) {
    const trimmed = chunk.trim();
    if (!trimmed) return;
    if (postRestartDedup) {
      postRestartDedup = false;
      if (finalTranscript.trimEnd().toLowerCase().endsWith(trimmed.toLowerCase())) return;
    }
    const sep = finalTranscript && !finalTranscript.endsWith(' ') ? ' ' : '';
    finalTranscript += sep + trimmed;
  }

  function resetDrivingTimer() {
    clearTimeout(drivingTimer);
    if (!finalTranscript.trim()) return;
    drivingTimer = setTimeout(() => {
      if (finalTranscript.trim() && drivingMode) {
        const t = finalTranscript.trim();
        finalTranscript = '';
        inputEl.value = '';
        safeSend(t);
      }
    }, 2500);
  }

  function setListening(on) {
    listening = on;
    micBtn.classList.toggle('listening', on);
    micBtn.setAttribute('aria-label', on ? 'Stop listening' : 'Start voice input');
    micBtn.title = on ? 'Listening… (click to stop)' : 'Voice input';
  }

  function startRecognition() {
    recognition.continuous = drivingMode || !isMobile;
    try { recognition.start(); } catch {}
  }

  function stopListening(autoSubmit = false) {
    clearTimeout(drivingTimer);
    setListening(false);
    restartScheduled = false;
    postRestartDedup = false;
    recognition.stop();
    inputEl.value = finalTranscript;
    if (autoSubmit && finalTranscript.trim()) {
      const t = finalTranscript.trim();
      finalTranscript = '';
      safeSend(t);
    }
  }

  function setDrivingMode(on) {
    drivingMode = on;
    drivingBtn.classList.toggle('active', on);
    drivingBtn.setAttribute('aria-label', on ? 'Disable driving mode' : 'Enable driving mode');
    drivingBtn.title = on ? 'Driving mode: on' : 'Driving mode';
    if (on) {
      if (!listening) { finalTranscript = inputEl.value.trimEnd(); setListening(true); startRecognition(); }
    } else {
      clearTimeout(drivingTimer);
      if (listening) stopListening(false);
    }
  }

  recognition.onresult = event => {
    let interimTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const chunk = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        if (drivingMode && checkVoiceCommand(chunk)) { postRestartDedup = false; }
        else appendFinalChunk(chunk);
      } else { interimTranscript += chunk; }
    }
    const sep = finalTranscript && interimTranscript && !finalTranscript.endsWith(' ') ? ' ' : '';
    inputEl.value = finalTranscript + (interimTranscript ? sep + interimTranscript : '');
    if (drivingMode) resetDrivingTimer();
  };

  recognition.onend = () => {
    if (isMobile && !drivingMode) {
      if (listening) { setListening(false); inputEl.value = finalTranscript; }
      return;
    }
    if (listening && !restartScheduled) {
      restartScheduled = true;
      setTimeout(() => {
        restartScheduled = false;
        if (listening) { postRestartDedup = true; startRecognition(); }
      }, 150);
    }
  };

  recognition.onerror = event => {
    if (event.error === 'aborted' || event.error === 'no-speech') return;
    setListening(false);
    restartScheduled = false;
    postRestartDedup = false;
  };

  micBtn.addEventListener('click', () => {
    if (listening) stopListening(drivingMode || !isMobile);
    else { finalTranscript = inputEl.value.trimEnd(); setListening(true); startRecognition(); }
  });

  formEl.addEventListener('submit', () => {
    if (listening && !drivingMode) stopListening();
  }, { capture: true });

  drivingBtn.addEventListener('click', () => setDrivingMode(!drivingMode));

  const overlayDriveBtn = document.getElementById('overlay-drive-btn');
  if (overlayDriveBtn) {
    overlayDriveBtn.addEventListener('click', () => {
      drivingMode = !drivingMode;
      drivingBtn.classList.toggle('active', drivingMode);
      overlayDriveBtn.classList.toggle('active', drivingMode);
      overlayDriveBtn.textContent = drivingMode ? '🚗 Drive: On' : '🚗 Drive';
    });
  }
}

// ── Debug helper ──────────────────────────────────────────────────────────────
window.__setTime = n => { if (gameState) { gameState.remainingMinutes = n; gameState.elapsedMinutes = (scenario?.sessionTargetMinutes || 15) - n; } };

// ── Init ──────────────────────────────────────────────────────────────────────
loadGame();
</script>
