<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investigation</title>
  <link rel="dns-prefetch" href="https://api.anthropic.com">

  <link rel="preconnect" href="https://api.elevenlabs.io" crossorigin>
  <style>
:root {
  --bg: #111111;
  --panel: #1b1b1b;
  --panel-soft: #232323;
  --text: #f0eadc;
  --muted: #c1b9a6;
  --accent: #d0b06a;
  --border: #3a3429;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: Georgia, serif; background: linear-gradient(180deg, #0d0d0d, #161616); color: var(--text); }
.app-shell { display: grid; grid-template-columns: 1fr; height: 100vh; height: 100dvh; overflow: hidden; }
.main-column { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.hero { padding: 16px 28px 12px; border-bottom: 1px solid var(--border); }
.back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); text-decoration: none; margin-bottom: 8px; transition: color 0.15s; font-family: system-ui, sans-serif; }
.back-link:hover { color: var(--accent); }
.overlay-back-link { align-self: flex-start; margin-bottom: 0; }
.hero-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.hero h1 { margin: 0; font-size: 2rem; transition: opacity 0.3s; }
.header-title-stack { display: flex; flex-direction: column; gap: 2px; }
.header-subtitle { margin: 0; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; font-style: italic; font-family: system-ui, sans-serif; }
.hero-controls { display: flex; align-items: center; gap: 8px; }
.story-feed { flex: 1; padding: 24px 28px; overflow-y: auto; min-height: 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; transition: opacity 0.2s ease; }
.story-feed::-webkit-scrollbar { width: 4px; }
.story-feed::-webkit-scrollbar-track { background: transparent; }
.story-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.scroll-hint {
  position: sticky; bottom: 16px;
  display: flex; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
}
.scroll-hint.visible { opacity: 1; }
.scroll-hint-chevron {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--panel); border: 1px solid var(--border);
  color: var(--muted); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.player-turn { font-size: 0.85rem; color: var(--muted); font-style: italic; margin: 20px 0 6px; padding-left: 10px; border-left: 2px solid var(--border); }
.scene-card { line-height: 1.75; font-size: 1rem; margin-bottom: 4px; }
.scene-card p { margin: 0 0 14px; }
.scene-card p:last-child { margin-bottom: 0; }
.scene-card .line { display: block; margin-bottom: 6px; }
.scene-card .line:last-child { margin-bottom: 0; }
.scene-card .line.dialogue { margin-top: 0.9em; }
.sensory-opening { font-style: italic; opacity: 0.85; margin-bottom: 16px; line-height: 1.7; }
.thinking-dots { display: flex; gap: 5px; padding: 10px 0 4px; }
.thinking-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: dot-pulse 1.2s ease-in-out infinite; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }
.scene-error { color: #e07060; }
.bottom-bar { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; }
.npc-line { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); color: #f6e9c8; }.choices-area-wrap { transition: opacity 250ms ease; }
.choices-area-wrap.hidden { display: none; }
.stream-options-dots { display: flex; gap: 5px; padding: 12px 28px 8px; }
.stream-options-dots.hidden { display: none; }
#input-form.hidden { display: none; }
.stream-options-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dot-pulse 1.2s ease-in-out infinite; }
.stream-options-dots span:nth-child(2) { animation-delay: 0.2s; }
.stream-options-dots span:nth-child(3) { animation-delay: 0.4s; }
.choices-wrap { display: flex; align-items: center; }
.choices-arrow { display: none; flex-shrink: 0; background: none; border: none; color: var(--muted); font-size: 1.6rem; line-height: 1; padding: 0 6px; cursor: pointer; opacity: 0; transition: opacity 0.2s; pointer-events: none; user-select: none; }
.choices-arrow.visible { opacity: 1; pointer-events: auto; }
.choices { display: flex; flex-wrap: wrap; flex: 1; gap: 8px; padding: 10px 28px 8px; }
.choice-btn { border: 1px solid var(--border); background: #282318; color: var(--text); border-radius: 10px; padding: 8px 14px; cursor: pointer; font-size: 0.82rem; line-height: 1.35; text-align: left; white-space: normal; }
.choice-btn:hover { border-color: var(--accent); }
.input-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px 28px 8px; }
.input-actions { display: flex; flex-direction: column; gap: 8px; min-width: 100px; }
.input-actions button[type="submit"] { flex: 1; }
.input-textarea-wrap { position: relative; }
textarea { width: 100%; resize: vertical; border-radius: 14px; border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 14px; padding-right: 52px; font: inherit; }
#player-input { font-size: 1rem; border-color: rgba(208,176,106,0.35); }
#player-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(208,176,106,0.12); }
.mic-btn { position: absolute; bottom: 10px; right: 10px; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel-soft); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: border-color 0.15s, color 0.15s, background 0.15s; font-weight: normal; }
.mic-btn:hover { border-color: var(--accent); color: var(--accent); }
.mic-btn.listening { border-color: #c0392b; background: #2a1010; color: #e74c3c; animation: mic-pulse 1.2s ease-in-out infinite; }
@keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.45); } 50% { box-shadow: 0 0 0 7px rgba(231,76,60,0); } }
button { border-radius: 14px; border: 1px solid var(--accent); background: var(--accent); color: #1a150c; font-weight: bold; cursor: pointer; }
ul { margin: 0; padding-left: 0; list-style: none; }
li { margin-bottom: 8px; }
.tts-toggle { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; background: transparent; border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--muted); cursor: pointer; font-weight: normal; transition: all 0.15s ease; }
.tts-toggle:hover { border-color: var(--accent); color: var(--text); }
.tts-toggle.active { background: var(--accent); color: #1a150c; border-color: var(--accent); }
.tts-bar { display: flex; }
.tools-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 2px 28px 6px; }
.tts-stop-btn { display: inline-flex; align-items: center; gap: 5px; border: 0.5px solid var(--border); background: var(--panel); color: var(--muted); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: normal; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }
.tts-stop-btn:hover { border-color: var(--accent); color: var(--text); }
.tts-stop-btn.active { border-color: var(--accent); color: var(--accent); }
.tts-stop-btn.active:hover { background: rgba(208,176,106,0.08); }
.driving-btn { height: 36px; padding: 0 14px; border-radius: 18px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: Georgia, serif; font-size: 0.78rem; font-weight: normal; cursor: pointer; letter-spacing: 0.03em; transition: border-color 0.15s, color 0.15s, background 0.15s; }
.driving-btn:hover { border-color: var(--accent); color: var(--accent); }
.driving-btn.active { border-color: var(--accent); background: var(--accent); color: #1a150c; }
.new-game-btn { height: 36px; padding: 0 14px; border-radius: 18px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: Georgia, serif; font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.new-game-btn:hover { border-color: var(--accent); color: var(--accent); }
.notes-btn { height: 36px; padding: 0 14px; border-radius: 18px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: Georgia, serif; font-size: 0.82rem; font-weight: normal; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.notes-btn:hover { border-color: var(--accent); color: var(--accent); }
.notes-overlay { position: fixed; inset: 0; z-index: 150; background: rgba(8,6,4,0.7); backdrop-filter: blur(3px); display: flex; align-items: flex-start; justify-content: flex-end; padding: 20px; }
.notes-overlay.hidden { display: none; }
.notes-panel { width: 100%; max-width: 420px; max-height: calc(100dvh - 40px); background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
.notes-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.notes-panel-header h2 { margin: 0; font-size: 1.1rem; color: var(--accent); }
.notes-close { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 1.1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-weight: normal; transition: border-color 0.15s, color 0.15s; }
.notes-close:hover { border-color: var(--accent); color: var(--accent); }
.notes-content { overflow-y: auto; padding: 16px 20px 20px; flex: 1; }
.notes-section { margin-bottom: 20px; }
.notes-section:last-child { margin-bottom: 0; }
.notes-section h3 { margin: 0 0 8px; font-size: 0.72rem; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); opacity: 0.8; }
.notes-section ul { padding-left: 16px; list-style: disc; }
.notes-section li { font-size: 0.85rem; line-height: 1.5; color: var(--text); margin-bottom: 6px; }
.suspicion-badge { display: inline-block; font-size: 0.65rem; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 3px; padding: 1px 5px; margin-right: 4px; vertical-align: middle; }
.suspicion--low    { background: #1a2010; color: #90c070; }
.suspicion--medium { background: #2a2010; color: #d8a850; }
.suspicion--high   { background: #2a1010; color: #e07060; }
.notes-loading, .notes-empty { color: var(--muted); font-style: italic; font-size: 0.85rem; margin: 0; }
.notes-error { color: #e07060; font-size: 0.85rem; margin: 0; }
.closing-overlay { position: fixed; inset: 0; z-index: 220; background: #0a0a0a; display: flex; align-items: flex-start; justify-content: center; padding: 64px 24px 80px; overflow-y: auto; }
.closing-overlay.hidden { display: none; }
.closing-inner { width: 100%; max-width: 640px; font-family: Georgia, serif; color: #d4cfc8; line-height: 1.8; }
.closing-prose { font-size: 1.05rem; font-style: italic; opacity: 0; transition: opacity 1.2s ease; margin-bottom: 2.4em; }
.closing-prose.visible { opacity: 1; }
.closing-aftermath { font-size: 1rem; opacity: 0; transition: opacity 1.2s ease; margin-bottom: 2.8em; }
.closing-aftermath.visible { opacity: 1; }
.closing-epilogue { opacity: 0; transition: opacity 1.4s ease; margin-bottom: 3.5em; border-top: 1px solid #2e2a24; padding-top: 2.2em; }
.closing-epilogue.visible { opacity: 1; }
.closing-epilogue-separator { text-align: center; color: #4a4540; font-size: 0.8rem; letter-spacing: 0.3em; margin-bottom: 0.8em; }
.closing-epilogue-label { text-align: center; font-size: 0.75rem; font-family: 'Letter Gothic Std', 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.2em; color: #6a6050; margin-bottom: 1.6em; }
.closing-epilogue-text { font-size: 0.95rem; font-style: normal; color: #b8b4ae; line-height: 1.75; margin-bottom: 1.4em; }
.closing-epilogue-sources { font-size: 0.75rem; color: #4a4540; font-style: italic; line-height: 1.6; }
.closing-bibliography { opacity: 0; transition: opacity 1.4s ease; margin-bottom: 3.5em; border-top: 1px solid #2e2a24; padding-top: 2.2em; }
.closing-bibliography.visible { opacity: 1; }
.closing-bibliography-label { text-align: center; font-size: 0.75rem; font-family: 'Letter Gothic Std', 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.2em; color: #6a6050; margin-bottom: 1.6em; }
.closing-bibliography-list { list-style: none; padding: 0; margin: 0; }
.closing-bibliography-item { font-size: 0.8rem; color: #7a7570; line-height: 1.7; margin-bottom: 0.8em; }
.closing-bibliography-item a { color: #7a7570; text-decoration: underline; text-underline-offset: 2px; }
.closing-bibliography-item a:hover { color: #d0b06a; }
.closing-bibliography-access { display: block; font-size: 0.72rem; color: #4a4540; font-style: italic; margin-top: 2px; }
.closing-return { display: block; text-align: center; font-size: 0.85rem; color: #6a6050; text-decoration: none; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.8s ease, color 0.15s; }
.closing-return.visible { opacity: 1; }
.closing-return:hover { color: #d0b06a; }
.closing-narration-toggle { position: fixed; top: 20px; right: 20px; z-index: 221; width: 36px; height: 36px; border-radius: 50%; border: 1px solid #3a3429; background: transparent; color: #6a6050; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-weight: normal; transition: border-color 0.15s, color 0.15s, background 0.15s; }
.closing-narration-toggle:hover { border-color: #d0b06a; color: #d0b06a; }
.closing-narration-toggle.active { border-color: #d0b06a; color: #d0b06a; background: rgba(208,176,106,0.1); }
.closing-dots { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 0; letter-spacing: 0.6em; }
.closing-dots span { font-size: 1.2rem; color: #d0b06a; opacity: 0; animation: closing-dot-breathe 2.4s ease-in-out infinite; }
.closing-dots span:nth-child(2) { animation-delay: 0.8s; }
.closing-dots span:nth-child(3) { animation-delay: 1.6s; }
.closing-dots.hidden { display: none; }
@keyframes closing-dot-breathe { 0%,100% { opacity:0; } 50% { opacity:1; } }
.role-overlay { position: fixed; inset: 0; z-index: 210; background: rgba(8,6,4,0.97); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
.role-overlay.hidden { display: none; }
.role-overlay-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 480px; }
.role-overlay-inner h2 { margin: 0; font-size: 1.8rem; color: var(--accent); letter-spacing: 0.04em; text-align: center; }
.role-intro { margin: 0; color: var(--muted); font-style: italic; font-size: 0.9rem; text-align: center; }
.role-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; margin: 4px 0; min-height: 60px; }
.role-card { display: flex; flex-direction: column; gap: 5px; text-align: left; width: 100%; padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; font-family: Georgia, serif; font-weight: normal; transition: border-color 0.15s, background 0.15s; }
.role-card:hover { border-color: var(--accent); background: var(--panel-soft); }
.role-card.selected { border-color: var(--accent); background: rgba(208,176,106,0.08); }
.role-setup-text { width: 100%; margin: 4px 0 0; display: flex; flex-direction: column; gap: 8px; }
.role-setup-text p { margin: 0; font-size: 0.9rem; color: var(--text); line-height: 1.7; }
.role-card-name { font-weight: bold; font-size: 0.95rem; color: var(--accent); }
.role-card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.45; }
.role-instruction { margin: 10px 0 4px; font-size: 0.8rem; color: var(--muted); text-align: center; }
.style-selector { margin-top: 16px; text-align: center; }
.style-label { margin: 0 0 8px; font-size: 0.82rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.style-btns { display: flex; gap: 8px; justify-content: center; }
.style-btn { padding: 7px 20px; font-size: 0.88rem; background: transparent; border: 1px solid #444; border-radius: 4px; color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.style-btn:hover { border-color: var(--accent); color: var(--accent); }
.style-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(208,176,106,0.08); }
.begin-btn { margin-top: 8px; padding: 14px 36px; font-size: 1rem; border-radius: 14px; border: 1px solid var(--accent); background: var(--accent); color: #1a150c; font-weight: bold; cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s, border-color 0.15s; }
.begin-btn:hover { background: #e0c070; border-color: #e0c070; }
.begin-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.intro-role-header { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin: 0; }
.error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; text-align: center; padding: 24px; }
.error-page h1 { color: var(--accent); margin: 0; }
.error-page p { color: var(--muted); margin: 0; }
/* ── Introduction overlay ────────────────────────────────────────────────── */
.intro-overlay { position: fixed; inset: 0; z-index: 215; background: #0a0a0a; display: flex; align-items: flex-start; justify-content: center; overflow: hidden; }
.intro-overlay.hidden { display: none; }
.intro-inner { display: flex; flex-direction: column; width: 100%; max-width: 680px; height: 100dvh; }
.intro-header { flex-shrink: 0; padding: 28px 32px 20px; border-bottom: 1px solid rgba(58,52,41,0.5); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.intro-header-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-family: system-ui, sans-serif; margin: 0; }
.intro-sections { flex: 1; overflow-y: auto; padding: 40px 32px 24px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.intro-sections::-webkit-scrollbar { width: 4px; }
.intro-sections::-webkit-scrollbar-track { background: transparent; }
.intro-sections::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.intro-section { font-size: 1.05rem; line-height: 1.85; color: #e8e0d0; margin: 0 0 28px; opacity: 0; animation: intro-fade 0.7s ease forwards; }
.intro-section:nth-child(1) { animation-delay: 0.1s; }
.intro-section:nth-child(2) { animation-delay: 0.6s; }
.intro-section:nth-child(3) { animation-delay: 1.1s; }
.intro-section:nth-child(4) { animation-delay: 1.6s; }
@keyframes intro-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.intro-loading { display: flex; gap: 10px; align-items: center; justify-content: center; padding: 80px 0; }
.intro-loading span { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); animation: intro-dot 1.2s ease-in-out infinite; }
.intro-loading span:nth-child(2) { animation-delay: 0.2s; }
.intro-loading span:nth-child(3) { animation-delay: 0.4s; }
@keyframes intro-dot { 0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); } 40% { opacity: 0.85; transform: scale(1); } }
.intro-footer { flex-shrink: 0; border-top: 1px solid var(--border); background: #0a0a0a; padding: 20px 32px; display: flex; align-items: center; gap: 20px; }
.intro-begin-btn { padding: 13px 36px; font-size: 1rem; border-radius: 14px; border: 1px solid var(--accent); background: var(--accent); color: #1a150c; font-weight: bold; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s, border-color 0.15s; }
.intro-begin-btn:hover { background: #e0c070; border-color: #e0c070; }
.intro-skip-btn { font-size: 0.8rem; color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; font-family: Georgia, serif; letter-spacing: 0.02em; transition: color 0.15s; }
.intro-skip-btn:hover { color: var(--text); }
.intro-scene-divider { border: none; border-top: 1px solid rgba(58,52,41,0.6); margin: 8px 0 32px; }
.intro-char-header { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin: 0 0 24px; opacity: 0; animation: intro-fade 0.7s ease forwards; }
.intro-bridge-sentence { font-style: italic; }
.bridge-sentence { font-style: italic; }
.context-sentence {}
.entry-paragraph { font-size: 14.5px; line-height: 1.75; color: var(--text); margin-bottom: 0; }
.streamlined-screen2-content { padding-bottom: 0; }
.intro-begin-actions { margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border); padding-bottom: 1rem; }
.intro-paragraph.fade-in { opacity: 0; transform: translateY(12px); transition: opacity 0.4s ease, transform 0.4s ease; animation: none !important; }
.intro-paragraph.fade-in.visible { opacity: 1; transform: translateY(0); }
@media (max-width: 640px) {
  .intro-content { max-width: 88%; margin: 0 auto; line-height: 1.75; font-size: 16px; }
}
@media (max-width: 980px) {
  .hero { padding: 10px 14px 6px; }
  .hero h1 { font-size: 1.3rem; }
  .back-link { margin-bottom: 5px; }
  .driving-btn { display: none; }
  .story-feed { padding: 14px 16px 8px; scrollbar-width: none; }
  .story-feed::-webkit-scrollbar { display: none; }
  .tools-row { padding: 4px 14px; justify-content: flex-start; }
  .tts-stop-btn { padding: 5px 10px; font-size: 0.75rem; }
  .choices-wrap { align-items: stretch; }
  .choices-arrow { display: flex; align-items: center; }
  .choices { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding: 6px 4px 8px; gap: 8px; scrollbar-width: none; }
  .choices::-webkit-scrollbar { display: none; }
  .choice-btn { flex: 0 0 82%; scroll-snap-align: start; width: auto; text-align: left; padding: 8px 12px; font-size: 0.84rem; line-height: 1.3; border-radius: 10px; white-space: normal; }
  .input-row { padding: 6px 14px 10px; gap: 8px; }
  .input-actions { flex-direction: column; min-width: unset; gap: 0; }
  .input-actions button[type="submit"] { height: 100%; min-height: 44px; padding: 0 18px; }
  /* Collapsible choices on mobile */
  .choices-wrap.mobile-collapsed .choices { display: none !important; }
  .choices-wrap.mobile-collapsed .choices-arrow { display: none !important; }
  /* Intro overlay mobile */
  .intro-header { padding: 18px 18px 14px; }
  .intro-sections { padding: 28px 18px 16px; }
  .intro-section { font-size: 1rem; line-height: 1.75; }
  .intro-footer { padding: 16px 18px; }
  /* Slim header — game active */
  .hero.game-active {
    display: flex; flex-direction: row; align-items: center;
    justify-content: space-between; gap: 8px;
    padding: 0 14px; height: 48px; overflow: hidden;
  }
  .hero.game-active .back-link,
  .hero.game-active .hero-title-row { display: none; }
  .hero.game-active .slim-info { display: flex; }
  .hero.game-active .slim-audio-btn { display: flex; }
  .hero.game-active .menu-btn { display: flex; }
  /* Hide TTS pill on mobile — moved to ⋯ menu */
  .tools-row { display: none; }
  /* Bottom bar reorder: choices above input */
  #choices-area-wrap { order: 1; }
  #stream-options-dots { order: 2; }
  #input-form { order: 3; }
  /* Compact suggestion chips */
  .choice-btn { padding: 7px 10px; font-size: 0.78rem; line-height: 1.25; }
}
@media (max-width: 600px) {
  .notes-overlay { padding: 0; align-items: flex-end; }
  .notes-panel { max-width: 100%; max-height: 80vh; border-radius: 12px 12px 0 0; }
  .role-overlay { align-items: flex-start; padding: 16px; }
  .role-overlay-inner { gap: 10px; }
  .role-overlay-inner h2 { font-size: 1.3rem; }
  .role-intro { display: none; }
  .role-cards { min-height: 0; gap: 8px; }
  .role-card { padding: 10px 14px; }
  .role-card-desc { display: none; }
  .role-card.selected .role-card-desc { display: block; }
  .role-overlay-inner:has(.role-card.selected) .role-instruction { display: none; }
  .input-section-label { padding: 6px 14px 0; }
  .choices { flex-direction: column; flex-wrap: nowrap; overflow-x: visible; padding: 6px 14px 8px; }
  .choices-arrow { display: none !important; }
  .choice-btn { flex: none; width: 100%; border-radius: 8px; }
}
/* ── Slim header ── */
.slim-info {
  display: none; flex: 1; min-width: 0; align-items: center; overflow: hidden;
}
.slim-info-text {
  font-size: 0.78rem; color: var(--muted); font-family: system-ui, sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.slim-audio-btn {
  display: none; flex-shrink: 0;
  align-items: center; gap: 5px;
  border: 0.5px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--muted);
  cursor: pointer; padding: 4px 10px;
  font-size: 12px; font-weight: normal; margin-right: 4px;
  transition: border-color 0.15s, color 0.15s;
}
.slim-audio-btn.active { border-color: var(--accent); color: var(--accent); }
.menu-btn {
  display: none; flex-shrink: 0;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  cursor: pointer; align-items: center; justify-content: center;
  padding: 0; font-weight: normal; font-size: 1.1rem; letter-spacing: 0.1em;
  transition: border-color 0.15s, color 0.15s;
}
.menu-btn:hover { border-color: var(--accent); color: var(--accent); }
/* ── Bottom sheet menu ── */
.menu-sheet { position: fixed; inset: 0; z-index: 300; }
.menu-sheet.hidden { display: none; }
.menu-sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
.menu-sheet-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--panel); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 0 0 calc(24px + env(safe-area-inset-bottom, 0px));
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  will-change: transform;
}
.menu-sheet.open .menu-sheet-panel { transform: none; }
.menu-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 14px; flex-shrink: 0; }
.menu-sheet-item {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 15px 24px;
  background: none; border: none; border-radius: 0;
  color: var(--text); font-family: Georgia, serif; font-size: 1rem;
  text-align: left; cursor: pointer; transition: background 0.12s;
}
.menu-sheet-item:active { background: var(--panel-soft); }
.menu-sheet-item--tts.active { color: var(--accent); }
.menu-sheet-item--danger { color: #e07060; }
.menu-sheet-divider { height: 1px; background: var(--border); margin: 4px 0; }
/* ── Restart confirmation ── */
.restart-confirm { position: fixed; inset: 0; z-index: 350; }
.restart-confirm.hidden { display: none; }
.restart-confirm-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
.restart-confirm-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--panel); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 24px 24px calc(32px + env(safe-area-inset-bottom, 0px));
  display: flex; flex-direction: column; gap: 16px;
}
.restart-confirm-msg { margin: 0; font-size: 0.95rem; color: var(--text); text-align: center; line-height: 1.5; }
.restart-confirm-actions { display: flex; flex-direction: column; gap: 10px; }
.restart-confirm-yes {
  padding: 13px; border-radius: 10px;
  background: rgba(42,16,16,0.8); border: 1px solid #5a2020;
  color: #e07060; font-size: 0.9rem; font-family: Georgia, serif; cursor: pointer;
}
.restart-confirm-no {
  padding: 13px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-size: 0.9rem; font-family: Georgia, serif; cursor: pointer;
}
  /* ── Streamlined onboarding (USE_STREAMLINED_ONBOARDING) ── */
  .sl-onboard .role-intro { display: block; }
  .sl-onboard .role-card-desc { display: block; }
  .sl-onboard .role-instruction { display: none; }
  /* ── Streamlined intro/style zones ── */
  .sl-onboard .style-selector { display: none; }
  .intro-zone {
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    padding: 10px 0;
    margin: 1.25rem 0 0;
    text-align: center;
  }
  .intro-panel-toggle {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    transition: color 0.15s ease;
    font-family: system-ui, sans-serif;
  }
  .intro-panel-toggle:hover { color: #C9A84C; }
  .intro-panel-arrow { font-size: 10px; color: inherit; }
  .intro-panel-content {
    text-align: left;
    padding-top: 1rem;
    margin-top: 0.75rem;
    border-top: 0.5px solid var(--border);
  }
  .intro-panel-text { font-size: 13.5px; line-height: 1.75; color: var(--text); margin-bottom: 1.25rem; }
  .intro-panel-close {
    background: none; border: none;
    font-size: 11px; color: var(--muted);
    cursor: pointer; padding: 0;
    letter-spacing: 0.06em; font-family: system-ui, sans-serif;
  }
  .intro-panel-close:hover { color: var(--text); }
  .style-zone { display: flex; justify-content: center; padding: 10px 0 1rem; }
  .narrative-style-options { display: flex; gap: 6px; }
  .ns-btn {
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: system-ui, sans-serif;
  }
  .ns-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .ns-btn:hover:not(.active) { color: var(--text); border-color: var(--muted); }
  .role-section-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 0.6rem 2px;
  }
  /* ── Intro panel listen button ── */
  .intro-listen-bar {
    margin-top: 0;
    padding-bottom: 0.75rem;
    border-bottom: 0.5px solid var(--border);
    border-top: none;
    margin-bottom: 1rem;
  }
  .intro-listen-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.15s ease;
    font-family: system-ui, sans-serif;
  }
  .intro-listen-btn:hover { color: var(--text); border-color: var(--muted); }
  .intro-listen-icon { font-size: 12px; }
  .intro-listen-label { font-size: 11px; letter-spacing: 0.04em; }
  .intro-listen-btn.narration-muted { opacity: 0.4; cursor: default; }
  .intro-listen-btn.intro-listen-loading {
    opacity: 0.7;
    pointer-events: none;
    min-width: 80px;
    justify-content: center;
  }
  .intro-listen-btn.intro-listen-loading::after {
    content: '\B7\B7\B7';
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.15em;
    animation: intro-dots 1.2s infinite;
  }
  @keyframes intro-dots {
    0%   { opacity: 0.3; }
    50%  { opacity: 1; }
    100% { opacity: 0.3; }
  }
  </style>
</head>
<body>

<div class="app-shell">
  <main class="main-column">
    <header class="hero">
      <a href="/" class="back-link">&#8592; Stories</a>
      <div class="hero-title-row">
        <div class="header-title-stack">
          <h1 id="header-title">Investigation</h1>
          <p id="header-subtitle" class="header-subtitle"></p>
        </div>
        <div class="hero-controls">
          <button type="button" id="new-game-btn" class="new-game-btn">Begin Again</button>
          <button type="button" id="driving-btn" class="driving-btn" aria-label="Enable driving mode" title="Driving mode" style="display:none">Drive</button>
          <button type="button" id="notes-btn" class="notes-btn">Notes</button>
          <button type="button" id="tts-toggle" class="tts-toggle" aria-label="Enable read-aloud" title="Read aloud: off"></button>
        </div>
      </div>
      <div class="slim-info" id="slim-info">
        <span class="slim-info-text" id="slim-scene-label"></span>
      </div>
      <button type="button" id="slim-audio-btn" class="slim-audio-btn" aria-label="Toggle narration"></button>
      <button type="button" id="menu-btn" class="menu-btn" aria-label="Menu">&#8943;</button>
    </header>

    <section id="story" class="story-feed"></section>

    <div class="bottom-bar">
      <div class="tools-row">
        <div id="tts-bar" class="tts-bar">
          <button type="button" id="tts-stop" class="tts-stop-btn">▶ Unmute narration</button>
        </div>
      </div>
      <form id="input-form" class="input-row">
        <div class="input-textarea-wrap">
          <textarea id="player-input" placeholder="Your move." rows="2"></textarea>
          <button type="button" id="mic-btn" class="mic-btn" aria-label="Start voice input" title="Voice input">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <rect x="5" y="1" width="6" height="9" rx="3"/>
              <path d="M2.5 8a5.5 5.5 0 0 0 11 0" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
              <line x1="8" y1="13.5" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="5.5" y1="15.5" x2="10.5" y2="15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="input-actions">
          <button type="submit">Submit</button>
        </div>
      </form>
      <div id="stream-options-dots" class="stream-options-dots hidden"><span></span><span></span><span></span></div>
      <div id="choices-area-wrap" class="choices-area-wrap">
        <div class="choices-wrap">
          <button type="button" class="choices-arrow choices-arrow--left" aria-hidden="true" tabindex="-1">&#8249;</button>
          <section id="choices" class="choices"></section>
          <button type="button" class="choices-arrow choices-arrow--right" aria-hidden="true" tabindex="-1">&#8250;</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ⋯ Bottom sheet menu -->
<div id="menu-sheet" class="menu-sheet hidden">
  <div class="menu-sheet-backdrop" id="menu-sheet-backdrop"></div>
  <div class="menu-sheet-panel">
    <div class="menu-sheet-handle"></div>
    <button type="button" class="menu-sheet-item" id="sheet-notes-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><rect x="3" y="2" width="12" height="14" rx="2"/><line x1="6" y1="6" x2="12" y2="6"/><line x1="6" y1="9" x2="12" y2="9"/><line x1="6" y1="12" x2="10" y2="12"/></svg>
      Notes
    </button>
    <button type="button" class="menu-sheet-item menu-sheet-item--tts" id="sheet-tts-btn">
      <span id="sheet-tts-icon"></span>
      <span id="sheet-tts-label">Narration off</span>
    </button>
    <div class="menu-sheet-divider"></div>
    <button type="button" class="menu-sheet-item menu-sheet-item--danger" id="sheet-restart-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><path d="M3 9a6 6 0 1 0 1.5-4"/><polyline points="1,5 4.5,5 4.5,8.5"/></svg>
      Begin Again
    </button>
  </div>
</div>

<!-- Restart confirmation -->
<div id="restart-confirm" class="restart-confirm hidden">
  <div class="restart-confirm-backdrop" id="restart-confirm-backdrop"></div>
  <div class="restart-confirm-panel">
    <p class="restart-confirm-msg">Start over? All progress in this session will be lost.</p>
    <div class="restart-confirm-actions">
      <button type="button" id="restart-confirm-yes" class="restart-confirm-yes">Begin Again</button>
      <button type="button" id="restart-confirm-no" class="restart-confirm-no">Keep playing</button>
    </div>
  </div>
</div>

<div id="role-overlay" class="role-overlay" role="dialog" aria-modal="true" aria-label="Begin investigation">
  <div class="role-overlay-inner">
    <a href="/" class="back-link overlay-back-link">&#8592; Stories</a>
    <h2 id="overlay-title">Investigation</h2>
    <p class="role-intro" id="overlay-tagline"></p>
    <div class="role-setup-text" id="overlay-desc"></div>
    <p class="role-instruction">Select your role to begin.</p>
    <div class="role-cards" id="role-cards"></div>
    <div class="style-selector">
      <p class="style-label">Narrative Style</p>
      <div class="style-btns">
        <button type="button" class="style-btn selected" data-style="focused">Focused</button>
        <button type="button" class="style-btn" data-style="cinematic">Cinematic</button>
      </div>
      <p style="margin:5px 0 0;font-size:0.75rem;color:#6a6050;text-align:center">Focused = faster&nbsp;|&nbsp;Cinematic = more descriptive</p>
    </div>
    <button type="button" id="role-begin-btn" class="begin-btn" disabled>Enter</button>
  </div>
</div>


<div id="intro-overlay" class="intro-overlay hidden" role="dialog" aria-modal="true" aria-label="Story introduction">
  <div class="intro-inner">
    <div class="intro-header">
      <p id="intro-title" class="intro-header-title"></p>
      <button type="button" id="intro-tts-btn" class="tts-toggle" aria-label="Mute narration" title="Mute narration"></button>
    </div>
    <div id="intro-sections" class="intro-sections"></div>
    <div class="intro-footer">
      <button type="button" id="intro-begin-btn" class="intro-begin-btn">Continue</button>
      <button type="button" id="intro-skip-btn" class="intro-skip-btn">Skip introduction</button>
    </div>
  </div>
</div>

<div id="notes-overlay" class="notes-overlay hidden" role="dialog" aria-modal="true" aria-label="Session notes">
  <div class="notes-panel">
    <div class="notes-panel-header">
      <h2>Session Notes</h2>
      <button type="button" id="notes-close" class="notes-close" aria-label="Close notes">&times;</button>
    </div>
    <div id="notes-content" class="notes-content"></div>
  </div>
</div>

<div id="closing-overlay" class="closing-overlay hidden" role="region" aria-label="Story closing">
  <button id="closing-narration-toggle" class="closing-narration-toggle" aria-label="Toggle narration" onclick="toggleClosingNarration()"></button>
  <div id="closing-dots" class="closing-dots" aria-hidden="true">
    <span>·</span><span>·</span><span>·</span>
  </div>
  <div class="closing-inner">
    <div id="closing-prose" class="closing-prose"></div>
    <div id="closing-aftermath" class="closing-aftermath"></div>

      <div class="closing-epilogue-separator">— — —</div>
      <div class="closing-epilogue-label">Historical Record</div>
      <div id="closing-epilogue-text" class="closing-epilogue-text"></div>
      <div id="closing-epilogue-sources" class="closing-epilogue-sources"></div>

      <div class="closing-bibliography-label">Primary Sources</div>

  </div>
</div>

<script>
// ── Bootstrap ─────────────────────────────────────────────────────────────────

const urlParams   = new URLSearchParams(location.search);
const SCENARIO_ID = urlParams.get('scenarioId');
const API_BASE    = '/game/api';

const worldIntroKey = `world-intro-shown-${SCENARIO_ID}`;
function hasSeenWorldIntro()  { return sessionStorage.getItem(worldIntroKey) === 'true'; }
function markWorldIntroSeen() { sessionStorage.setItem(worldIntroKey, 'true'); }

// ONBOARDING EXPERIMENT
// Set to true for two-screen flow, false for original flow
// Rollback: change this one line back to false
const USE_STREAMLINED_ONBOARDING = true;

if (!SCENARIO_ID) {
  document.body.innerHTML = `<div class="error-page"><h1>No scenario selected</h1><p>Open this page with <code>?scenarioId=your_id</code> in the URL, or go back to the <a href="/" style="color:var(--accent)">admin panel</a> and use the Play button.</p></div>`;
  throw new Error('scenarioId is required');
}

// ── State ─────────────────────────────────────────────────────────────────────

let gameState = null;
let scenario  = null;
let locationsList = [];
let sessionId = null;
let conversationHistory = [];
const MAX_HISTORY_TURNS = 4;
let locationFeed    = [];
let feedLocationId  = null;
let pendingEntryEl  = null;
let locationShowing = false;
let bootstrapData        = null;
let ttsNarrationSpeed    = 1.0;
let lastChoices          = [];

// Pre-warmed /start request fired as soon as role is selected, resolved in startGame()
let warmStart = null; // { promise, roleId, style, characterContext, activeHook }
let currentRoleId = null;

const storyEl    = document.getElementById('story');
const choicesEl  = document.getElementById('choices');
const arrowLeft  = document.querySelector('.choices-arrow--left');
const arrowRight = document.querySelector('.choices-arrow--right');
const formEl     = document.getElementById('input-form');
const inputEl    = document.getElementById('player-input');
const choicesAreaWrapEl = document.getElementById('choices-area-wrap');
const streamOptionsDots = document.getElementById('stream-options-dots');
const submitBtn         = formEl.querySelector('button[type="submit"]');

function applyFreeInputMode(allowed) {
  formEl.classList.toggle('hidden', !allowed);
}

const scrollHintEl = (() => {
  const wrap = document.createElement('div');
  wrap.className = 'scroll-hint';
  const icon = document.createElement('div');
  icon.className = 'scroll-hint-chevron';
  icon.textContent = '↓';
  wrap.appendChild(icon);
  storyEl.appendChild(wrap);
  return wrap;
})();
function feedAppend(el) { storyEl.insertBefore(el, scrollHintEl); }
function feedScrollTop(el) {
  requestAnimationFrame(() => {
    storyEl.scrollTop = el.getBoundingClientRect().top
      - storyEl.getBoundingClientRect().top + storyEl.scrollTop;
  });
}
function showScrollHint() {
  if (storyEl.scrollHeight > storyEl.clientHeight + 20) scrollHintEl.classList.add('visible');
}
storyEl.addEventListener('scroll', () => scrollHintEl.classList.remove('visible'), { passive: true });
const ttsBarEl   = document.getElementById('tts-bar');
const ttsToggleBtn = document.getElementById('tts-toggle');
const ttsStopBtn   = document.getElementById('tts-stop');

const isMobileDevice = () => 'ontouchstart' in window || window.innerWidth <= 768;

// ── TTS ───────────────────────────────────────────────────────────────────────

const synth = window.speechSynthesis;
let ttsEnabled = false;
let audioUnlocked = false;
let audioEl = null;
let currentAudio = null;
let lastSpokenMessageId = 0;
let currentMessageId = 0;
let lastRenderedSpeakText = '';
let lastRenderedSensoryOpening = null;
let pendingTeleprompterEl = null;
let teleprompterRafId = null;

const SVG_SPEAKER_OFF = `<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M2 6h2l4-4v12l-4-4H2z"/><line x1="11" y1="5.5" x2="15" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="5.5" x2="11" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const SVG_SPEAKER_ON  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M2 6h2l4-4v12l-4-4H2z"/><path d="M10 6.5a2.5 2.5 0 0 1 0 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M12 4a5.5 5.5 0 0 1 0 8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;

function setTtsEnabled(val) {
  ttsEnabled = val;
}

function cleanForSpeech(text) {
  return text.replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/#+\s*/g,'')
    .replace(/\[(.+?)\]\(.+?\)/g,'$1').replace(/`(.+?)`/g,'$1').replace(/[_~]/g,'').replace(/\s+/g,' ').trim();
}

function updateTtsToggleUI() {
  const label = ttsEnabled ? 'Narration on' : 'Narration off';
  ttsToggleBtn.innerHTML = `<span>🔊</span><span id="tts-text-label">${label}</span>`;
  ttsToggleBtn.classList.toggle('active', ttsEnabled);
  ttsToggleBtn.setAttribute('aria-label', ttsEnabled ? 'Disable narration' : 'Enable narration');
}
function updateSlimAudioUI() {
  const btn = document.getElementById('slim-audio-btn');
  if (!btn) return;
  const label = ttsEnabled ? 'Narration on' : 'Narration off';
  btn.innerHTML = `<span>🔊</span><span>${label}</span>`;
  btn.classList.toggle('active', ttsEnabled);
}
function updateSheetTtsUI() {
  const icon  = document.getElementById('sheet-tts-icon');
  const label = document.getElementById('sheet-tts-label');
  const btn   = document.getElementById('sheet-tts-btn');
  if (icon)  icon.innerHTML  = ttsEnabled ? SVG_SPEAKER_ON : SVG_SPEAKER_OFF;
  if (label) label.textContent = ttsEnabled ? 'Narration on' : 'Narration off';
  btn?.classList.toggle('active', ttsEnabled);
}
function updateSlimLabel() {
  const title = document.getElementById('header-title')?.textContent || '';
  const sub   = document.getElementById('header-subtitle')?.textContent || '';
  const label = document.getElementById('slim-scene-label');
  if (label) label.textContent = sub ? `${title} · ${sub}` : title;
}

function updateTtsBarUI() {
  if (ttsEnabled) {
    ttsStopBtn.innerHTML = '🔊 Mute narration';
    ttsStopBtn.classList.add('active');
  } else {
    ttsStopBtn.innerHTML = '▶ Unmute narration';
    ttsStopBtn.classList.remove('active');
  }
}

function ttsSpeakFallback(text) {
  if (!synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(cleanForSpeech(text));
  utt.rate = 0.95;
  synth.speak(utt);
}

async function ttsSpeak(text, sensoryOpening, confirmation = null, trustLevel = null) {
  if (!ttsEnabled) return;
  ttsStop();
  if (!audioEl) { console.warn('[TTS] audioEl not initialized — audio not yet unlocked, skipping.'); return; }
  try {
    const body = { text };
    if (sensoryOpening)         body.sensory_opening   = sensoryOpening;
    if (confirmation)           body.confirmation      = confirmation;
    if (trustLevel != null)     body.trust_level       = trustLevel;
    if (ttsNarrationSpeed !== 1.0) body.narrative_speed = ttsNarrationSpeed;
    const resp = await fetch(`${API_BASE}/tts`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) { console.warn(`[TTS] ElevenLabs returned ${resp.status} — falling back to browser TTS.`); ttsSpeakFallback(text); return; }
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    audioEl.src = url;
    audioEl.playbackRate = 1.0;
    audioEl.onended = () => { URL.revokeObjectURL(url); currentAudio = null; };
    audioEl.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; console.warn('[TTS] audio element error — falling back to browser TTS.'); ttsSpeakFallback(text); };
    currentAudio = audioEl;
    await audioEl.play();
    if (pendingTeleprompterEl) { startTeleprompter(pendingTeleprompterEl); pendingTeleprompterEl = null; }
  } catch (e) { console.warn('[TTS] exception — falling back to browser TTS.', e); ttsSpeakFallback(text); }
}

function ttsStop() {
  cancelAnimationFrame(teleprompterRafId);
  teleprompterRafId = null;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (synth) synth.cancel();
}

function startTeleprompter(sceneEl) {
  if (!sceneEl || !audioEl || !audioEl.duration || !isFinite(audioEl.duration)) return;
  cancelAnimationFrame(teleprompterRafId);
  const startScroll = storyEl.scrollTop;
  const feedRect    = storyEl.getBoundingClientRect();
  const entryEl     = sceneEl.closest('.feed-entry') || sceneEl;
  const entryRect   = entryEl.getBoundingClientRect();
  const scrollDist  = Math.max(0, entryRect.bottom - feedRect.bottom + 16);
  const dur = audioEl.duration;
  function tick() {
    if (!audioEl || audioEl.paused || audioEl.ended) { teleprompterRafId = null; return; }
    storyEl.scrollTop = startScroll + (audioEl.currentTime / dur) * scrollDist;
    teleprompterRafId = requestAnimationFrame(tick);
  }
  teleprompterRafId = requestAnimationFrame(tick);
}

updateTtsToggleUI();
updateTtsBarUI();

ttsToggleBtn.addEventListener('click', () => {

  if (!ttsEnabled) ttsStop();
  updateTtsToggleUI();

// ── Candle indicator ──────────────────────────────────────────────────────────

function updateCandleIndicator(minutesRemaining, totalMinutes) {
  const progress     = minutesRemaining / totalMinutes;
  const maxHeight    = 60;
  const minHeight    = 4;
  const currentHeight = Math.max(minHeight, Math.round(minHeight + (progress * (maxHeight - minHeight))));
  const flameSize    = Math.max(4, Math.round(4 + (progress * 6)));
  const flameWidth   = Math.max(4, Math.round(4 + (progress * 2)));
  const bodyEl  = document.getElementById('candle-body');
  const flameEl = document.getElementById('candle-flame');
  if (bodyEl)  bodyEl.style.height  = currentHeight + 'px';
  if (flameEl) { flameEl.style.height = flameSize + 'px'; flameEl.style.width = flameWidth + 'px'; }
}

function syncArrows() {

function renderChoices(choices = []) {
  if (choices.length > 0) lastChoices = choices;
  choicesEl.innerHTML = '';

}

choicesEl.addEventListener('scroll', syncArrows, { passive: true });
if (arrowLeft)  arrowLeft.addEventListener('click',  () => choicesEl.scrollBy({ left: -choicesEl.clientWidth * 0.85, behavior: 'smooth' }));
if (arrowRight) arrowRight.addEventListener('click', () => choicesEl.scrollBy({ left:  choicesEl.clientWidth * 0.85, behavior: 'smooth' }));

// ── Narrative rendering ───────────────────────────────────────────────────────

function markupNarrative(text) {
  return (text || '').split('\n').map(line => {
    if (!line.trim()) return null;
    if (/\*[^*]+\*/.test(line)) return `<span class="line">${line.replace(/\*([^*]+)\*/g,'<em>$1</em>')}</span>`;
    if (/^\w[^:]{0,30}:\s*["']/.test(line)) return `<span class="line dialogue">${line}</span>`;
    return `<span class="line"><em>${line}</em></span>`;
  }).filter(Boolean).join('');
}

function renderOutput(output, meta = {}) {
  const sensoryHtml   = output.sensory_opening
    ? `<p class="sensory-opening">${output.sensory_opening}</p>`
    : '';
  const narrativeHtml = markupNarrative(output.narrative);
  const html = `${sensoryHtml}<p>${narrativeHtml}</p>`;

  const currentLocation  = gameState?.location;
  const isTransitionTurn = meta.prevLocation != null && meta.prevLocation !== currentLocation;

  if (currentLocation && currentLocation !== feedLocationId) {
    feedLocationId = currentLocation;
    updateLocationDisplay(currentLocation);
    if (!isTransitionTurn) {
      locationFeed = [];
      storyEl.innerHTML = '';
      storyEl.appendChild(scrollHintEl);
      pendingEntryEl = null;
    }
  }

  locationFeed.push({ playerInput: meta.playerInput || null, html });

  const sceneEl = document.createElement('div');
  sceneEl.className = 'scene-card';
  sceneEl.innerHTML = html;

  if (pendingEntryEl) {
    pendingEntryEl.querySelector('.thinking-dots')?.remove();
    pendingEntryEl.appendChild(sceneEl);
    pendingEntryEl = null;
  } else {
    const entryEl = document.createElement('div');
    entryEl.className = 'feed-entry';
    entryEl.appendChild(sceneEl);
    feedAppend(entryEl);
  }

  pendingTeleprompterEl = sceneEl;
  requestAnimationFrame(() => {
    const newScrollTop = sceneEl.getBoundingClientRect().top
      - storyEl.getBoundingClientRect().top
      + storyEl.scrollTop - 8;
    storyEl.scrollTop = Math.max(0, newScrollTop);
  });

  renderChoices(output.choices || []);

  const messageId = ++currentMessageId;
  lastRenderedSpeakText      = output.narrative;
  lastRenderedSensoryOpening = output.sensory_opening || null;

  if (!meta.skipTts && ttsEnabled && audioUnlocked) {
    // Build narrator confirmation: "You [player_action]." — freeform input only, not choices
    const pa = meta.player_action?.trim();
    const confirmation = pa
      ? `You ${pa}${pa.endsWith('.') || pa.endsWith('!') || pa.endsWith('?') ? '' : '.'}`
      : null;
    // Determine primary NPC trust level for voice shaping
    const primaryNpcId = output.npcMoments?.[0]?.npc || null;
    const trustLevel = (primaryNpcId && gameState?.npc_states?.[primaryNpcId]?.trust_level != null)
      ? gameState.npc_states[primaryNpcId].trust_level
      : null;
    setTimeout(() => {
      if (lastSpokenMessageId < messageId) {
        lastSpokenMessageId = messageId;
        ttsSpeak(output.narrative, output.sensory_opening, confirmation, trustLevel);
      }
    }, 300);
  }
}

function getLocationDisplayName(locationId) {
  if (!locationId) return '';
  const loc = locationsList.find(l => l.id === locationId);
  if (loc) return loc.short_name || loc.name || locationId;
  return locationId
    .replace(/^loc_/, '')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function updateHeaderSubtitle() {
  const sub = document.getElementById('header-subtitle');
  if (sub && gameState) sub.textContent = getLocationDisplayName(gameState.location);
}

function updateLocationDisplay(locationId) {
  const h1  = document.getElementById('header-title');
  const sub = document.getElementById('header-subtitle');
  if (!h1) return;
  const loc = locationsList.find(l => l.id === locationId);
  h1.textContent = loc ? loc.name : prettifyId(locationId);
  updateHeaderSubtitle();
  updateSlimLabel();
}

// ── Closing screen narration ──────────────────────────────────────────────────

let closingNarrResolve = null;

function ttsClosingSpeak(text) {
  if (!ttsEnabled || !audioUnlocked || !audioEl) return Promise.resolve();
  const cleaned = cleanForSpeech(text);
  if (!cleaned) return Promise.resolve();
  ttsStop();
  return new Promise(async (resolve) => {
    let settled = false;
    const done = () => {
      if (!settled) {
        settled = true;
        closingNarrResolve = null;
        currentAudio = null;
        resolve();
      }
    };
    closingNarrResolve = done;
    try {
      const resp = await fetch(`${API_BASE}/tts`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: cleaned, narrative_speed: 0.85 })
      });
      if (!resp.ok) { done(); return; }
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      audioEl.src = url;
      audioEl.playbackRate = 1.0;
      audioEl.onended = () => { URL.revokeObjectURL(url); done(); };
      audioEl.onerror = () => { URL.revokeObjectURL(url); done(); };
      currentAudio = audioEl;
      await audioEl.play();
    } catch (e) {
      console.warn('[TTS] closing narration error:', e);
      done();
    }
  });
}

function syncClosingNarrationBtn() {
  const btn = document.getElementById('closing-narration-toggle');
  if (!btn) return;
  btn.innerHTML = ttsEnabled ? SVG_SPEAKER_ON : SVG_SPEAKER_OFF;
  btn.classList.toggle('active', ttsEnabled);
  const label = ttsEnabled ? 'Mute narration' : 'Unmute narration';
  btn.setAttribute('aria-label', label);
  btn.title = label;
}

function toggleClosingNarration() {
  setTtsEnabled(!ttsEnabled);
  if (!ttsEnabled) {
    ttsStop();
    if (closingNarrResolve) { closingNarrResolve(); closingNarrResolve = null; }
  }
  syncClosingNarrationBtn();
  updateTtsToggleUI();
  updateTtsBarUI();
}

// ── Closing screen ────────────────────────────────────────────────────────────

function showClosingScreen(endState, sessionId) {
  const overlay      = document.getElementById('closing-overlay');
  const dotsEl       = document.getElementById('closing-dots');
  const proseEl      = document.getElementById('closing-prose');
  const aftermathEl  = document.getElementById('closing-aftermath');
  const epilogueEl   = document.getElementById('closing-epilogue');
  const epTextEl     = document.getElementById('closing-epilogue-text');
  const epSourcesEl  = document.getElementById('closing-epilogue-sources');
  const bibEl        = document.getElementById('closing-bibliography');
  const bibListEl    = document.getElementById('closing-bibliography-list');
  const returnEl     = document.getElementById('closing-return');

  if (!overlay || !dotsEl || !proseEl || !aftermathEl || !epilogueEl || !returnEl) {
    console.error('[CLOSING] missing DOM element — closing screen cannot show');
    return;
  }

  document.getElementById('candle-indicator')?.style?.setProperty('display', 'none');

  const aftermath = scenario?.historical_aftermath || '';
  aftermathEl.textContent = aftermath;

  overlay.classList.remove('hidden');
  proseEl.textContent = '';
  syncClosingNarrationBtn();

  async function triggerClosingSequence(hasEpilogue, hasBibliography) {
    if (ttsEnabled) {
      await ttsClosingSpeak(proseEl.textContent);
      aftermathEl.classList.add('visible');
      if (aftermath) await ttsClosingSpeak(aftermathEl.textContent);
      await new Promise(r => setTimeout(r, 1500));
      if (hasEpilogue) {
        epilogueEl.classList.add('visible');
        await ttsClosingSpeak(epTextEl.textContent);
      }
      if (hasBibliography && bibEl) {
        await new Promise(r => setTimeout(r, 500));
        bibEl.classList.add('visible');
      }
      await new Promise(r => setTimeout(r, 500));
      returnEl.classList.add('visible');
    } else {
      setTimeout(() => aftermathEl.classList.add('visible'), 2500);
      setTimeout(() => { if (hasEpilogue) epilogueEl.classList.add('visible'); }, 5500);
      setTimeout(() => { if (hasBibliography && bibEl) bibEl.classList.add('visible'); }, hasEpilogue ? 10000 : 8000);
      setTimeout(() => returnEl.classList.add('visible'), hasEpilogue ? (hasBibliography ? 12000 : 8500) : 7000);
    }
  }

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 30000);
  let firstChunk   = true;

  const cpParams = new URLSearchParams({ sessionId });
  if (currentRoleId) cpParams.set('roleId', currentRoleId);
  if (endState?.result) cpParams.set('endResult', endState.result);

  fetch(`${API_BASE}/closing-prose?${cpParams}`, { signal: controller.signal })
    .then(async resp => {
      const cpReader  = resp.body.getReader();
      const cpDecoder = new TextDecoder();
      let cpBuffer = '';
      while (true) {
        const { done, value } = await cpReader.read();
        if (done) break;
        cpBuffer += cpDecoder.decode(value, { stream: true });
        const lines = cpBuffer.split('\n');
        cpBuffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let evt;
          try { evt = JSON.parse(line.slice(6)); } catch { continue; }
          if (evt.type === 'chunk') {
            if (firstChunk) {
              firstChunk = false;
              dotsEl.classList.add('hidden');
              proseEl.classList.add('visible');
            }
            proseEl.textContent += evt.text;
          } else if (evt.type === 'done') {
            clearTimeout(timeoutId);
            let hasEpilogue     = false;
            let hasBibliography = false;
            if (evt.epilogue?.text) {
              hasEpilogue = true;
              epTextEl.textContent = evt.epilogue.text;
              if (evt.epilogue.sources?.length) {
                epSourcesEl.textContent = 'Sources: ' + evt.epilogue.sources.join('; ');
              }
            }
            if (evt.bibliography?.length && bibEl && bibListEl) {
              hasBibliography = true;
              const escH = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
              bibListEl.innerHTML = evt.bibliography.map(src => {
                const inner = src.url
                  ? `<a href="${escH(src.url)}" target="_blank" rel="noopener noreferrer">${escH(src.citation)}</a>`
                  : escH(src.citation) + (src.access_note ? `<span class="closing-bibliography-access">${escH(src.access_note)}</span>` : '');
                return `<li class="closing-bibliography-item">${inner}</li>`;
              }).join('');
            }
            triggerClosingSequence(hasEpilogue, hasBibliography);
          } else if (evt.type === 'error') {
            clearTimeout(timeoutId);
            dotsEl.classList.add('hidden');
            triggerClosingSequence(false, false);
          }
        }
      }
    })
    .catch(() => {
      clearTimeout(timeoutId);
      dotsEl.classList.add('hidden');
      triggerClosingSequence(false, false);
    });
}

// ── Turn submission ───────────────────────────────────────────────────────────

let submitting = false;

function buildAssistantHistoryContent(output) {
  let text = output.sensory_opening ? `${output.sensory_opening}\n\n` : '';
  text += output.narrative || '';
  for (const m of output.npcMoments || []) text += `\n${prettifyId(m.npc)}: ${m.text}`;
  return text.trim();
}

async function submitTurn(playerInput, { isChoice = false } = {}) {
  if (!playerInput?.trim() || submitting) return;
  if (gameState?.remainingMinutes <= 0) {
    triggerClosingSequence(false, false);
    return;
  }
  submitting = true;
  inputEl.value = '';
  scrollHintEl.classList.remove('visible');
  choicesAreaWrapEl.classList.add('hidden');
  streamOptionsDots.classList.remove('hidden');
  submitBtn.disabled = true;

  // Fade out current narrative, fetch in parallel so network isn't blocked by animation
  storyEl.style.opacity = '0';
  const respPromise = fetch(`${API_BASE}/turn`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ state: gameState, playerInput, history: conversationHistory, sessionId, ...(isChoice ? {} : { player_action: playerInput }) })
  });

  // Wait for fade to finish, then clear and rebuild the zone (timeout guards against missed transitionend)
  await Promise.race([
    new Promise(resolve => storyEl.addEventListener('transitionend', resolve, { once: true })),
    new Promise(resolve => setTimeout(resolve, 350))
  ]);
  storyEl.innerHTML = '';
  storyEl.appendChild(scrollHintEl);
  storyEl.scrollTop = 0;
  storyEl.style.opacity = '1';

  const entryEl = document.createElement('div');
  entryEl.className = 'feed-entry';
  const playerEl = document.createElement('div');
  playerEl.className = 'player-turn';
  playerEl.textContent = playerInput;
  entryEl.appendChild(playerEl);
  const dotsEl = document.createElement('div');
  dotsEl.className = 'thinking-dots';
  dotsEl.innerHTML = '<span></span><span></span><span></span>';
  entryEl.appendChild(dotsEl);
  feedAppend(entryEl);
  pendingEntryEl = entryEl;

  try {
    const resp = await respPromise;

    // Consume SSE stream
    let streamEl     = null;
    let streamBuffer = '';
    let output = null, nextState = null;
    const sseReader  = resp.body.getReader();
    const sseDecoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const { done, value } = await sseReader.read();
      if (done) break;
      sseBuffer += sseDecoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        if (evt.type === 'chunk') {
          if (!streamEl) {
            dotsEl.remove();
            streamEl = document.createElement('div');
            streamEl.className = 'scene-card';
            entryEl.appendChild(streamEl);
          }
          streamBuffer += evt.text;
          streamEl.innerHTML = '<p>' + streamBuffer.replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
        } else if (evt.type === 'done') {
          output    = evt.output;
          nextState = evt.nextState;
        } else if (evt.type === 'error') {
          streamOptionsDots.classList.add('hidden');
          choicesAreaWrapEl.classList.remove('hidden');
          submitBtn.disabled = false;
          if (streamEl) streamEl.remove();
          else dotsEl.remove();
          const errEl = document.createElement('div');
          errEl.className = 'scene-card scene-error';
          errEl.innerHTML = `<p>${evt.error}</p>`;
          entryEl.appendChild(errEl);
          pendingEntryEl = null;
          return;
        }
      }
    }

    if (!output || !nextState) {
      streamOptionsDots.classList.add('hidden');
      choicesAreaWrapEl.classList.remove('hidden');
      submitBtn.disabled = false;
      if (streamEl) streamEl.remove();
      else dotsEl.remove();
      const errEl = document.createElement('div');
      errEl.className = 'scene-card scene-error';
      errEl.innerHTML = `<p>No response received.</p>`;
      entryEl.appendChild(errEl);
      pendingEntryEl = null;
      return;
    }

    if (streamEl) streamEl.remove();

    const prevLocation = gameState?.location;
    const preservedFacts = gameState.discoveredFacts;
    gameState = nextState;
    gameState.discoveredFacts = preservedFacts || [...(gameState.playerStartingKnowledge || [])];

    conversationHistory.push(
      { role: 'user',      content: playerInput },
      { role: 'assistant', content: buildAssistantHistoryContent(output) }
    );
    if (conversationHistory.length > MAX_HISTORY_TURNS * 2) {
      conversationHistory = conversationHistory.slice(-MAX_HISTORY_TURNS * 2);
    }

    renderSidebar();
    updateChaseUI();
    renderOutput(output, { playerInput, prevLocation, player_action: isChoice ? null : playerInput });
    updateCandleIndicator(gameState.remainingMinutes, scenario?.sessionTargetMinutes || 15);

    streamOptionsDots.classList.add('hidden');
    choicesAreaWrapEl.classList.remove('hidden');    // display:block before setting opacity
    choicesAreaWrapEl.style.opacity = '0';
    void choicesAreaWrapEl.offsetHeight;             // force reflow so transition fires from opacity:0
    choicesAreaWrapEl.style.transition = 'opacity 250ms ease';
    choicesAreaWrapEl.style.opacity = '1';
    showScrollHint();
    submitBtn.disabled = false;
    extractAndStoreFacts(output.narrative);

    if (gameState.remainingMinutes <= 0) {
      triggerClosingSequence(false, false);
    } else if (output?.endState?.isEnding) {
      try {
        formEl.querySelector('button[type="submit"]').disabled = true;
        inputEl.value = '';
        inputEl.disabled = true;
        renderChoices([]);
        // Scroll to the bottom of the final scene so the player sees it in full
        storyEl.scrollTop = storyEl.scrollHeight;
        // Fade out the input/choices area — visual cue that the session is concluding
        const bottomBar = document.querySelector('.bottom-bar');
        if (bottomBar) {
          bottomBar.style.transition = 'opacity 2s ease';
          bottomBar.style.opacity = '0';
        }
        // Scale reading pause to final scene length (lastRenderedSpeakText = last turn's prose)
        const finalSceneWords = (lastRenderedSpeakText || '').trim().split(/\s+/).filter(Boolean).length;
        const readingMs = Math.round((finalSceneWords / 200) * 60000);
        const pauseMs = Math.min(Math.max(readingMs, 5000), 12000);
        console.log(`[CLOSING] final scene ${finalSceneWords} words → ${pauseMs}ms reading pause`);
        await new Promise(resolve => setTimeout(resolve, pauseMs));
        showClosingScreen(output.endState, sessionId);
      } catch (e) {
        console.error('[CLOSING] failed to show closing screen:', e);
      }
    }
  } finally {
    submitting = false;
  }
}

formEl.addEventListener('submit', async e => { e.preventDefault(); await submitTurn(inputEl.value); });
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); formEl.requestSubmit(); }
});

// ── Load game ─────────────────────────────────────────────────────────────────

async function loadGame() {
  const titleEl = document.getElementById('header-title');
  try {
    const resp = await fetch(`${API_BASE}/bootstrap?scenarioId=${encodeURIComponent(SCENARIO_ID)}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    bootstrapData      = await resp.json();
    scenario           = bootstrapData.scenario;
    ttsNarrationSpeed  = scenario.tts_narration_speed ?? 1.0;
    locationsList      = bootstrapData.locations    || [];


    document.title = scenario.title || 'Investigation';
    if (titleEl) titleEl.textContent = scenario.title || 'Investigation';

    if (USE_STREAMLINED_ONBOARDING) {
      renderStreamlinedScreen1();
    } else {
      if (!hasSeenWorldIntro()) {
        document.getElementById('role-overlay').classList.add('hidden');
        showWorldIntro();
      } else {
        showRoleSelection();
      }
    }
  } catch (err) {
    document.body.innerHTML = `<div class="error-page"><h1>Failed to load scenario</h1><p>${err.message}</p><p><a href="/" style="color:var(--accent)">Back to admin panel</a></p></div>`;
  }
}

// ── Role selection ────────────────────────────────────────────────────────────

function getCardDisplayName(role) {
  if (role.real_name && role.real_name.trim().length > 0) return role.real_name.trim();
  if (role.display_name) return role.display_name;
  return role.name || role.id;
}

function showRoleSelection() {
  const roleOverlay = document.getElementById('role-overlay');
  const roleCardsEl = document.getElementById('role-cards');

  const overlayTitleEl = document.getElementById('overlay-title');
  const overlayTagline = document.getElementById('overlay-tagline');
  const overlayDesc    = document.getElementById('overlay-desc');
  const overlayObj     = document.getElementById('overlay-objective');
  const overlayGoal    = document.getElementById('overlay-goal');

  if (overlayTitleEl) overlayTitleEl.textContent = scenario.title || 'Investigation';
  if (overlayTagline) overlayTagline.textContent  = scenario.tagline || '';
  if (overlayDesc) {
    const desc = scenario.description || '';
    overlayDesc.innerHTML = desc.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
  }
  if (overlayGoal && scenario.goal) {
    overlayGoal.textContent = scenario.goal;
    if (overlayObj) overlayObj.style.display = 'flex';
  }

  roleCardsEl.innerHTML = '';
  const oldBeginBtn = document.getElementById('role-begin-btn');
  const beginBtn = oldBeginBtn.cloneNode(true);
  oldBeginBtn.replaceWith(beginBtn);
  beginBtn.disabled = true;

  let selectedRoleId = null;
  let selectedStyle  = 'focused';

  for (const role of scenario.playerRoleOptions || []) {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'role-card';
    card.innerHTML = `<span class="role-card-name">${getCardDisplayName(role)}</span><span class="role-card-desc">${role.description || ''}</span>`;
    card.addEventListener('click', () => {
      selectedRoleId = role.id;
      beginBtn.disabled = false;
      roleCardsEl.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    });
    roleCardsEl.appendChild(card);
  }

  roleOverlay.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedStyle = btn.dataset.style;
      roleOverlay.querySelectorAll('.style-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  beginBtn.addEventListener('click', () => {
    if (!selectedRoleId) return;
    audioUnlocked = true;
    audioEl = new Audio();
    audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAIARKwAABCxAgAEABAAZGF0YQAAAAA=';
    audioEl.play().catch(() => {});
    updateTtsToggleUI();
    updateTtsBarUI();
    roleOverlay.classList.add('hidden');
    const role = (scenario.playerRoleOptions || []).find(r => r.id === selectedRoleId);

    const hooks      = Array.isArray(role.character_hooks) ? role.character_hooks.filter(Boolean) : [];
    const hookIndex  = hooks.length > 0 ? Math.floor(Math.random() * hooks.length) : -1;
    const activeHook = hookIndex >= 0 ? hooks[hookIndex] : null;
    const baseBriefing = typeof role.briefing === 'string' && role.briefing.trim()
      ? role.briefing.trim() : (role.description || '');
    const characterContext = activeHook ? `${baseBriefing} ${activeHook}` : baseBriefing;

    warmStart = {
      roleId: selectedRoleId,
      style: selectedStyle,
      activeHook,
      characterContext,
      promise: fetch(`${API_BASE}/start`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          scenarioId:        scenario.id,
          roleId:            selectedRoleId,
          narrativeStyle:    selectedStyle,
          character_context: characterContext,
          player_addition:   null,
          active_hook:       activeHook,
          ttsEnabled,
        }),
      }),
    };

    showIntroScene(scenario, role, activeHook, characterContext);
  });
}

// Screen 1: title + setting + premise sentence + role cards (tap-to-advance)

// Both functions are only reachable when USE_STREAMLINED_ONBOARDING === true.

function buildIntroPanelEl(scenario) {
  const sections = scenario.introduction?.sections || [];
  const world  = sections.find(s => s.type === 'world')?.text  || '';
  const stakes = sections.find(s => s.type === 'stakes')?.text || '';
  const scene  = sections.find(s => s.type === 'scene')?.text  || '';
  if (!world && !stakes && !scene) return null;

  const wrap = document.createElement('div');
  wrap.className = 'intro-panel-wrap';

  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'intro-panel-toggle';
  toggle.setAttribute('aria-expanded', 'false');

  const titleRow = document.createElement('div');
  titleRow.className = 'intro-panel-toggle-title';
  const arrowSpan = document.createElement('span');
  arrowSpan.className = 'intro-panel-arrow';
