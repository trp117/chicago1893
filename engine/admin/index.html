function renderEpilogueSection(data) {
  const ep           = data.scenario?.epilogue || {};
  const generated    = ep.generated  === true;
  const reviewed     = ep.reviewed   === true;
  const chars        = data.characters || [];
  const beats        = (data.storyArc?.acts || []).flatMap(a => a.beats || []);
  const hasPrereqs   = chars.length > 0 && beats.length > 0;
  const genDisabled  = !hasPrereqs;
  const genTitle     = genDisabled ? 'Complete scenario characters and essential beats first' : '';

  const badge = generated
    ? reviewed
      ? `<span id="epilogue-status-badge" style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#f0fdf4;color:#166534">Reviewed</span>`
      : `<span id="epilogue-status-badge" style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#fef3c7;color:#92400e">Pending Review</span>`
    : `<span id="epilogue-status-badge" style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:#f1f5f9;color:var(--text-soft)">Not Generated</span>`;

  let fieldsHtml = '';
  if (generated) {
    const fatesHtml   = (ep.character_fates   || []).map(renderEpilogueCharFateRow).join('');
    const ioFactsHtml = (ep.immediate_outcome?.key_facts || []).map(renderEpilogueFactRow).join('');
    const frameHtml   = (ep.historical_frame  || []).map(renderEpilogueFrameRow).join('');
    const threadsHtml = (ep.open_threads      || []).map(renderEpilogueThreadRow).join('');
    const echoesHtml  = (ep.choice_echoes     || []).map(renderEpilogueEchoRow).join('');

    fieldsHtml = `
      <div style="margin:16px 0;padding:12px 14px;background:#fef2f2;border:1px solid #f87171;border-radius:6px;font-size:13px;color:#991b1b;font-weight:500">
        ⚠ AI-generated historical facts must be verified before publication. Incorrect facts will appear in player epilogues. Review each entry carefully.
      </div>

      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:8px">Character Fates</div>
        <div id="ep-fates-list">${fatesHtml}</div>
        <button type="button" id="add-ep-fate-btn" class="btn btn-secondary btn-sm" style="margin-top:4px">+ Add Character</button>
      </div>

      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:8px">Immediate Outcome — Summary</div>
        <textarea class="ep-io-summary" rows="3" placeholder="Two to three sentences describing the verified historical result…" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;resize:vertical;font-size:13px">${esc(ep.immediate_outcome?.summary || '')}</textarea>
        <div style="font-size:11px;font-weight:600;margin:10px 0 6px;color:var(--text-soft)">Key Facts</div>
        <div id="ep-facts-list">${ioFactsHtml}</div>
        <button type="button" id="add-ep-fact-btn" class="btn btn-secondary btn-sm" style="margin-top:4px">+ Add Key Fact</button>
      </div>

      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:8px">Historical Frame <span style="font-weight:400;font-size:10px">(max 3)</span></div>
        <div id="ep-frame-list">${frameHtml}</div>
        <button type="button" id="add-ep-frame-btn" class="btn btn-secondary btn-sm" style="margin-top:4px">+ Add Frame Entry</button>
      </div>

      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:8px">Open Threads</div>
        <div id="ep-threads-list">${threadsHtml}</div>
        <button type="button" id="add-ep-thread-btn" class="btn btn-secondary btn-sm" style="margin-top:4px">+ Add Thread</button>
      </div>

      <div style="margin-top:20px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft);margin-bottom:8px">Choice Echoes</div>
        <div id="ep-echoes-list">${echoesHtml}</div>
        <button type="button" id="add-ep-echo-btn" class="btn btn-secondary btn-sm" style="margin-top:4px">+ Add Choice Echo</button>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <button type="button" id="mark-epilogue-reviewed-btn" class="btn btn-primary" ${reviewed ? 'disabled' : ''}>
          ${reviewed ? '✓ Historical Data Reviewed' : 'Mark Historical Data Reviewed'}
        </button>
        ${!reviewed ? '<span style="font-size:12px;color:var(--text-soft)">Review all entries carefully before marking as reviewed.</span>' : ''}
      </div>`;
  }

  return `<div style="margin-bottom:20px">
    <details id="epilogue-data-details">
      <summary style="padding:14px 20px;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;list-style:none;user-select:none">
        Historical Epilogue Data
        <span style="font-weight:400;font-size:10px">▸ expand</span>
      </summary>
      <div style="background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:20px">
        <input type="hidden" id="epilogue-generated-input" data-path="scenario.epilogue.generated" value="${generated}">
        <input type="hidden" id="epilogue-reviewed-input"  data-path="scenario.epilogue.reviewed"  value="${reviewed}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Status</span>
          ${badge}
          <button type="button" id="gen-epilogue-btn" class="btn btn-primary btn-sm" ${genDisabled ? 'disabled' : ''} title="${genTitle}">
            ${generated ? '↻ Regenerate Epilogue Data' : '✦ Generate Epilogue Data'}
          </button>
        </div>
        ${fieldsHtml}
      </div>
    </details>
  </div>`;
}

function renderPublicationReview(data) {
  const status = data.scenario?.beats_status || 'not_generated';
  const cl     = data.scenario?.review_checklist || {};
  const statusCfg = {
    not_generated:  { label: 'Not Generated',              color: 'var(--text-soft)', bg: '#f1f5f9' },
    pending_review: { label: 'Generated — Pending Review',  color: '#92400e',          bg: '#fef3c7' },
    approved:       { label: 'Reviewer Approved',           color: '#166534',          bg: '#f0fdf4' },
  };
  const s = statusCfg[status] || statusCfg.not_generated;

  const checkItems = [
    { key: 'beat_count',         label: 'Beat count',                desc: 'The checklist contains between three and six beats total across all acts.' },
    { key: 'sequence_check',     label: 'Sequence check',            desc: 'Beats are ordered correctly across the act structure. Beat one is reachable in Act 1. The final beat occurs in Act 3 or Act 4.' },
    { key: 'path_independence',  label: 'Path independence',          desc: 'Each beat is reachable across multiple valid player choices, not dependent on one specific decision.' },
    { key: 'final_beat_spec',    label: 'Specificity of final beat',  desc: 'The final beat is specific enough that the engine can confirm with certainty when it has been reached.' },
    { key: 'tense_attribution',  label: 'Tense and attribution',      desc: 'Every beat description is written in past tense and describes what the engine confirmed in generated text, not what the player typed.' },
    { key: 'reviewer_summary',   label: 'Reviewer summary',           desc: 'The generated beats reflect the scenario\'s actual dramatic structure and the final beat represents the correct dramatic conclusion.' },
    { key: 'manual_playthrough', label: 'Manual play-through',        desc: 'All beats are reachable on at least two different play paths through the scenario.' },
  ];

  const checkHtml = checkItems.map(item => {
    const state = cl[item.key] || {};
    return `<div data-checklist-key="${item.key}" style="padding:12px 0;border-bottom:1px solid var(--border)">
      <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" class="checklist-cb" ${state.checked ? 'checked' : ''} style="margin-top:3px;flex-shrink:0">
        <span>
          <span style="font-weight:600;font-size:13px;display:block">${item.label}</span>
          <span style="font-size:12px;color:var(--text-soft)">${item.desc}</span>
        </span>
      </label>
      <textarea class="checklist-notes" rows="2" placeholder="Notes…" style="width:100%;padding:6px 8px;font-size:12px;border:1px solid var(--border);border-radius:4px;resize:vertical;color:var(--text-soft)">${esc(state.notes || '')}</textarea>
    </div>`;
  }).join('');

  return `<div style="margin-bottom:20px">
    <details id="pub-review-details">
      <summary style="padding:14px 20px;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;list-style:none;user-select:none">
        Publication Review
        <span style="font-weight:400;font-size:10px">▸ expand</span>
      </summary>
      <div style="background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:20px">
        <input type="hidden" id="beats-status-input" data-path="scenario.beats_status" value="${status}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Status</span>
          <span id="beats-status-badge" style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:${s.bg};color:${s.color}">${s.label}</span>
          <button type="button" id="mark-approved-btn" class="btn btn-primary btn-sm" ${status === 'pending_review' ? '' : 'disabled'}>Mark as Approved</button>
        </div>
        <div id="review-checklist-container">
          ${checkHtml}
        </div>
      </div>
    </details>
  </div>`;
}

async function handleManualSave(data, containerEl) {
  const btn = document.getElementById('preview-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  if (containerEl) collectEdits(containerEl, data);
  try {
    await apiPost('/generate/save', data);
    toast(`"${data.scenario?.title}" saved.`, 'success');
    const pill = document.getElementById('save-status-pill');
    if (pill) { pill.className = 'saved-pill ok'; pill.textContent = '✓ Saved'; }
  } catch (err) {
    toast(`Save failed: ${err.message}`, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  }
}

function renderPreview(data, autoSaved = false) {
  const { scenario = {}, storyArc, characters = [], locations = [], clues = [], playerRoles = [] } = data;
  const scenarioId = scenario.id || scenario.scenario_id || '';

  setTopbar(scenario.title || 'Generated Story', [
    { label: '▶ Play',      cls: 'btn-success',   action: () => { const id = document.querySelector('[data-path="scenario.id"]')?.value || scenarioId; window.open(`/game?scenarioId=${encodeURIComponent(id)}`, '_blank'); } },
    { label: '💾 Save',     cls: 'btn-primary',   action: () => handleManualSave(data, document.getElementById('preview-form')) },
    { label: '+ New Story', cls: 'btn-secondary', action: () => renderGenerator() },
  ]);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[data-view="generate"]')?.classList.add('active');

  const pillHtml = autoSaved
    ? `<span class="saved-pill ok"   id="save-status-pill">✓ Saved</span>`
    : `<span class="saved-pill warn" id="save-status-pill">⚠ Not saved</span>`;

  document.getElementById('content').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:18px;font-weight:700">${esc(scenario.title || 'Untitled')}</span>
          ${pillHtml}
        </div>
        <div style="font-size:12px;color:var(--text-soft);font-family:monospace">${esc(scenarioId)}</div>
      </div>
      <div style="display:flex;gap:16px;font-size:13px;color:var(--text-soft)">
        <span>${characters.length} characters</span>
        <span>${locations.length} locations</span>
        <span>${clues.length} clues</span>
        <span>${playerRoles.length} roles</span>
      </div>
    </div>
    <div id="preview-form" style="max-width:860px">
      ${renderScenarioSection(data)}
      ${storyArc ? renderArcSection(data) : ''}
      ${renderCharactersSection(data)}
      ${renderLocationsSection(data)}
      ${renderCluesSection(data)}
      ${renderPlayerRolesSection(data)}
      ${renderPublicationReview(data)}
      ${(data.scenario?.beats_status || 'not_generated') !== 'approved'
        ? `<div id="approval-warn" style="margin-bottom:12px;padding:10px 14px;background:#fef3c7;border:1px solid #d97706;border-radius:6px;font-size:13px;color:#92400e">This scenario has not been reviewer-approved. It can be saved but not published.</div>`
        : ''}
      ${renderEpilogueSection(data)}
      <div class="form-actions" style="padding-bottom:32px">
        <button class="btn btn-success"   id="preview-play">▶ Play Now</button>
        <button class="btn btn-primary"   id="preview-save">💾 Save</button>
        <button class="btn btn-secondary" id="preview-restart">+ New Story</button>
      </div>
    </div>`;

  const formEl = document.getElementById('preview-form');
  document.getElementById('preview-play').addEventListener('click', () => {
    const id = formEl.querySelector('[data-path="scenario.id"]')?.value || scenarioId;
    window.open(`/game?scenarioId=${encodeURIComponent(id)}`, '_blank');
  });
  document.getElementById('preview-save').addEventListener('click',
    () => handleManualSave(data, formEl));
  document.getElementById('preview-restart').addEventListener('click',
    () => renderGenerator());

  // ── Beat count indicator ────────────────────────────────────────
  function updateBeatCount() {
    const filled = [...formEl.querySelectorAll('.beat-desc')].filter(el => el.value.trim()).length;
    const color  = filled < 3 ? 'var(--warn)' : filled > 6 ? 'var(--danger)' : 'var(--success)';
    const ind = document.getElementById('beat-count-indicator');
    if (ind) ind.innerHTML = `<span style="color:${color};font-weight:600">Total beats: ${filled}</span> <span style="color:var(--text-soft)">/ target 3–6</span>`;
  }

  // ── Status display updater ──────────────────────────────────────
  function updateStatusDisplay(newStatus) {
    const cfg = {
      not_generated:  { label: 'Not Generated',             color: 'var(--text-soft)', bg: '#f1f5f9' },
      pending_review: { label: 'Generated — Pending Review', color: '#92400e',          bg: '#fef3c7' },
      approved:       { label: 'Reviewer Approved',          color: '#166534',          bg: '#f0fdf4' },
    };
    const s = cfg[newStatus] || cfg.not_generated;
    const badge = formEl.querySelector('#beats-status-badge');
    if (badge) { badge.style.background = s.bg; badge.style.color = s.color; badge.textContent = s.label; }
    const appBtn = formEl.querySelector('#mark-approved-btn');
    if (appBtn) appBtn.disabled = newStatus !== 'pending_review';
    if (newStatus === 'approved') {
      const warn = document.getElementById('approval-warn');
      if (warn) warn.remove();
    }
    const statusInput = formEl.querySelector('#beats-status-input');
    if (statusInput) statusInput.value = newStatus;
    data.scenario = data.scenario || {};
    data.scenario.beats_status = newStatus;
  }

  // ── Beat add / remove / mark-approved delegation ────────────────
  formEl.addEventListener('click', e => {
    const addBtn = e.target.closest('[data-add-beat]');
    if (addBtn) {
      const actIdx = parseInt(addBtn.dataset.addBeat, 10);
      const wrap = formEl.querySelector(`#beat-rows-act-${actIdx}`);
      if (wrap) {
        const div = document.createElement('div');
        div.innerHTML = buildBeatRow({ id: '', description: '' }, actIdx);
        wrap.appendChild(div.firstElementChild);
        updateBeatCount();
      }
      return;
    }
    const remBtn = e.target.closest('.remove-beat-btn');
    if (remBtn) { remBtn.closest('.beat-row').remove(); updateBeatCount(); return; }
    if (e.target.closest('#mark-approved-btn')) {
      updateStatusDisplay('approved');
      handleManualSave(data, formEl);
    }
  });

  // ── Keep generate button enabled state in sync ──────────────────
  formEl.addEventListener('input', e => {
    if (e.target.classList.contains('beat-desc') || e.target.classList.contains('beat-id')) {
      updateBeatCount();
    }
    const genBtn = formEl.querySelector('#gen-beats-btn');
    if (genBtn) {
      const world    = formEl.querySelector('[data-path="storyArc.premise"]')?.value.trim();
      const stakes   = formEl.querySelector('[data-path="storyArc.goal"]')?.value.trim();
      const hasBrief = [...formEl.querySelectorAll('[data-path]')]
        .some(el => /^playerRoles\.\d+\.briefing$/.test(el.dataset.path) && el.value.trim());
      const dis = !world || !stakes || !hasBrief;
      genBtn.disabled = dis;
      genBtn.title = dis ? 'Complete World, Stakes, and at least one Role Briefing first' : '';
    }
  });

  // ── Epilogue section — add/remove row delegation ────────────────
  formEl.addEventListener('click', e => {
    if (e.target.closest('.remove-ep-fate-btn'))   { e.target.closest('.ep-fate-row').remove();   return; }
    if (e.target.closest('.remove-ep-fact-btn'))   { e.target.closest('.ep-fact-row').remove();   return; }
    if (e.target.closest('.remove-ep-frame-btn'))  { e.target.closest('.ep-frame-row').remove();  return; }
    if (e.target.closest('.remove-ep-thread-btn')) { e.target.closest('.ep-thread-row').remove(); return; }
    if (e.target.closest('.remove-ep-echo-btn'))   { e.target.closest('.ep-echo-row').remove();   return; }

    if (e.target.closest('#add-ep-fate-btn')) {
      const div = document.createElement('div');
      div.innerHTML = renderEpilogueCharFateRow({});
      formEl.querySelector('#ep-fates-list')?.appendChild(div.firstElementChild);
      return;
    }
    if (e.target.closest('#add-ep-fact-btn')) {
      const div = document.createElement('div');
      div.innerHTML = renderEpilogueFactRow('');
      formEl.querySelector('#ep-facts-list')?.appendChild(div.firstElementChild);
      return;
    }
    if (e.target.closest('#add-ep-frame-btn')) {
      const frameList = formEl.querySelector('#ep-frame-list');
      if (frameList && frameList.querySelectorAll('.ep-frame-row').length >= 3) {
        toast('Maximum three historical frame entries allowed.', 'error');
        return;
      }
      const div = document.createElement('div');
      div.innerHTML = renderEpilogueFrameRow('');
      frameList?.appendChild(div.firstElementChild);
      return;
    }
    if (e.target.closest('#add-ep-thread-btn')) {
      const div = document.createElement('div');
      div.innerHTML = renderEpilogueThreadRow({});
      formEl.querySelector('#ep-threads-list')?.appendChild(div.firstElementChild);
      return;
    }
    if (e.target.closest('#add-ep-echo-btn')) {
      const div = document.createElement('div');
      div.innerHTML = renderEpilogueEchoRow({});
      formEl.querySelector('#ep-echoes-list')?.appendChild(div.firstElementChild);
      return;
    }

    // Mark Historical Data Reviewed
    if (e.target.closest('#mark-epilogue-reviewed-btn')) {
      const revInput = formEl.querySelector('#epilogue-reviewed-input');
      if (revInput) revInput.value = 'true';
      const badge = formEl.querySelector('#epilogue-status-badge');
      if (badge) { badge.style.background = '#f0fdf4'; badge.style.color = '#166534'; badge.textContent = 'Reviewed'; }
      const btn = formEl.querySelector('#mark-epilogue-reviewed-btn');
      if (btn) { btn.disabled = true; btn.textContent = '✓ Historical Data Reviewed'; }
      if (!data.scenario) data.scenario = {};
      if (!data.scenario.epilogue) data.scenario.epilogue = {};
      data.scenario.epilogue.reviewed = true;
      handleManualSave(data, formEl);
      return;
    }
  }, true); // capture phase so it fires before the existing click delegation

  // ── Mark as Approved — warn if epilogue not reviewed ───────────
  formEl.addEventListener('click', e => {
    if (!e.target.closest('#mark-approved-btn')) return;
    const epReviewed = formEl.querySelector('#epilogue-reviewed-input')?.value === 'true'
      || data.scenario?.epilogue?.reviewed === true;
    const epGenerated = formEl.querySelector('#epilogue-generated-input')?.value === 'true'
      || data.scenario?.epilogue?.generated === true;
    if (epGenerated && !epReviewed) {
      toast('Warning: epilogue historical data has not been reviewed. Approve anyway or review the Historical Epilogue Data section first.', 'error');
    }
  });

  // ── Generate Epilogue Data ──────────────────────────────────────
  const genEpilogueBtn = document.getElementById('gen-epilogue-btn');
  if (genEpilogueBtn) {
    genEpilogueBtn.addEventListener('click', async () => {
      if (!confirm('Generate historical epilogue data for this scenario? This will call the AI API and may take up to 30 seconds.')) return;

      const scenarioId = formEl.querySelector('[data-path="scenario.id"]')?.value.trim() || data.scenario?.id || '';
      const title      = formEl.querySelector('[data-path="scenario.title"]')?.value.trim() || '';
      const world      = formEl.querySelector('[data-path="storyArc.premise"]')?.value.trim() || '';
      const stakes     = formEl.querySelector('[data-path="storyArc.goal"]')?.value.trim() || '';
      const characters = (data.characters || []).map(c => ({
        character_id: c.id,
        name:         c.name,
        role:         c.role || c.publicFace || '',
      }));
      const essential_beats = (data.storyArc?.acts || []).flatMap(a => a.beats || []);

      genEpilogueBtn.disabled    = true;
      genEpilogueBtn.textContent = 'Generating historical data…';
      try {
        const epilogue = await apiPost('/generate/epilogue-data', {
          scenarioId, title, world, stakes, characters, essential_beats,
        });
        // Rebuild the epilogue data in the in-memory data object
        if (!data.scenario) data.scenario = {};
        data.scenario.epilogue = epilogue;
        // Re-render just the epilogue section
        const epDetails = formEl.querySelector('#epilogue-data-details');
        if (epDetails) {
          const newHtml = renderEpilogueSection(data);
          const tmp = document.createElement('div');
          tmp.innerHTML = newHtml;
          epDetails.replaceWith(tmp.firstElementChild);
        }
        toast('Epilogue data generated. Review each entry carefully before marking as reviewed.', 'success');
      } catch (err) {
        toast(`Epilogue generation failed: ${err.message}`, 'error');
      } finally {
        genEpilogueBtn.disabled    = false;
        genEpilogueBtn.textContent = data.scenario?.epilogue?.generated ? '↻ Regenerate Epilogue Data' : '✦ Generate Epilogue Data';
      }
    });
  }

  // ── Generate Essential Beats ────────────────────────────────────
  const genBeatsBtn = document.getElementById('gen-beats-btn');
  if (genBeatsBtn) {
    genBeatsBtn.addEventListener('click', async () => {
      const existing = [...formEl.querySelectorAll('.beat-desc')].some(el => el.value.trim());
      if (existing && !confirm('This will replace existing beats. Continue?')) return;

      const title    = formEl.querySelector('[data-path="scenario.title"]')?.value.trim()   || '';
      const premise  = formEl.querySelector('[data-path="scenario.premise"]')?.value.trim() || '';
      const world    = formEl.querySelector('[data-path="storyArc.premise"]')?.value.trim() || '';
      const stakes   = formEl.querySelector('[data-path="storyArc.goal"]')?.value.trim()    || '';
      const briefings = [...formEl.querySelectorAll('[data-path]')]
        .filter(el => /^playerRoles\.\d+\.briefing$/.test(el.dataset.path))
        .map(el => el.value.trim()).filter(Boolean);

      genBeatsBtn.disabled = true;
      genBeatsBtn.textContent = 'Generating…';
      try {
        const beats = await apiPost('/generate/essential-beats', { title, premise, world, stakes, briefings });
        if (!Array.isArray(beats)) throw new Error('Unexpected response shape');

        // Clear all act repeaters then populate into Act 1
        formEl.querySelectorAll('[data-beat-list]').forEach(w => { w.innerHTML = ''; });
        const act0 = formEl.querySelector('[data-beat-list="0"]');
        if (act0) {
          beats.forEach(beat => {
            const div = document.createElement('div');
            div.innerHTML = buildBeatRow(beat, 0);
            act0.appendChild(div.firstElementChild);
          });
        }
        updateBeatCount();
        updateStatusDisplay('pending_review');
        toast('Essential beats generated. Review and approve before publishing.', 'success');
      } catch (err) {
        toast(`Beat generation failed: ${err.message}`, 'error');
      } finally {
        genBeatsBtn.disabled = false;
        genBeatsBtn.textContent = '✦ Generate Essential Beats';
      }
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// TRANSCRIPTS
// ═══════════════════════════════════════════════════════════════
async function renderTranscripts() {
  setTopbar('Transcripts', []);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[data-view="transcripts"]')?.classList.add('active');
  document.getElementById('content').innerHTML = '<p>Loading…</p>';

  let items = [];
  try { items = await apiGet('/transcripts'); } catch (err) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><p>Could not load transcripts: ${err.message}</p></div>`;
    return;
  }

  const badge = document.getElementById('badge-transcripts');
  if (badge) badge.textContent = items.length;

  if (!items.length) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <p>No transcripts yet.</p>
        <p style="font-size:13px">Transcripts are recorded automatically when you play a session from start to finish.</p>
      </div>`;
    return;
  }

  const resultBadge = r => {
    if (r === 'in-progress') return `<span class="tag" style="background:#fef3c7;color:#92400e">In progress</span>`;
    if (r.includes('success')) return `<span class="tag" style="background:#f0fdf4;color:#166534">Success</span>`;
    return `<span class="tag" style="background:#fef2f2;color:#991b1b">${r}</span>`;
  };

  const rows = items.map(t => {
    const dateStr = t.started ? new Date(t.started).toLocaleString() : '—';
    const kb = t.size ? `${(t.size / 1024).toFixed(1)} KB` : '—';
    return `<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text-soft)">${t.id.slice(0, 8)}…</td>
      <td>${esc(t.scenario)}</td>
      <td>${esc(t.character)}</td>
      <td>${dateStr}</td>
      <td style="text-align:center">${t.turns}</td>
      <td>${resultBadge(t.result)}</td>
      <td style="text-align:right;white-space:nowrap;color:var(--text-soft);font-size:12px">${kb}</td>
      <td style="text-align:right;white-space:nowrap">
        <a class="btn btn-secondary btn-sm" href="${API}/transcripts/${t.id}/download" download="transcript-${t.id}.md" style="text-decoration:none;margin-right:6px">Download</a>
        <button class="btn btn-danger btn-sm" data-delete-transcript="${t.id}">Delete</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:#f8fafc;border-bottom:1px solid var(--border)">
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Session</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Scenario</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Character</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Started</th>
            <th style="padding:10px 14px;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Turns</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Result</th>
            <th style="padding:10px 14px;text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Size</th>
            <th style="padding:10px 14px"></th>
          </tr>
        </thead>
        <tbody id="transcript-tbody">
          ${rows}
        </tbody>
      </table>
    </div>`;

  document.getElementById('transcript-tbody').addEventListener('click', async e => {
    const btn = e.target.closest('[data-delete-transcript]');
    if (!btn) return;
    const id   = btn.dataset.deleteTranscript;
    const name = `transcript-${id.slice(0, 8)}…`;
    document.getElementById('modal-title').textContent = 'Delete Transcript';
    document.getElementById('modal-body').textContent  = `Delete ${name}? This cannot be undone.`;
    document.getElementById('modal-overlay').classList.remove('hidden');

    const onConfirm = async () => {
      cleanup();
      try {
        await apiDelete(`/transcripts/${id}`);
        toast('Transcript deleted.', 'success');
        renderTranscripts();
      } catch (err) { toast(err.message, 'error'); }
    };
    const cleanup = () => {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-confirm').removeEventListener('click', onConfirm);
      document.getElementById('modal-cancel').removeEventListener('click', cleanup);
    };
    document.getElementById('modal-confirm').addEventListener('click', onConfirm);
    document.getElementById('modal-cancel').addEventListener('click', cleanup);
  });
}

// ═══════════════════════════════════════════════════════════════
// REVIEW TAB (read-only)
// ═══════════════════════════════════════════════════════════════
async function renderReview() {
  setTopbar('Prose Quality Review', []);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[data-view="review"]')?.classList.add('active');

  // Build scenario selector
  const scenarios = state.scenarios.length
    ? state.scenarios
    : await apiGet('/scenarios').catch(() => []);
  if (!state.scenarios.length && scenarios.length) state.scenarios = scenarios;

  const options = scenarios.map(s =>
    `<option value="${esc(s.id)}">${esc(s.title || s.id)}</option>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div style="max-width:860px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <select id="review-scenario-select" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">
          ${options}
        </select>
        <span style="font-size:12px;color:var(--text-soft)">Run <code>npm run review &lt;scenarioId&gt;</code> to generate a report</span>
      </div>
      <div id="review-content"><p style="color:var(--text-soft)">Select a scenario to view its review report.</p></div>
    </div>`;

  async function loadReport(scenarioId) {
    document.getElementById('review-content').innerHTML = '<p>Loading…</p>';
    try {
      const data = await apiGet(`/reviews/${encodeURIComponent(scenarioId)}`);
      if (!data.content) {
        document.getElementById('review-content').innerHTML =
          `<div class="empty-state"><p>No review report found for this scenario.</p><p style="font-size:13px">Run: <code>npm run review ${esc(scenarioId)}</code></p></div>`;
        return;
      }
      // Render markdown-lite: headings, bold, code, paragraphs
      const html = data.content
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/^## (.+)$/gm, '<h3 style="margin:20px 0 6px;color:var(--text)">$1</h3>')
        .replace(/^### (.+)$/gm, '<h4 style="margin:16px 0 4px;color:var(--text)">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin:6px 0 10px 18px;padding:0">$&</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>');
      document.getElementById('review-content').innerHTML =
        `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 24px;font-size:13px;line-height:1.7"><p>${html}</p></div>`;
    } catch (err) {
      document.getElementById('review-content').innerHTML =
        `<div class="empty-state"><p>Could not load report: ${err.message}</p></div>`;
    }
  }

  const sel = document.getElementById('review-scenario-select');
  if (sel) {
    sel.addEventListener('change', () => loadReport(sel.value));
    if (sel.value) loadReport(sel.value);
  }
}

// ═══════════════════════════════════════════════════════════════
// SCENARIO HEALTH + REPAIR
// ═══════════════════════════════════════════════════════════════
async function checkScenarioHealth(scenarioId) {
  const card = document.querySelector(`[data-scenario="${scenarioId}"]`);
  if (!card) return;
  const dot = card.querySelector('.health-dot');
  try {
    const health = await apiGet(`/scenarios/${encodeURIComponent(scenarioId)}/health`);
    if (!dot) return;
    if (health.healthy) {
      dot.className = 'health-dot healthy';
      dot.title = 'All required fields present';
    } else {
      dot.className = 'health-dot needs-repair';
      dot.title = `Missing: ${health.missing.join(' · ')}`;
      const repairBtn = card.querySelector('.repair-btn');
      if (repairBtn) repairBtn.style.display = 'inline-flex';
    }
  } catch {
    if (dot) { dot.className = 'health-dot'; dot.style.background = 'var(--border)'; dot.title = 'Health check unavailable'; }
  }
}

async function repairScenario(scenarioId) {
  const card = document.querySelector(`[data-scenario="${scenarioId}"]`);
  const btn  = card?.querySelector('.repair-btn');
  if (btn) { btn.textContent = 'Repairing…'; btn.disabled = true; }
  try {
    const result = await apiFetch('POST', `/scenarios/${encodeURIComponent(scenarioId)}/repair`, {});
    if (result.repairs?.length)  toast(`Repaired: ${result.repairs.join(', ')}`, 'success');
    else                         toast(result.message || 'No repairs needed', 'info');
    if (result.errors?.length)   toast(`Errors: ${result.errors.join(', ')}`, 'error');
    await checkScenarioHealth(scenarioId);
  } catch (err) {
    toast(`Repair failed: ${err.message}`, 'error');
  } finally {
    if (btn) { btn.textContent = '⚕ Repair'; btn.disabled = false; }
  }
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR NAVIGATION EVENTS
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.nav-link[data-entity]').forEach(link => {
  link.addEventListener('click', () => navigate(link.dataset.entity));
});
document.querySelector('.nav-link[data-view="dashboard"]')
  ?.addEventListener('click', () => renderDashboard());
document.querySelector('.nav-link[data-view="generate"]')
  ?.addEventListener('click', () => renderGenerator());
document.querySelector('.nav-link[data-view="transcripts"]')
  ?.addEventListener('click', () => renderTranscripts());
document.querySelector('.nav-link[data-view="review"]')
  ?.addEventListener('click', () => renderReview());

// ═══════════════════════════════════════════════════════════════
// INIT

renderDashboard();
</script>
