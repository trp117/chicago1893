async function renderReview() {
  setTopbar('Prose Quality Review', []);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[data-view="review"]')?.classList.add('active');

  // Build scenario selector
  const scenarios = state.scenarios.length
    ? state.scenarios
    : await apiGet('/scenarios').catch(() => []);
  if (!state.scenarios.length && scenarios.length) state.scenarios = scenarios;

  const options = scenarios.map(s =>
    `<option value="${esc(s.id)}">${esc(s.title || s.id)}</option>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div style="max-width:860px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <select id="review-scenario-select" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">
          ${options}
        </select>
        <span style="font-size:12px;color:var(--text-soft)">Run <code>npm run review &lt;scenarioId&gt;</code> to generate a report</span>
      </div>
      <div id="review-content"><p style="color:var(--text-soft)">Select a scenario to view its review report.</p></div>
    </div>`;

  async function loadReport(scenarioId) {
    document.getElementById('review-content').innerHTML = '<p>Loading…</p>';
    try {
      const data = await apiGet(`/reviews/${encodeURIComponent(scenarioId)}`);
      if (!data.content) {
        document.getElementById('review-content').innerHTML =
          `<div class="empty-state"><p>No review report found for this scenario.</p><p style="font-size:13px">Run: <code>npm run review ${esc(scenarioId)}</code></p></div>`;
        return;
      }
      // Render markdown-lite: headings, bold, code, paragraphs
      const html = data.content
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/^## (.+)$/gm, '<h3 style="margin:20px 0 6px;color:var(--text)">$1</h3>')
        .replace(/^### (.+)$/gm, '<h4 style="margin:16px 0 4px;color:var(--text)">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul style="margin:6px 0 10px 18px;padding:0">$&</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>');
      document.getElementById('review-content').innerHTML =
        `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 24px;font-size:13px;line-height:1.7"><p>${html}</p></div>`;
    } catch (err) {
      document.getElementById('review-content').innerHTML =
        `<div class="empty-state"><p>Could not load report: ${err.message}</p></div>`;
    }
  }

  const sel = document.getElementById('review-scenario-select');
  if (sel) {
    sel.addEventListener('change', () => loadReport(sel.value));
    if (sel.value) loadReport(sel.value);
  }
}

// SCENARIO HEALTH + REPAIR
// ═══════════════════════════════════════════════════════════════
async function checkScenarioHealth(scenarioId) {
  const card = document.querySelector(`[data-scenario="${scenarioId}"]`);
  if (!card) return;
  const dot = card.querySelector('.health-dot');
  try {
    const health = await apiGet(`/scenarios/${encodeURIComponent(scenarioId)}/health`);
    if (!dot) return;
    const repairBtn = card.querySelector('.repair-btn');
    if (!health.healthy) {
      dot.className = 'health-dot needs-repair';
      dot.title = `Missing: ${health.missing.join(' · ')}`;
    } else if (health.warnings?.length) {
      dot.className = 'health-dot has-warnings';
      dot.title = `Warnings: ${health.warnings.join(' · ')}`;
    } else {
      dot.className = 'health-dot healthy';
      dot.title = 'All required fields present';
    }
    if (repairBtn) repairBtn.style.display = 'inline-flex';
  } catch {
    if (dot) { dot.className = 'health-dot'; dot.style.background = 'var(--border)'; dot.title = 'Health check unavailable'; }
  }
}

async function repairScenario(scenarioId) {
  const card = document.querySelector(`[data-scenario="${scenarioId}"]`);
  const btn  = card?.querySelector('.repair-btn');
  if (btn) { btn.textContent = 'Repairing…'; btn.disabled = true; }
  try {
    const result = await apiFetch('POST', `/scenarios/${encodeURIComponent(scenarioId)}/repair`, {});
    if (result.repairs?.length)  toast(`Repaired: ${result.repairs.join(', ')}`, 'success');
    else                         toast(result.message || 'No repairs needed', 'info');
    if (result.errors?.length)   toast(`Errors: ${result.errors.join(', ')}`, 'error');
    await checkScenarioHealth(scenarioId);
  } catch (err) {
    toast(`Repair failed: ${err.message}`, 'error');
  } finally {
    if (btn) { btn.textContent = '⚕ Repair'; btn.disabled = false; }
  }
}

// Picker swaps the displayed prompt via textContent (never innerHTML — the FIELD
// tokens contain <angle brackets> that HTML parsing would mangle).
function selectReviewPrompt(sel) {
  const el = document.getElementById('correction-prompt-text');
  if (el) el.textContent = REVIEW_PROMPTS[sel.value] || REVIEW_PROMPTS.generic;
}

// Each selectable section → its prompt's [PASTE … DATA HERE] marker + the builder
// that produces that section's data body. The builders return line arrays (joined
// here); allstory reuses the full scenario-doc builder. generic has no entry — it's
// a markerless instruction block, copied as-is. Source of truth = the same helpers
// behind the legacy "Copy + AI Prompt" button.
const PICKER_SECTION_DATA = {
  opening:    { marker: '[PASTE OPENING SCENE DATA HERE]',                          build: d => buildOpeningSection(d) },
  roles:      { marker: '[PASTE PLAYER ROLES DATA HERE]',                           build: d => buildRolesSection(d) },
  gameplay:   { marker: '[PASTE WIN/FAIL CONDITIONS AND PRESSURE EVENTS DATA HERE]', build: d => buildGameplaySection(d) },
  storyarc:   { marker: '[PASTE STORY ARC DATA HERE]',                              build: d => buildStoryArcSection(d) },
  characters: { marker: '[PASTE CHARACTERS DATA HERE]',                            build: d => buildCharactersSection(d) },
  locations:  { marker: '[PASTE LOCATIONS DATA HERE]',                             build: d => buildLocationsSection(d) },
  clues:      { marker: '[PASTE CLUES DATA HERE]',                                 build: d => buildCluesSection(d) },
  vocabulary: { marker: '[PASTE PERIOD VOCABULARY DATA HERE]',                     build: d => buildVocabSection(d) },
  techfacts:  { marker: '[PASTE TECHNICAL FACTS DATA HERE]',                       build: d => buildTechFactsSection(d) },
  epilogue:   { marker: '[PASTE EPILOGUE DATA HERE]',                              build: d => buildEpilogueSection(d) },
  allstory:   { marker: '[PASTE THE COMPLETE SCENARIO DATA HERE]',                 build: d => [buildScenarioDocText(d)] },
};

// Copy = prompt + that section's data, spliced into the marker. One click →
// paste-ready, like the legacy Copy + AI Prompt button. Function-replacer keeps
// $-bearing historical text and <angle-bracket> FIELD tokens literal.
function copyCorrectionPrompt(btn) {
  const sel    = document.getElementById('review-prompt-section');
  const key    = sel ? sel.value : 'generic';
  const prompt = REVIEW_PROMPTS[key] || REVIEW_PROMPTS.generic;
  const data   = window._aiPanelData;
  const spec   = PICKER_SECTION_DATA[key];
  let text;
  if (spec && data) {
    const body = spec.build(data).join('\n');
    text = prompt.replace(spec.marker, () => body);
  } else {
    // generic (no marker), or data not yet loaded → copy the prompt as-is.
    text = prompt;
  }
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => toast('Clipboard write failed', 'error'));
}

async function initAIPanel(scenarioId) {

  window._aiDiffs = [];

  const ps = document.getElementById('correction-prompt-text');
  if (ps) ps.textContent = REVIEW_PROMPTS.generic;

}

function switchAITab(btn) {
  document.querySelectorAll('.ai-tab').forEach(t => {
    t.style.color = 'var(--text-muted)';
    t.style.borderBottom = 'none';
    t.classList.remove('active');
  });
  btn.style.color = 'var(--accent)';
  btn.style.borderBottom = '2px solid var(--accent)';
  btn.classList.add('active');
  const tab = btn.dataset.tab;
  document.getElementById('ai-tab-corrections').style.display = tab === 'corrections' ? '' : 'none';
  document.getElementById('ai-tab-ending-notes').style.display = tab === 'ending-notes' ? '' : 'none';
  document.getElementById('ai-tab-versions').style.display = tab === 'versions' ? '' : 'none';
  if (tab === 'versions') loadVersionHistory(window._aiPanelScenarioId);
}

function copyPrompt(elementId) {
  const text = document.getElementById(elementId).textContent;
  navigator.clipboard.writeText(text).then(() => toast('Prompt copied', 'success'));
}

function parseCorrections(scenarioId) {
  const raw = document.getElementById('corrections-paste').value.trim();
  if (!raw) return toast('Paste a response first', 'error');
  const blocks = [];
  const regex = /---CORRECTION---([\s\S]*?)---END---/g;
  let match;
  while ((match = regex.exec(raw)) !== null) {
    const block = match[1].trim();
    const get = (label) => {
      // Terminate a field only at a KNOWN label line, so a body containing an
      // internal label-like line (e.g. "NOTE:") isn't silently truncated.
      const re = new RegExp(label + ':\\s*([\\s\\S]*?)(?=\\n(?:SECTION|FIELD|CURRENT|REPLACE WITH|REASON|SOURCE):|$)');
      const m = block.match(re);
      return m ? m[1].trim() : '';
    };
    blocks.push({
      id: blocks.length,
      section: get('SECTION'),
      field: get('FIELD'),
      current: get('CURRENT'),
      replacewith: get('REPLACE WITH'),
      reason: get('REASON'),
      source: get('SOURCE'),
      decision: 'pending'
    });
  }
  const confirmed = [];
  const confirmedRe = /---CONFIRMED:\s*([^-\n]+)---/g;
  let cm;
  while ((cm = confirmedRe.exec(raw)) !== null) confirmed.push(cm[1].trim());
  if (blocks.length === 0 && confirmed.length === 0) return toast('No corrections or confirmations found — check the format', 'error');
  window._aiDiffs = blocks;
  renderDiffReviewer(blocks, confirmed);
}

function renderDiffReviewer(blocks, confirmed) {
  const diff = document.getElementById('corrections-diff');
  const actions = document.getElementById('corrections-actions');

    ).join('') + '</div>';
  }
  if (blocks.length === 0) {
    html += '<div style=padding:12px;background:#f0faf0;border:1px solid #b8e0b8;border-radius:6px;font-size:13px;color:#2a7a2a>No corrections needed — all sections confirmed accurate.</div>';
    diff.innerHTML = html;
    actions.style.display = 'none';
    return;
  }
  html += blocks.map(b => `
    <div id='diff-card-${b.id}' style='border:1px solid var(--border-color);border-radius:6px;margin-bottom:10px;overflow:hidden'>
      <div style='padding:8px 12px;background:var(--bg-secondary,#f5f5f5);display:flex;align-items:center;justify-content:space-between;gap:8px'>
        <span style='font-size:12px;font-family:monospace;color:var(--accent)'>${b.section}${b.field ? ' → ' + b.field : ''}</span>

      </div>
      <div style='padding:10px 12px'>
        <div style='font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px'>Current</div>

        <div style='font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px'>Replace with</div>
        <div style='padding:6px 8px;background:#f5fff5;border-left:3px solid #2ecc71;border-radius:3px;font-size:12px;margin-bottom:8px;white-space:pre-wrap'>${escapeHtml(b.replacewith)}</div>
        ${b.reason ? '<div style=font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:6px>' + escapeHtml(b.reason) + '</div>' : ''}
        ${b.source ? '<div style=font-size:11px;color:var(--text-muted);margin-bottom:8px>Source: ' + escapeHtml(b.source) + '</div>' : ''}
        <div id='manual-editor-${b.id}' style='display:none;margin-bottom:8px'>
          <textarea id='manual-text-${b.id}' style='width:100%;height:80px;padding:8px;border:1px solid var(--accent);border-radius:4px;font-size:12px;font-family:inherit;resize:vertical'>${escapeHtml(b.replacewith)}</textarea>
          <button onclick='saveManualDiff(${b.id})' style='padding:4px 10px;font-size:11px;border:1px solid #2ecc71;border-radius:4px;background:#f5fff5;cursor:pointer;margin-top:4px'>Save Edit</button>
          <button onclick='cancelManualDiff(${b.id})' style='padding:4px 10px;font-size:11px;border:1px solid var(--border-color);border-radius:4px;background:white;cursor:pointer;margin-top:4px;margin-left:4px'>Cancel</button>
        </div>
        <div style='display:flex;gap:6px'>
          <button onclick='acceptDiff(${b.id})' style='padding:4px 12px;font-size:12px;border:1px solid #2ecc71;border-radius:4px;background:#f5fff5;cursor:pointer'>✓ Accept</button>
          <button onclick='rejectDiff(${b.id})' style='padding:4px 12px;font-size:12px;border:1px solid #e74c3c;border-radius:4px;background:#fff5f5;cursor:pointer'>✕ Reject</button>
          <button onclick='editDiff(${b.id})' style='padding:4px 12px;font-size:12px;border:1px solid var(--border-color);border-radius:4px;background:white;cursor:pointer'>✎ Edit</button>
        </div>
      </div>
    </div>`).join('');
  diff.innerHTML = html;
  actions.style.display = '';
  updateDiffSummary();
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function acceptDiff(id) {
  const d = window._aiDiffs.find(x => x.id === id);
  if (d) d.decision = 'accepted';
  document.getElementById('diff-card-' + id).style.borderColor = '#2ecc71';
  document.getElementById('diff-status-' + id).textContent = '✓ accepted';
  document.getElementById('diff-status-' + id).style.color = '#2ecc71';
  updateDiffSummary();
}

function rejectDiff(id) {
  const d = window._aiDiffs.find(x => x.id === id);
  if (d) d.decision = 'rejected';
  document.getElementById('diff-card-' + id).style.borderColor = '#e74c3c';
  document.getElementById('diff-card-' + id).style.opacity = '0.5';
  document.getElementById('diff-status-' + id).textContent = '✕ rejected';
  document.getElementById('diff-status-' + id).style.color = '#e74c3c';
  updateDiffSummary();
}

function editDiff(id) {
  document.getElementById('manual-editor-' + id).style.display = '';
}

function cancelManualDiff(id) {
  document.getElementById('manual-editor-' + id).style.display = 'none';
}

function saveManualDiff(id) {
  const d = window._aiDiffs.find(x => x.id === id);
  if (d) {
    d.replacewith = document.getElementById('manual-text-' + id).value;
    d.decision = 'edited';
  }
  document.getElementById('diff-card-' + id).style.borderColor = '#f39c12';
  document.getElementById('diff-status-' + id).textContent = '✎ edited';
  document.getElementById('diff-status-' + id).style.color = '#f39c12';
  document.getElementById('manual-editor-' + id).style.display = 'none';
  updateDiffSummary();
}

function acceptAllDiffs() {
  window._aiDiffs.forEach(d => { if (d.decision === 'pending') acceptDiff(d.id); });
}

function rejectAllDiffs() {
  window._aiDiffs.forEach(d => { if (d.decision === 'pending') rejectDiff(d.id); });
}

function updateDiffSummary() {
  const total = window._aiDiffs.length;
  const accepted = window._aiDiffs.filter(d => d.decision === 'accepted').length;
  const rejected = window._aiDiffs.filter(d => d.decision === 'rejected').length;
  const edited = window._aiDiffs.filter(d => d.decision === 'edited').length;
  const pending = total - accepted - rejected - edited;
  document.getElementById('diff-summary-text').textContent =
    accepted + ' accepted · ' + rejected + ' rejected · ' + edited + ' edited · ' + pending + ' pending';
}

async function applyCorrections(scenarioId) {
  const accepted = window._aiDiffs.filter(d => d.decision === 'accepted' || d.decision === 'edited');
  if (accepted.length === 0) return toast('No accepted corrections to apply', 'error');
  try {
    const data = await apiFetch('GET', '/scenarios/' + scenarioId + '/full');
    const results = [];
    let appliedCount = 0;
    for (const d of accepted) {
      const res = resolveAndApply(data, d);
      results.push({ section: d.section, field: d.field, current: d.current, ...res });
      if (res.outcome === 'applied') appliedCount++;
    }
    if (appliedCount > 0) {
      // Preserve read-ground-truth → edit → dual-write: /generate/save writes local + Supabase.
      await apiPost('/generate/save', data);
      await apiPost('/pipeline/snapshot/' + scenarioId, {
        label: 'corrections_applied',
        pipeline_step: 'manual_correction',
        changes_applied: appliedCount
      });
    }
    renderInjectionResults(results, appliedCount);
  } catch (err) {
    toast(err.message, 'error');
  }
}

// ── FIELD-scoped, CURRENT-verified correction resolver ──────────────────────────
// Locate by FIELD (id[.subfield]) → fall back to SECTION scope → verify with CURRENT
// → replace ONLY the single resolved field. No tree-wide replacement (kills over-apply);
// every correction returns an explicit outcome (applied / field-not-found /
// current-mismatch / ambiguous), surfaced in the UI rather than a toast count.

function _normWs(s) { return String(s == null ? '' : s).replace(/\s+/g, ' ').trim(); }

// Whitespace-tolerant literal pattern. Quotes/dashes must match literally — a
// smart-quote / em-dash / paraphrase variant deliberately yields current-mismatch
// (surfaced) rather than being silently coerced.
function _flexPattern(s) {
  return String(s).trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+');
}
function _replaceOnce(raw, current, replacewith) {
  let re;
  try { re = new RegExp(_flexPattern(current)); } catch { return { ok: false, value: raw }; }
  if (!re.test(raw)) return { ok: false, value: raw };
  return { ok: true, value: raw.replace(re, () => replacewith) };  // fn-replacer: no $ interpretation
}

// Editable string leaves within a scope, as {container, key} so we can mutate in place.
function _collectSlots(node, out) {
  if (Array.isArray(node)) {
    node.forEach((v, i) => {
      if (typeof v === 'string') out.push({ container: node, key: i });
      else if (v && typeof v === 'object') _collectSlots(v, out);
    });
  } else if (node && typeof node === 'object') {
    for (const k of Object.keys(node)) {
      const v = node[k];
      if (typeof v === 'string') out.push({ container: node, key: k });
      else if (v && typeof v === 'object') _collectSlots(v, out);
    }
  }
}

// Resolve a FIELD id across all six composite branches. Beats match by SLUG id.
function _findRecordById(data, id) {
  if (!id) return null;
  const inArr = (arr, idKey) => (arr || []).find(x => x && x[idKey] === id);
  let r = inArr(data.characters, 'id'); if (r) return r;
  r = inArr(data.playerRoles, 'id'); if (r) return r;
  r = inArr(data.locations, 'id'); if (r) return r;
  r = inArr(data.clues, 'id'); if (r) return r;
  for (const act of (data.storyArc?.acts || [])) { r = inArr(act.beats, 'id'); if (r) return r; } // beat slug
  r = inArr(data.scenario?.technical_facts?.facts, 'fact_id'); if (r) return r;
  r = inArr(data.scenario?.epilogue?.character_fates, 'character_id'); if (r) return r;
  return null;
}

// Walk a dotted subpath within a record to a single string slot.
function _navigateSub(rec, sub) {
  const parts = sub.split('.');
  let cur = rec, container = null, key = null;
  for (const p of parts) {
    if (cur == null || typeof cur !== 'object') return null;
    container = cur; key = Array.isArray(cur) ? Number(p) : p;
    cur = cur[key];
  }
  return (container && typeof container[key] === 'string') ? { container, key } : null;
}

// SECTION label → subtree of the composite.
function _resolveSectionNode(data, section) {
  const s = _normWs(section).toLowerCase();
  const sc = data.scenario || {};
  if (!s) return undefined;
  switch (s) {
    case 'characters':        return data.characters;
    case 'player roles':      return data.playerRoles;
    case 'locations':         return data.locations;
    case 'clues':             return data.clues;
    case 'story arc':         return (data.storyArc?.acts || []).flatMap(a => a.beats || []);
    case 'win conditions':    return { winConditions: sc.winConditions, failConditions: sc.failConditions, partialSuccessExamples: sc.partialSuccessExamples };
    case 'opening scene':     return { openingSituation: sc.openingSituation, introduction: sc.introduction };
    case 'period vocabulary': return sc.period_vocabulary;
    case 'technical facts':   return sc.technical_facts;
    case 'epilogue':          return sc.epilogue;
    case 'character fates':   return sc.epilogue?.character_fates;
    case 'immediate outcome': return sc.epilogue?.immediate_outcome;
    case 'historical frame':  return sc.epilogue?.historical_frame;
    case 'open threads':      return sc.epilogue?.open_threads;
    case 'choice echoes':     return sc.epilogue?.choice_echoes;
    default:                  return undefined;
  }
}

function resolveAndApply(data, corr) {
  const field = (corr.field || '').trim();
  const cur = _normWs(corr.current);
  if (!cur) return { outcome: 'current-mismatch', detail: 'empty CURRENT text' };

  let explicitSlots = null, scopeNode = null, label = null;

  // Layer 1 — FIELD: id[.subfield] across all branches (beat ids are slugs).
  if (field) {
    const dot = field.indexOf('.');
    const id = dot >= 0 ? field.slice(0, dot) : field;
    const sub = dot >= 0 ? field.slice(dot + 1) : null;
    const rec = _findRecordById(data, id);
    if (rec) {
      label = field;
      if (sub) {
        const slot = _navigateSub(rec, sub);
        if (slot) explicitSlots = [slot];
        else scopeNode = rec;  // subfield not a string — search the whole record
      } else {
        scopeNode = rec;
      }
    }
  }

  // Layer 2 — SECTION fallback (only if FIELD did not resolve a scope).
  if (!explicitSlots && !scopeNode) {
    scopeNode = _resolveSectionNode(data, corr.section);
    label = corr.section || field || '(unscoped)';
    if (scopeNode == null) {
      return { outcome: 'field-not-found', detail: `FIELD "${field || '∅'}" / SECTION "${corr.section || '∅'}" did not resolve` };
    }
  }

  // Locate + verify CURRENT within the resolved scope.
  let slots = explicitSlots;
  if (!slots) { slots = []; _collectSlots(scopeNode, slots); }
  const matches = slots.filter(s => _normWs(s.container[s.key]).includes(cur));

  if (matches.length === 0) return { outcome: 'current-mismatch', detail: `CURRENT not found in ${label}` };
  if (matches.length > 1)  return { outcome: 'ambiguous', count: matches.length, detail: `CURRENT matches ${matches.length} fields in ${label} — none applied` };

  const slot = matches[0];
  const rep = _replaceOnce(slot.container[slot.key], corr.current, corr.replacewith);
  if (!rep.ok) return { outcome: 'current-mismatch', detail: `CURRENT located but exact replace failed in ${label}` };
  slot.container[slot.key] = rep.value;  // bounded: single field only
  return { outcome: 'applied', detail: label };
}

function renderInjectionResults(results, appliedCount) {
  const el = document.getElementById('corrections-diff');
  const C = o => o === 'applied' ? '#2a7a2a' : o === 'ambiguous' ? '#b8860b' : '#c0392b';
  const BG = o => o === 'applied' ? '#f0faf0' : o === 'ambiguous' ? '#fff8e6' : '#fff5f5';
  const L = o => ({ 'applied': '✓ applied', 'field-not-found': '✕ field not found', 'current-mismatch': '✕ current mismatch', 'ambiguous': '⚠ ambiguous — not applied' }[o] || o);
  const failed = results.length - appliedCount;
  let html = `<div style="margin-bottom:10px;font-weight:600;font-size:13px">Injection results — ${appliedCount}/${results.length} applied${appliedCount > 0 ? ' &amp; saved' : ''}</div>`;
  html += results.map(r => `
    <div style="border:1px solid var(--border-color);border-left:4px solid ${C(r.outcome)};border-radius:4px;background:${BG(r.outcome)};padding:8px 10px;margin-bottom:6px;font-size:12px">
      <div style="font-family:monospace;color:var(--accent)">${escapeHtml(r.section || '')}${r.field ? ' → ' + escapeHtml(r.field) : ''}</div>
      <div style="color:${C(r.outcome)};font-weight:600">${L(r.outcome)}${r.detail ? ': ' + escapeHtml(r.detail) : ''}</div>
      ${r.outcome !== 'applied' ? `<div style="color:var(--text-muted);margin-top:3px;white-space:pre-wrap">CURRENT: ${escapeHtml((r.current || '').slice(0, 140))}</div>` : ''}
    </div>`).join('');
  if (el) el.innerHTML = html;
  toast(`${appliedCount} applied${failed ? ', ' + failed + ' need attention (see results panel)' : ' &amp; saved'}`, failed ? 'warning' : 'success');
}

function parseEndingNotes(scenarioId) {
  const raw = document.getElementById('ending-notes-paste').value.trim();
  if (!raw) return toast('Paste a response first', 'error');
  try {
    const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    const data = JSON.parse(clean);
    const notes = data.ending_notes || data;
    if (!Array.isArray(notes) || notes.length === 0) return toast('No ending notes found in response', 'error');
    window._aiEndingNotes = notes;
    renderEndingNotesPreview(notes);
  } catch (err) {
    toast('Could not parse JSON — check the format: ' + err.message, 'error');
  }
}

function renderEndingNotesPreview(notes) {
  const preview = document.getElementById('ending-notes-preview');
  const actions = document.getElementById('ending-notes-actions');
  preview.innerHTML = notes.map(n => `
    <div style='border:1px solid var(--accent);border-radius:6px;margin-bottom:10px;overflow:hidden'>
      <div style='padding:8px 12px;background:var(--bg-secondary,#f5f5f5)'>
        <span style='font-size:13px;font-weight:600;color:var(--accent)'>${escapeHtml(n.role_name)}</span>
        ${n.access_level ? '<span style=margin-left:8px;font-size:11px;color:var(--text-muted)>' + n.access_level + '</span>' : ''}
      </div>
      <div style='padding:10px 12px;font-size:12px'>
        ${n.briefing ? '<div style=margin-bottom:6px><strong>Briefing:</strong> ' + escapeHtml(n.briefing) + '</div>' : ''}
        ${n.partial ? '<div style=padding:6px 8px;background:#f5fff5;border-left:3px solid #2ecc71;border-radius:3px;margin-bottom:6px><strong>Partial:</strong> ' + escapeHtml(n.partial.what_happened || '') + '<br><em>' + escapeHtml(n.partial.closing_line || '') + '</em></div>' : ''}
        ${n.failure ? '<div style=padding:6px 8px;background:#fff5f5;border-left:3px solid #e74c3c;border-radius:3px><strong>Failure:</strong> ' + escapeHtml(n.failure.what_happened || '') + '<br><em>' + escapeHtml(n.failure.closing_line || '') + '</em></div>' : ''}
      </div>
    </div>`).join('');
  actions.style.display = '';
}

async function applyEndingNotes(scenarioId) {
  if (!window._aiEndingNotes) return toast('No ending notes parsed yet', 'error');
  try {
    const r = await apiFetch('POST', '/pipeline/inject-ending-notes/' + scenarioId, {
      ending_notes: window._aiEndingNotes
    });
    if (r && r.unmatched && r.unmatched.length) {
      toast(`${r.rolesUpdated} role(s) updated — ${r.unmatched.length} role_name(s) did NOT match and were skipped: ${r.unmatched.join(', ')}`, 'warning');
    } else {
      toast(`Ending notes applied to all ${r?.rolesUpdated ?? ''} player role(s)`, 'success');
    }
    window._aiEndingNotes = null;
    renderScenarioEditor(scenarioId);
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function loadVersionHistory(scenarioId) {
  if (!scenarioId) return;
  try {
    const data = await apiFetch('GET', '/pipeline/versions/' + scenarioId);
    const versions = data.versions || [];
    const list = document.getElementById('version-history-list');
    if (!list) return;
    if (versions.length === 0) {
      list.innerHTML = '<p style=color:var(--text-muted);font-size:13px>No versions saved yet. Versions are created automatically when corrections are applied.</p>';
      return;
    }
    list.innerHTML = [...versions].reverse().map(v => {
      const date = new Date(v.createdAt).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div style='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color)'>
        <div>
          <span style='font-size:13px;font-weight:500'>v${v.version} — ${escapeHtml(v.label)}</span>
          <span style='font-size:11px;color:var(--text-muted);margin-left:8px'>${date}</span>
          ${v.changes_applied ? '<span style=font-size:11px;color:var(--text-muted);margin-left:6px>' + v.changes_applied + ' changes</span>' : ''}
        </div>
        <div style='display:flex;gap:6px'>
          <button onclick='previewAdminVersion("${scenarioId}", ${v.version})' style='padding:3px 8px;font-size:11px;border:1px solid var(--border-color);border-radius:4px;background:white;cursor:pointer'>Preview</button>
          <button onclick='restoreAdminVersion("${scenarioId}", ${v.version})' style='padding:3px 8px;font-size:11px;border:1px solid #e74c3c;border-radius:4px;background:#fff5f5;color:#e74c3c;cursor:pointer'>Restore</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    const list = document.getElementById('version-history-list');
    if (list) list.innerHTML = '<p style=color:var(--text-muted);font-size:13px>Version history unavailable</p>';
  }
}

async function previewAdminVersion(scenarioId, versionNumber) {
  try {
    const data = await apiFetch('GET', '/pipeline/versions/' + scenarioId + '/' + versionNumber);
    const scenario = data.scenario || data;
    const win = window.open('', '_blank', 'width=900,height=700');
    win.document.write('<pre style=background:#1a2332;color:#e8eaf0;padding:20px;font-size:12px>' + escapeHtml(JSON.stringify(scenario, null, 2)) + '</pre>');
  } catch (err) {
    toast(err.message, 'error');
  }
}

async function restoreAdminVersion(scenarioId, versionNumber) {
  if (!confirm('Restore version ' + versionNumber + '? This will overwrite the current scenario. A backup will be saved automatically.')) return;
  try {
    await apiFetch('POST', '/pipeline/rollback/' + scenarioId + '/' + versionNumber, {});
    toast('Restored to version ' + versionNumber, 'success');
    loadVersionHistory(scenarioId);
    renderForm('scenarios', scenarioId);
  } catch (err) {
    toast(err.message, 'error');
  }
}
</script>
</body>
</html>
