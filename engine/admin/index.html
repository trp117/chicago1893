function buildBeatRow(beat, actIdx) {
  const id   = (typeof beat === 'object' ? beat.id          : '') || '';
  const desc = (typeof beat === 'object' ? beat.description : beat) || '';
  return `<div class="beat-row" style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
    <input type="text" class="beat-id" data-beat-act="${actIdx}" placeholder="beat_id" value="${esc(id)}" style="width:140px;flex-shrink:0;font-family:monospace;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg)">
    <textarea class="beat-desc" data-beat-act="${actIdx}" placeholder="Past tense — describe what the engine confirmed occurred." rows="2" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;resize:vertical">${esc(desc)}</textarea>
    <button type="button" class="remove-beat-btn" style="flex-shrink:0;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;cursor:pointer;color:var(--text-soft);font-size:14px;line-height:1;margin-top:2px" title="Remove">×</button>
  </div>`;
}

function renderArcSection(data) {
  const arc  = data.storyArc || {};
  const acts = Array.isArray(arc.acts) ? arc.acts : [];

  // Migrate legacy string beats to structured objects on load
  const migratedActs = acts.map(act => ({
    ...act,
    beats: Array.isArray(act.beats) ? act.beats.map(b => {
      if (typeof b !== 'string') return b;
      const words = b.trim().split(/\s+/).slice(0, 3)
        .map(w => w.toLowerCase().replace(/[^a-z0-9]/g, '')).filter(Boolean);
      return { id: words.join('_') || 'beat', description: b.trim() };
    }) : []
  }));

  const actsHtml = migratedActs.map((act, i) => {
    const beatsHtml = act.beats.map(b => buildBeatRow(b, i)).join('');
    return edDetails(
      `Act ${act.actNumber ?? i + 1}: ${act.title || ''}`, '',
      `${edField('Title', edInput(`storyArc.acts.${i}.title`, act.title))}
       <div class="field-group">
         <label>Beats</label>
         <div id="beat-rows-act-${i}" data-beat-list="${i}">${beatsHtml}</div>
         <button type="button" class="btn btn-secondary btn-sm" style="margin-top:6px" data-add-beat="${i}">＋ Add Beat</button>
       </div>`,
      i === 0
    );
  }).join('');

  const totalBeats = migratedActs.reduce((sum, a) => sum + a.beats.length, 0);
  const countColor = totalBeats < 3 ? 'var(--warn)' : totalBeats > 6 ? 'var(--danger)' : 'var(--success)';
  const countHtml = `<div id="beat-count-indicator" style="display:flex;align-items:center;gap:8px;padding:10px 0 4px;font-size:13px">
    <span style="color:${countColor};font-weight:600">Total beats: ${totalBeats}</span>
    <span style="color:var(--text-soft)">/ target 3–6</span>
  </div>`;

  const worldVal    = arc.premise || '';
  const stakesVal   = arc.goal    || '';
  const hasBriefing = (data.playerRoles || []).some(r => r.briefing?.trim());
  const genDisabled = (!worldVal || !stakesVal || !hasBriefing) ? 'disabled' : '';
  const genTooltip  = genDisabled ? 'Complete World, Stakes, and at least one Role Briefing first' : '';
  const genBtn = `<div style="margin-top:12px">
    <button type="button" id="gen-beats-btn" class="btn btn-secondary" ${genDisabled} title="${genTooltip}">✦ Generate Essential Beats</button>
    ${genDisabled ? `<p class="help-text" style="margin-top:6px">${genTooltip}</p>` : ''}
  </div>`;

  return edSection('Story Arc', `
    ${edField('Arc Name', edInput('storyArc.name', arc.name))}
    ${edField('Goal',     edTextarea('storyArc.goal',    arc.goal,    2))}
    ${edField('Premise',  edTextarea('storyArc.premise', arc.premise, 2))}
    ${edField('Opening',  edTextarea('storyArc.opening', arc.opening, 2))}
    ${actsHtml}
    ${countHtml}
    ${genBtn}
  `);
}

async function renderCharacterDeclarationsSection(scenarioId, container) {
  let res;
  try { res = await apiGet(`/scenarios/${encodeURIComponent(scenarioId)}/character-declarations`); }
  catch { return; }
  const { text, stats } = res;
  const s = stats || {};
  const undeclared = (s.undeclaredRoles || 0) + (s.undeclaredNpcs || 0);
  const unchecked  = (s.uncheckedRoles  || 0) + (s.uncheckedNpcs  || 0);
  const badgeHtml  = undeclared
    ? `<span style="font-size:11px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:2px 8px;border-radius:10px;font-weight:600">${undeclared} undeclared</span>`
    : `<span style="font-size:11px;background:#dcfce7;color:#166534;border:1px solid #86efac;padding:2px 8px;border-radius:10px;font-weight:600">All declared</span>`;
  const uncheckedBadge = unchecked
    ? `<span style="font-size:11px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:2px 8px;border-radius:10px;font-weight:600">${unchecked} unverified</span>`
    : '';
  const sectionHtml = edSection('Character Declarations', `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      ${badgeHtml}${uncheckedBadge ? ' ' + uncheckedBadge : ''}
      <span style="font-size:12px;color:var(--text-muted)">${(s.playerRoles||0) + (s.npcs||0)} total characters</span>
    </div>
    <p class="help-text" style="margin-bottom:12px">Paste this block into an external AI (Gemini, ChatGPT) to verify real vs fictional assignments against the historical record. Then mark <em>Fact Checked</em> on each character.</p>
    <div style="position:relative">
      <textarea id="char-declarations-text" readonly style="font-family:monospace;font-size:11px;white-space:pre;background:#f8fafc;border:1px solid var(--border);border-radius:6px;padding:12px;width:100%;box-sizing:border-box;resize:vertical;min-height:200px">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      <button type="button" id="copy-declarations-btn" class="btn btn-secondary btn-sm" style="position:absolute;top:8px;right:8px;font-size:11px">Copy</button>
    </div>
  `);
  const wrap = document.createElement('div');
  wrap.innerHTML = sectionHtml;
  container.appendChild(wrap);
  wrap.querySelector('#copy-declarations-btn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard', 'success'));
  });
}

      edField(`Hook ${j + 1}`, edTextarea(`playerRoles.${i}.character_hooks.${j}`, h, 2))

    return edDetails(r.name || `Role ${i + 1}`, r.accessLevel || '', `

      `)}
    `, i === 0);
  }).join('');
  return edSection('Player Roles', html || '<p style="font-size:13px;color:var(--text-soft)">None generated.</p>');
}

function normSourceClient(val) {
  if (!val) return { citation: '', url: null, access_note: null };
  if (typeof val === 'string') return { citation: val, url: null, access_note: null };
  return { citation: val.citation || '', url: val.url || null, access_note: val.access_note || null };
}

    const { glossary } = await apiGet(`/scenarios/${encodeURIComponent(scenarioId)}/glossary`);

  } catch (err) {

function renderGlossaryBody(scenarioId, glossary) {

function buildApprovedTermCard(g, scenarioId) {
  const te = esc(g.term); const de = esc(g.definition); const se = esc(g.source || '');
  const srcLine = g.source ? `<div style="margin-top:4px;font-size:11px;color:var(--text-soft)">Source: ${se}</div>` : '';
  return `<div class="glossary-term-card" data-term="${te}" style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--card)">
    <div class="term-display">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px">${te}</div>
      <div style="font-size:13px;color:var(--text)">${de}</div>
      ${srcLine}
      <div style="margin-top:10px;display:flex;gap:8px">
        <button type="button" class="btn btn-secondary btn-sm" onclick="editGlossaryTerm('${te}')">Edit</button>
        <button type="button" class="btn btn-danger btn-sm" onclick="deleteGlossaryTerm('${te}','${esc(scenarioId)}')">Delete</button>
      </div>
    </div>
    <div class="term-edit" hidden>
      <label style="font-size:12px;color:var(--text-soft);margin-bottom:2px;display:block">Term name</label>
      <input type="text" class="edit-term" value="${te}" style="width:100%;font-size:13px;font-weight:700;margin-bottom:8px">
      <div class="edit-term-error" style="display:none;color:#d32f2f;font-size:12px;margin-bottom:6px"></div>
      <textarea class="edit-definition" rows="3" style="width:100%;font-size:13px;margin-bottom:6px;resize:vertical">${de}</textarea>
      <input type="text" class="edit-source" placeholder="Source (optional)" value="${se}" style="width:100%;font-size:12px;margin-bottom:10px">
      <div style="display:flex;gap:8px">
        <button type="button" class="btn btn-primary btn-sm" onclick="saveGlossaryTermEdit('${te}','${esc(scenarioId)}')">Save</button>
        <button type="button" class="btn btn-secondary btn-sm" onclick="cancelGlossaryTermEdit('${te}')">Cancel</button>
      </div>
    </div>
  </div>`;
}

function editGlossaryTerm(term) {
  const card = document.querySelector(`.glossary-term-card[data-term="${CSS.escape(term)}"]`);
  if (!card) return;
  card.querySelector('.term-display').hidden = true;
  card.querySelector('.term-edit').hidden = false;
  card.querySelector('.edit-definition').focus();
}

function cancelGlossaryTermEdit(term) {
  const card = document.querySelector(`.glossary-term-card[data-term="${CSS.escape(term)}"]`);
  if (!card) return;
  card.querySelector('.term-display').hidden = false;
  card.querySelector('.term-edit').hidden = true;
}

async function saveGlossaryTermEdit(term, scenarioId) {
  const card = document.querySelector(`.glossary-term-card[data-term="${CSS.escape(term)}"]`);
  if (!card) return;
  const newTerm    = card.querySelector('.edit-term').value.trim();
  const definition = card.querySelector('.edit-definition').value.trim();
  const source     = card.querySelector('.edit-source').value.trim();
  const errEl      = card.querySelector('.edit-term-error');

  errEl.style.display = 'none'; errEl.textContent = '';

  if (!newTerm) {
    errEl.textContent = 'Term name cannot be empty.'; errEl.style.display = 'block'; return;
  }
  if (newTerm.toLowerCase() !== term.toLowerCase()) {
    const collision = [...document.querySelectorAll('.glossary-term-card')]
      .some(c => c !== card && (c.querySelector('.edit-term')?.value?.trim() || c.dataset.term).toLowerCase() === newTerm.toLowerCase());
    if (collision) {
      errEl.textContent = 'A term with that name already exists.'; errEl.style.display = 'block'; return;
    }
  }
  if (!definition) { toast('Definition cannot be empty', 'error'); return; }
  try {
    const body = { definition, source };
    if (newTerm.toLowerCase() !== term.toLowerCase()) body.newTerm = newTerm;
    const { glossary } = await apiFetch('PUT', `/scenarios/${encodeURIComponent(scenarioId)}/glossary/${encodeURIComponent(term)}`, body);
    toast('Term updated', 'success');
    renderGlossaryBody(scenarioId, glossary);
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

async function deleteGlossaryTerm(term, scenarioId) {
  if (!confirm(`Delete "${term}" from the glossary?`)) return;
  try {
    const { glossary } = await apiFetch('DELETE', `/scenarios/${encodeURIComponent(scenarioId)}/glossary/${encodeURIComponent(term)}`);
    toast('Term deleted', 'success');
    renderGlossaryBody(scenarioId, glossary);
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

async function runGlossarySuggest(scenarioId) {
  const suggestBtn = document.getElementById('glossary-suggest-btn');
  const area       = document.getElementById('glossary-suggestions-area');
  if (!suggestBtn || !area) return;
  suggestBtn.disabled = true;
  suggestBtn.textContent = 'Generating…';
  area.innerHTML = '<p style="font-size:13px;color:var(--text-soft);padding:8px 0">Asking Haiku for suggestions…</p>';
  try {
    const { suggestions } = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/suggest-glossary`, {});
    if (!suggestions?.length) { area.innerHTML = '<p style="font-size:13px;color:var(--text-soft)">No new suggestions found.</p>'; return; }
    area.innerHTML = `
      <div class="suggestions-header">
        <span id="suggestions-header-text" class="suggestions-header-text">Review suggestions — ${suggestions.length} found. Nothing saves until you click Approve.</span>
        <button type="button" class="btn btn-secondary btn-sm" id="approve-all-btn">Approve all</button>
        <button type="button" class="btn btn-danger btn-sm" id="delete-all-btn">Delete all</button>
      </div>
      ${suggestions.map((s, i) => buildSuggestionCard(s, i, scenarioId)).join('')}
      <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">`;
    document.getElementById('approve-all-btn')?.addEventListener('click', () => approveAll(scenarioId));
    document.getElementById('delete-all-btn')?.addEventListener('click', () => deleteAll(scenarioId));
  } catch (err) {
    area.innerHTML = `<p style="color:#e74c3c;font-size:13px">Error: ${esc(err.message)}</p>`;
  } finally {
    suggestBtn.disabled = false;
    suggestBtn.textContent = '✦ Suggest terms';
  }
}

function buildSuggestionCard(s, i, scenarioId) {
  const id  = `sug-${i}`;
  const te  = esc(s.term); const de = esc(s.definition); const re = esc(s.reason || '');
  const st  = s.source_type || 'historical';
  const stLabel = st === 'technical' ? 'Technical' : st === 'jargon' ? 'Period jargon' : 'Historical';
  const badge = `<span class="suggestion-source-badge suggestion-source-${esc(st)}">${stLabel}</span>`;
  return `<div id="${id}" class="suggestion-card" data-term="${te}" style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--bg)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-weight:700;font-size:13px">${te}</span>${badge}
    </div>
    ${re ? `<div style="font-size:11px;color:var(--text-soft);margin-bottom:8px">Why: ${re}</div>` : ''}
    <textarea id="${id}-def" rows="3" style="width:100%;font-size:13px;margin-bottom:6px;resize:vertical">${de}</textarea>
    <input type="text" id="${id}-src" placeholder="Source (optional)" style="width:100%;font-size:12px;margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button type="button" class="btn btn-primary btn-sm" onclick="approveSuggestion('${id}','${te}','${esc(scenarioId)}')">Approve</button>
      <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('${id}').remove()">Delete suggestion</button>
    </div>
  </div>`;
}

async function approveSuggestion(cardId, term, scenarioId) {
  const card = document.getElementById(cardId);
  if (!card) return;
  const definition = card.querySelector(`#${cardId}-def`)?.value?.trim();
  const source     = card.querySelector(`#${cardId}-src`)?.value?.trim() || '';
  if (!definition) { toast('Definition cannot be empty', 'error'); return; }
  try {
    const { glossary } = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/glossary`, { term, definition, source });
    // Fade and remove only this card — never re-render the whole section
    card.style.transition = 'opacity 0.2s';
    card.style.opacity = '0';
    setTimeout(() => {
      card.remove();
      const remaining = document.querySelectorAll('.suggestion-card').length;
      if (remaining === 0) {
        restoreSuggestButton(scenarioId);
      } else {
        const headerText = document.getElementById('suggestions-header-text');
        if (headerText) headerText.textContent = `Review suggestions — ${remaining} remaining. Nothing saves until you click Approve.`;
      }
    }, 210);
    // Insert new approved card without re-rendering approved list
    const list  = document.getElementById('glossary-approved-list');
    const empty = document.getElementById('glossary-empty-state');
    if (empty) empty.remove();
    if (list) list.insertAdjacentHTML('afterbegin', buildApprovedTermCard({ term, definition, source }, scenarioId));
    // Update counts in-place
    const countEl = document.getElementById('glossary-approved-count');
    if (countEl) countEl.textContent = `Approved terms (${glossary.length})`;
    const badge = document.getElementById('glossary-count-badge');
    if (badge) badge.textContent = `${glossary.length} term${glossary.length === 1 ? '' : 's'}`;
    toast(`"${term}" approved`, 'success');
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

function restoreSuggestButton(scenarioId) {
  const area = document.getElementById('glossary-suggestions-area');
  if (!area) return;
  area.innerHTML = '<button type="button" class="btn btn-primary btn-sm" id="glossary-suggest-btn">✦ Suggest terms</button>';
  document.getElementById('glossary-suggest-btn').addEventListener('click', () => runGlossarySuggest(scenarioId));
}

async function approveAll(scenarioId) {
  const approveBtn = document.getElementById('approve-all-btn');
  const deleteBtn  = document.getElementById('delete-all-btn');
  if (approveBtn) { approveBtn.disabled = true; approveBtn.textContent = 'Approving…'; }
  if (deleteBtn)  deleteBtn.disabled = true;
  const cards = [...document.querySelectorAll('.suggestion-card')];
  let approved = 0;
  for (const card of cards) {
    const cardId     = card.id;
    const term       = card.dataset.term;
    const definition = card.querySelector(`#${cardId}-def`)?.value?.trim();
    const source     = card.querySelector(`#${cardId}-src`)?.value?.trim() || '';
    if (!term || !definition) continue;
    try {
      const { glossary } = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/glossary`, { term, definition, source });
      card.style.transition = 'opacity 0.15s';
      card.style.opacity = '0';
      await new Promise(r => setTimeout(r, 160));
      card.remove();
      approved++;
      const remaining = document.querySelectorAll('.suggestion-card').length;
      const headerText = document.getElementById('suggestions-header-text');
      if (headerText && remaining > 0) headerText.textContent = `Approving — ${remaining} remaining…`;
      const countEl = document.getElementById('glossary-approved-count');
      if (countEl) countEl.textContent = `Approved terms (${glossary.length})`;
      const badge = document.getElementById('glossary-count-badge');
      if (badge) badge.textContent = `${glossary.length} term${glossary.length === 1 ? '' : 's'}`;
      const list  = document.getElementById('glossary-approved-list');
      const empty = document.getElementById('glossary-empty-state');
      if (empty) empty.remove();
      if (list) list.insertAdjacentHTML('afterbegin', buildApprovedTermCard({ term, definition, source }, scenarioId));
    } catch (_) { /* skip failed card, continue */ }
  }
  if (document.querySelectorAll('.suggestion-card').length === 0) {
    restoreSuggestButton(scenarioId);
  }
  toast(`${approved} term${approved === 1 ? '' : 's'} approved`, 'success');
}

function deleteAll(scenarioId) {
  const cards = [...document.querySelectorAll('.suggestion-card')];
  if (!cards.length) return;
  if (!confirm(`Delete all ${cards.length} suggestion${cards.length === 1 ? '' : 's'}? They are not saved.`)) return;
  cards.forEach(card => {
    card.style.transition = 'opacity 0.2s';
    card.style.opacity = '0';
    setTimeout(() => card.remove(), 210);
  });
  setTimeout(() => {
    if (document.querySelectorAll('.suggestion-card').length === 0) restoreSuggestButton(scenarioId);
  }, 300);
}

function addGlossaryTermManually(scenarioId) {
  const list = document.getElementById('glossary-approved-list');
  if (!list) return;
  const empty = document.getElementById('glossary-empty-state');
  if (empty) empty.remove();
  const id = `new-term-${Date.now()}`;
  const card = document.createElement('div');
  card.id = id;
  card.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:var(--bg)';
  card.innerHTML = `
    <input type="text" class="new-term-input" placeholder="Term as it appears in prose" style="width:100%;font-size:13px;font-weight:700;margin-bottom:6px">
    <textarea class="new-definition-input" rows="3" placeholder="Period-specific definition — one to two sentences" style="width:100%;font-size:13px;margin-bottom:4px;resize:vertical"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
      <button type="button" class="btn btn-secondary btn-sm" id="${id}-generate" style="font-size:11px">✨ Generate definition</button>
    </div>
    <input type="text" class="new-source-input" placeholder="Source (optional)" style="width:100%;font-size:12px;margin-bottom:10px">
    <div id="${id}-gen-error" style="display:none;color:#e74c3c;font-size:12px;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <button type="button" class="btn btn-primary btn-sm" id="${id}-save">Save</button>
      <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('${id}').remove()">Cancel</button>
    </div>`;
  list.prepend(card);
  card.querySelector('.new-term-input').focus();
  document.getElementById(`${id}-generate`).addEventListener('click', async () => {
    const termInput = card.querySelector('.new-term-input');
    const defInput  = card.querySelector('.new-definition-input');
    const srcInput  = card.querySelector('.new-source-input');
    const genBtn    = document.getElementById(`${id}-generate`);
    const errEl     = document.getElementById(`${id}-gen-error`);
    errEl.style.display = 'none';
    const term = termInput.value.trim();
    if (!term) {
      errEl.textContent = 'Enter a term first.';
      errEl.style.display = 'block';
      return;
    }
    if ((defInput.value.trim() || srcInput.value.trim()) && !confirm('Replace current definition?')) return;
    genBtn.textContent = 'Generating…';
    genBtn.disabled = true;
    termInput.disabled = defInput.disabled = srcInput.disabled = true;
    try {
      const { definition, source } = await apiPost(
        `/scenarios/${encodeURIComponent(scenarioId)}/generate-glossary-term`, { term }
      );
      defInput.value = definition;
      srcInput.value = source || '';
    } catch (err) {
      errEl.textContent = `Generation failed: ${err.message}`;
      errEl.style.display = 'block';
    } finally {
      genBtn.textContent = '✨ Generate definition';
      genBtn.disabled = false;
      termInput.disabled = defInput.disabled = srcInput.disabled = false;
    }
  });
  document.getElementById(`${id}-save`).addEventListener('click', async () => {
    const term       = card.querySelector('.new-term-input').value.trim();
    const definition = card.querySelector('.new-definition-input').value.trim();
    const source     = card.querySelector('.new-source-input').value.trim();
    if (!term || !definition) { toast('Term and definition are required', 'error'); return; }
    try {
      const { glossary } = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/glossary`, { term, definition, source });
      toast(`"${term}" added`, 'success');
      renderGlossaryBody(scenarioId, glossary);
    } catch (err) { toast(`Error: ${err.message}`, 'error'); }
  });
}

    not_generated:  { label: 'Not Generated',              color: 'var(--text-soft)', bg: '#f1f5f9' },
    pending_review: { label: 'Generated — Pending Review',  color: '#92400e',          bg: '#fef3c7' },
    approved:       { label: 'Reviewer Approved',           color: '#166534',          bg: '#f0fdf4' },

  const s = statusCfg[status] || statusCfg.not_generated;

  const checkItems = [
    { key: 'beat_count',         label: 'Beat count',                desc: 'The checklist contains between three and six beats total across all acts.' },
    { key: 'sequence_check',     label: 'Sequence check',            desc: 'Beats are ordered correctly across the act structure. Beat one is reachable in Act 1. The final beat occurs in Act 3 or Act 4.' },
    { key: 'path_independence',  label: 'Path independence',          desc: 'Each beat is reachable across multiple valid player choices, not dependent on one specific decision.' },
    { key: 'final_beat_spec',    label: 'Specificity of final beat',  desc: 'The final beat is specific enough that the engine can confirm with certainty when it has been reached.' },
    { key: 'tense_attribution',  label: 'Tense and attribution',      desc: 'Every beat description is written in past tense and describes what the engine confirmed in generated text, not what the player typed.' },
    { key: 'reviewer_summary',   label: 'Reviewer summary',           desc: 'The generated beats reflect the scenario\'s actual dramatic structure and the final beat represents the correct dramatic conclusion.' },
    { key: 'manual_playthrough', label: 'Manual play-through',        desc: 'All beats are reachable on at least two different play paths through the scenario.' },

  const checkHtml = checkItems.map(item => {
    const state = cl[item.key] || {};
    return `<div data-checklist-key="${item.key}" style="padding:12px 0;border-bottom:1px solid var(--border)">

          <span id="beats-status-badge" style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:${s.bg};color:${s.color}">${s.label}</span>
          <button type="button" id="mark-approved-btn" class="btn btn-primary btn-sm" ${status === 'pending_review' ? '' : 'disabled'}>Mark as Approved</button>
        </div>
        <div id="review-checklist-container">
          ${checkHtml}
        </div>
      </div>
    </details>
  </div>`;
}

async function handleManualSave(data, containerEl) {
  const btn = document.getElementById('preview-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  if (containerEl) collectEdits(containerEl, data);

  // Image Prompt Studio — textarea is outside the data-path form system, so collectEdits
  // never picks it up. Inject the current value here so main Save never overwrites a
  // previously-saved draft with undefined.
  const imgPromptTextarea = document.getElementById('img-prompt-scene-desc');
  if (imgPromptTextarea && data.scenario) {
    data.scenario.image = { ...(data.scenario.image || {}), generation_prompt: imgPromptTextarea.value };
  }

  // Glossary is managed via dedicated API endpoints (not form fields), so collectEdits
  // never sees it. Read approved term cards from the DOM and inject into the payload.
  // If a card is in edit mode (Edit clicked but term-level Save not yet clicked), the
  // in-progress textarea value is captured here — scenario Save commits whatever is typed.
  const glossaryList = document.getElementById('glossary-approved-list');
  if (glossaryList && data.scenario) {
    const cards = [...glossaryList.querySelectorAll('.glossary-term-card')];
    data.scenario.glossary = cards.map(card => ({
      term: card.querySelector('.edit-term')?.value?.trim() || card.dataset.term || '',
      definition: card.querySelector('.edit-definition')?.value?.trim() || '',
      source: card.querySelector('.edit-source')?.value?.trim() || '',
      approved: true,
    })).filter(g => g.term && g.definition);
  }

  try {
    await apiPost('/generate/save', data);
    toast(`"${data.scenario?.title}" saved.`, 'success');
    const pill = document.getElementById('save-status-pill');
    if (pill) { pill.className = 'saved-pill ok'; pill.textContent = '✓ Saved'; }
  } catch (err) {
    toast(`Save failed: ${err.message}`, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  }
}

    const orig = btn.textContent;

async function copyTranscript(btn, id) {
  try {
    const resp = await fetch(`${API}/transcripts/${encodeURIComponent(id)}/download`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  } catch (err) {
    toast('Copy failed: ' + err.message, 'error');

}

// ── Shared scenario-doc formatting helpers + per-section builders ─────────────
// Single source of truth for the scenario-doc body. Both buildScenarioDocText
// (the all-story export behind the legacy "Copy + AI Prompt" button) and the
// AI-panel section picker build from these helpers — no parallel copies of the
// formatting logic. Each buildXxxSection(data) returns an array of lines (or []
// when the section is absent); the monolith spreads them in order.
const HR = '═'.repeat(60);
const hr = '─'.repeat(60);
const sec  = title => ['', HR, title.toUpperCase(), HR, ''].join('\n');
const sub  = label => ['', `── ${label} ──`, ''].join('\n');
const indent = (text, n = 2) => String(text || '').split('\n').map(l => ' '.repeat(n) + l).join('\n');

function buildOpeningSection(data) {
  const { scenario = {}, playerRoles = [] } = data;
  const out = [];
  const intro = scenario.introduction;
  if (intro?.sections?.length) {
    out.push(sec('Opening Scene'));
    const typeLabel = { world: 'WORLD', stakes: 'STAKES', scene: 'SCENE', entry: 'ENTRY' };
    for (const s of intro.sections) {
      out.push(sub(typeLabel[s.type] || s.type));
      out.push(s.text || '');
      if (s.type === 'entry' && s.character_entries) {
        for (const [roleId, entryText] of Object.entries(s.character_entries)) {
          const role = playerRoles.find(r => r.id === roleId);
          out.push('');
          // role_id first so the model can form the <role_id>.opening locator.
          out.push(`  [${roleId}]${role?.name ? ` (${role.name})` : ''}`);
          out.push(indent(entryText));
        }
      }
    }
  }
  return out;
}

function buildGameplaySection(data) {
  const { scenario = {} } = data;
  const out = [];
  out.push(sec('Win / Fail Conditions'));
  if (scenario.winConditions?.length) {
    out.push('WIN CONDITIONS');
    scenario.winConditions.forEach(c => out.push(`  + ${c}`));
  }
  if (scenario.failConditions?.length) {
    out.push(''); out.push('FAIL CONDITIONS');
    scenario.failConditions.forEach(c => out.push(`  ✕ ${c}`));
  }
  if (scenario.partialSuccessExamples?.length) {
    out.push(''); out.push('PARTIAL SUCCESS EXAMPLES');
    scenario.partialSuccessExamples.forEach(c => out.push(`  ~ ${c}`));
  }
  if (scenario.systems?.pressureEvents?.length) {
    out.push(''); out.push('PRESSURE EVENTS');
    scenario.systems.pressureEvents.forEach(e => out.push(`  • ${e}`));
  }
  return out;
}

function buildStoryArcSection(data) {
  const { storyArc } = data;
  const out = [];
  if (storyArc) {
    out.push(sec(`Story Arc — ${storyArc.name || storyArc.id || ''}`));
    if (storyArc.premise)          { out.push('PREMISE'); out.push(indent(storyArc.premise)); out.push(''); }
    if (storyArc.goal)             { out.push('GOAL'); out.push(indent(storyArc.goal)); out.push(''); }
    if (storyArc.openingSituation) { out.push('OPENING SITUATION'); out.push(indent(storyArc.openingSituation)); out.push(''); }
    (storyArc.acts || []).forEach(act => {
      const range = act.minuteRange?.length === 2 ? ` [${act.minuteRange[0]}–${act.minuteRange[1]} min]` : '';
      out.push(`Act ${act.actNumber || ''}: ${act.name || ''}${range}`);
      (act.beats || []).forEach(b => {
        if (typeof b === 'string') out.push(`  • ${b}`);
        else out.push(`  [${b.id || '?'}] ${b.description || ''}`);
      });
      out.push('');
    });
  }
  return out;
}

function buildRolesSection(data) {
  const { playerRoles = [] } = data;
  const out = [];
  if (playerRoles.length) {
    out.push(sec(`Player Roles (${playerRoles.length})`));
    for (const r of playerRoles) {
      out.push(sub(`${r.name || r.id} (${r.id})`));
      if (r.description)  { out.push(r.description); out.push(''); }
      if (r.perspective)  { out.push('PERSPECTIVE (perspective):'); out.push(indent(r.perspective)); out.push(''); }
      if (r.briefing)     { out.push('BRIEFING (briefing):'); out.push(indent(r.briefing)); out.push(''); }
      if (r.opening?.narrative) { out.push('OPENING NARRATIVE (opening):'); out.push(indent(r.opening.narrative)); out.push(''); }
      if (r.opening?.choices?.length) {
        out.push('OPENING CHOICES (openingChoices):');
        r.opening.choices.forEach(c => out.push(`  • ${c}`));
        out.push('');
      }
      if (r.startingKnowledge?.length) {
        out.push('STARTING KNOWLEDGE (startingKnowledge):');
        r.startingKnowledge.forEach(k => out.push(`  • ${k}`));
        out.push('');
      }
      if (r.character_hooks?.length) {
        out.push('CHARACTER HOOKS (character_hooks):');
        r.character_hooks.forEach(h => out.push(`  • ${h}`));
        out.push('');
      }
      if (r.suggested_secret) { out.push('SUGGESTED SECRET (suggested_secret):'); out.push(indent(r.suggested_secret)); out.push(''); }
      if (r.roleInitialState?.inventory?.length) {
        out.push('STARTING INVENTORY (inventory):');
        r.roleInitialState.inventory.forEach(i => out.push(`  • ${i}`));
        out.push('');
      }
      if (r.ending_notes) {
        for (const [outcome, notes] of Object.entries(r.ending_notes)) {
          out.push(`ENDING — ${outcome.toUpperCase()}`);
          if (notes.what_happened)    out.push(indent(`What happened: ${notes.what_happened}`));
          if (notes.emotional_weight) out.push(indent(`Tone: ${notes.emotional_weight}`));
          if (notes.closing_line_override) out.push(indent(`Closing line: ${notes.closing_line_override}`));
          out.push('');
        }
      }
      out.push(hr);
    }
  }
  return out;
}

function buildCharactersSection(data) {
  const { characters = [] } = data;
  const out = [];
  if (characters.length) {
    out.push(sec(`Characters (${characters.length})`));
    for (const c of characters) {
      out.push(sub(`${c.name || c.id} (${c.id})`));
      if (c.role)        out.push(`Role: ${c.role}`);
      if (c.description) { out.push(''); out.push('DESCRIPTION (description):'); out.push(indent(c.description)); }
      if (c.publicFace)  { out.push(''); out.push('PUBLIC FACE (publicFace):'); out.push(indent(c.publicFace)); }
      if (c.privateGoal) { out.push(''); out.push('PRIVATE GOAL (privateGoal):'); out.push(indent(c.privateGoal)); }
      if (c.fear)        { out.push(''); out.push(`Fear (fear): ${c.fear}`); }
      if (c.voice)       out.push(`Voice (voice): ${c.voice}`);
      if (c.trustLogic)  { out.push(''); out.push('TRUST LOGIC (trustLogic):'); out.push(indent(c.trustLogic)); }
      if (c.knowledge?.length) {
        out.push(''); out.push('KNOWLEDGE (knowledge):');
        c.knowledge.forEach(k => out.push(`  • ${k}`));
      }
      if (c.secrets?.length) {
        out.push(''); out.push('SECRETS (secrets):');
        const s = Array.isArray(c.secrets) ? c.secrets : c.secrets.split('\n').filter(Boolean);
        s.forEach(k => out.push(`  • ${k}`));
      }
      // aggressionProfile is NOT a FIELD-convention field — the review prompt
      // says there is no "behavior" field. Emit it clearly marked as context
      // only so the model never produces an unresolvable char_x.behavior locator.
      const ap = c.aggressionProfile;
      if (ap && Object.values(ap).some(Boolean)) {
        out.push(''); out.push('BEHAVIOR UNDER PRESSURE (context only — not a correctable field):');
        if (ap.mildPressure)     { out.push('  Mild pressure:');  out.push(indent(ap.mildPressure, 4)); }
        if (ap.heavyPressure)    { out.push('  Heavy pressure:'); out.push(indent(ap.heavyPressure, 4)); }
        if (ap.breakingPoint)    { out.push('  Breaking point:'); out.push(indent(ap.breakingPoint, 4)); }
        if (ap.fleeCondition)    out.push(`  Flee condition: ${ap.fleeCondition}`);
        if (ap.fleeStyle)        out.push(`  Flee style: ${ap.fleeStyle}`);
        if (ap.chaseStyle)       out.push(`  Chase style: ${ap.chaseStyle}`);
        if (ap.capturedBehavior) out.push(`  If captured: ${ap.capturedBehavior}`);
      }
      out.push(''); out.push(hr);
    }
  }
  return out;
}

function buildLocationsSection(data) {
  const { locations = [] } = data;
  const out = [];
  if (locations.length) {
    out.push(sec(`Locations (${locations.length})`));
    for (const l of locations) {
      out.push(sub(`${l.name || l.id} (${l.id})`));
      if (l.description) out.push(l.description);
      if (l.mood)        out.push(`Mood: ${l.mood}`);
      if (l.atmosphericDetails?.length) {
        out.push('ATMOSPHERIC DETAILS');
        l.atmosphericDetails.forEach(d => out.push(`  • ${d}`));
      }
      out.push('');
    }
  }
  return out;
}

function buildCluesSection(data) {
  const { clues = [] } = data;
  const out = [];
  if (clues.length) {
    out.push(sec(`Clues (${clues.length})`));
    for (const cl of clues) {
      out.push(sub(`${cl.title || cl.name || cl.id} (${cl.id})`));
      if (cl.category)              out.push(`Category: ${cl.category}`);
      if (cl.discoveryLocationId)   out.push(`Discovery location: ${cl.discoveryLocationId}`);
      if (cl.implicatesCharacterIds?.length) out.push(`Implicates: ${cl.implicatesCharacterIds.join(', ')}`);
      if (cl.isKeyEvidence)         out.push('Key evidence: yes');
      if (cl.isRedHerring)          out.push('Red herring: yes');
      if (cl.description)           { out.push(''); out.push(cl.description); }
      out.push('');
    }
  }
  return out;
}

function buildVocabSection(data) {
  const { scenario = {} } = data;
  const out = [];
  const vocab = scenario.period_vocabulary?.categories || [];
  if (vocab.length) {
    out.push(sec('Period Vocabulary'));
    for (const cat of vocab) {
      out.push(sub(cat.name));
      if (cat.context) out.push(cat.context);
      out.push('');
      (cat.terms || []).forEach(t => out.push(`  ${t.term}: ${t.meaning}`));
      out.push('');
    }
  }
  return out;
}

function buildEpilogueSection(data) {
  const { scenario = {} } = data;
  const out = [];
  const ep = scenario.epilogue;
  if (ep?.generated) {
    out.push(sec('Historical Epilogue Data'));
    out.push(`Status: ${ep.reviewed ? 'Reviewed' : 'PENDING REVIEW — not yet verified'}`);

    if (ep.character_fates?.length) {
      out.push(''); out.push('CHARACTER FATES');
      for (const f of ep.character_fates) {
        out.push('');
        out.push(`${f.name || f.character_id} (${f.character_id}) — ${f.outcome}`);
        if (f.historical_record) out.push(indent(f.historical_record));
        const fSrc = f.primary_source?.citation || (typeof f.primary_source === 'string' ? f.primary_source : '');
        if (fSrc) out.push(indent(`Source: ${fSrc}`));
      }
    }
    if (ep.immediate_outcome?.summary) {
      out.push(''); out.push('IMMEDIATE OUTCOME');
      out.push(indent(ep.immediate_outcome.summary));
      if (ep.immediate_outcome.key_facts?.length) {
        out.push(''); out.push('  KEY FACTS');
        ep.immediate_outcome.key_facts.forEach(f => {
          const t = typeof f === 'string' ? f : (f?.text || '');
          const s = (f && typeof f === 'object' && f.source) ? `  [${f.source}]` : '';
          if (t) out.push(`    • ${t}${s}`);
        });
      }
    }
    if (ep.historical_frame?.length) {
      out.push(''); out.push('HISTORICAL FRAME');
      ep.historical_frame.forEach(f => {
        const t = typeof f === 'string' ? f : (f?.text || '');
        const s = (f && typeof f === 'object' && f.source) ? `  [${f.source}]` : '';
        if (t) out.push(indent(`• ${t}${s}`));
      });
    }
    if (ep.open_threads?.length) {
      out.push(''); out.push('OPEN THREADS');
      for (const t of ep.open_threads) {
        out.push('');
        out.push(`  Thread: ${t.thread_id}`);
        if (t.historical_record) out.push(indent(t.historical_record, 4));
      }
    }
    if (ep.choice_echoes?.length) {
      out.push(''); out.push('CHOICE ECHOES');
      for (const c of ep.choice_echoes) {
        out.push('');
        out.push(`  Beat: ${c.beat_id}`);
        if (c.historical_record) out.push(indent(c.historical_record, 4));
      }
    }
  }
  return out;
}

function buildTechFactsSection(data) {
  const { scenario = {} } = data;
  const out = [];
  const tf = scenario.technical_facts;
  if (tf?.facts?.length) {
    out.push(sec('Technical Facts'));
    out.push(`Status: ${tf.reviewed ? 'Reviewed' : tf.generated ? 'PENDING REVIEW — not yet verified' : 'Not generated'}`);
    out.push('');
    for (const f of tf.facts) {
      out.push(`[${f.fact_id || '?'}]${f.domain ? ` (${f.domain})` : ''}`);
      if (f.content) out.push(indent(f.content));
      const tfSrc = f.source?.citation || (typeof f.source === 'string' ? f.source : '');
      if (tfSrc) out.push(indent(`Source: ${tfSrc}`));
      if (f.valid_from || f.valid_until) out.push(indent(`Valid: ${f.valid_from || '—'} → ${f.valid_until || '—'}`));
      out.push('');
    }
  }
  return out;
}

function buildScenarioDocText(data, promptPrefix = '') {
  const { scenario = {} } = data;

  const out = [];

  // ── Header ─────────────────────────────────────────────────
  out.push(HR);
  out.push(`${(scenario.title || 'Untitled').toUpperCase()}`);
  const genreLine = [scenario.id, ...(scenario.genre || [])].filter(Boolean).join(' | ');
  if (genreLine) out.push(genreLine);
  if (scenario.sessionTargetMinutes) out.push(`Session target: ${scenario.sessionTargetMinutes} min`);
  if (scenario.historicalRealism)    out.push(`Historical realism: ${scenario.historicalRealism}`);
  out.push(HR);
  if (scenario.description) { out.push(''); out.push(scenario.description); }

  // ── Body sections (single source of truth: the buildXxxSection helpers) ─────
  out.push(...buildOpeningSection(data));
  out.push(...buildGameplaySection(data));
  out.push(...buildStoryArcSection(data));
  out.push(...buildRolesSection(data));
  out.push(...buildCharactersSection(data));
  out.push(...buildLocationsSection(data));
  out.push(...buildCluesSection(data));
  out.push(...buildVocabSection(data));
  out.push(...buildEpilogueSection(data));
  out.push(...buildTechFactsSection(data));

  // ── Review Checklist ────────────────────────────────────────
  const cl = scenario.review_checklist;
  if (cl && Object.keys(cl).length) {
    out.push(sec('Review Checklist'));
    const clLabels = {
      beat_count:         'Beat count',
      sequence_check:     'Sequence check',
      path_independence:  'Path independence',
      final_beat_spec:    'Specificity of final beat',
      tense_attribution:  'Tense & attribution',
      reviewer_summary:   'Reviewer summary',
      manual_playthrough: 'Manual playthrough',
    };
    for (const [key, item] of Object.entries(cl)) {
      const label  = clLabels[key] || key;
      const status = item.checked ? '✓' : '✗';
      out.push(`${status}  ${label}`);
      if (item.notes) out.push(indent(item.notes));
    }
    out.push('');
  }

  out.push(''); out.push(HR); out.push('');

  return promptPrefix + out.join('\n');
}

const MASTER_IMAGE_SPEC = `Ledger 250 — Scenario Image Generation Prompt (Master, v1.3)

Generate a single AI image for use on the Ledger 250 platform as scenario card artwork. The image must satisfy the following technical specifications and content rules.

OUTPUT SPECIFICATIONS
- Aspect ratio: 16:9 horizontal, minimum 1536×864
- Format: PNG output is acceptable; conversion to JPEG happens downstream
- No text, no watermarks, no captions, no overlay graphics anywhere in the frame
- Photorealistic, cinematic lighting, period-accurate to the year specified
- Full color — do not desaturate or apply a tonal grade; the platform CSS handles the final mood

COMPOSITION RULES — CRITICAL
- Vertical face zone (non-negotiable): all faces and primary action must sit within the vertical band between 35% and 65% of the frame height. This is a hard requirement of the platform banner layout — the image gets cropped to a thin horizontal band that pulls from this middle zone. Faces above 35% will be cropped off the top. Faces below 65% will be cropped off the bottom. Place faces exactly in this central third.
- Horizontal balance: main subject can be left, center, or right of frame — be intentional about which. Composition should leave room for a text overlay in the lower portion.
- Depth: include foreground subject, middle ground action, and background environment. A single flat subject against a flat background looks weak at card scale.
- Lower-band clearance: the lower 25% of the frame should not contain critical narrative detail (faces, primary action, key objects). A semi-opaque text overlay will be applied to this band in the final card render, so anything important placed there will be obscured.

CONTENT & ACCURACY RULES — STRICT
- No copyrighted insignia, logos, or branded patches. No military unit patches, no flag-bearing badges, no corporate logos. Uniforms must be period-correct but generic.
- No invented or stylized insignia of any kind. The following must be either omitted entirely or rendered as period-generic with no decorative content: rank marks, shoulder boards, collar tabs, cuff stripes, unit patches, sleeve chevrons, cap badges, hat emblems, helmet decals, helmet markings, lapel pins, breast pocket badges, belt buckle emblems, embroidered devices on any uniform surface, and any other decoration that would normally identify rank, branch, unit, or nationality. If a piece of headgear or uniform would historically have a visible emblem, render that surface as plain. Inventing a plausible-looking but fictional emblem is worse than omitting the emblem entirely.
- No recognizable celebrity or real-person faces. Figures should look like historically plausible everymen — the right age, build, hair, and grooming for the era — but not portraits of specific historical figures.
- Period accuracy in equipment, clothing, and environment. Verify the year. Helmets, weapons, vehicles, lighting fixtures, and clothing must match the specific year, not a generic era. Anachronistic technology is a disqualifying error.
- No graphic violence, no visible blood, no wounded bodies. Tension and danger are conveyed through environment, lighting, expression, and posture — never explicit injury.
- Lighting must be readable. Even dark or low-light scenes must have clear illumination on faces and primary action. The platform applies a dark CSS overlay; images that are already dark become unreadable. Err 20% brighter than your instinct.

STYLE REFERENCES
Cinematic realism in the tradition of Roger Deakins, Janusz Kaminski, or Robert Richardson. Photorealistic. Shot on 35mm film, slight grain, no digital sheen. No motion blur. No HDR. No text or graphic elements anywhere in the frame.

FILE NAMING AFTER GENERATION
Save the source PNG as [scenario_id]_source.png. Downstream processing produces [scenario_id]_wide.jpg (1600x900, 16:9) and [scenario_id]_short.jpg (1800x493, 3.65:1).

---
SCENARIO-SPECIFIC SCENE DESCRIPTION
`;

      <input type="file" id="img-artwork-file-input" accept="image/jpeg,image/png,image/webp" style="display:none">
    </div>

    <div id="img-artwork-processing" class="img-artwork-processing" style="display:none">
      <span>⏳</span><span>Processing artwork…</span>
    </div>

    <div id="img-artwork-has-images" style="display:none">
      <div class="img-previews-row">
        <div>
          <div class="img-prompt-label" style="margin-bottom:4px">Wide (1600×900)</div>
          <img id="img-preview-wide" class="img-preview-thumb" src="" alt="Wide preview">
        </div>
        <div>
          <div class="img-prompt-label" style="margin-bottom:4px">Short (1800×493)</div>
          <img id="img-preview-short" class="img-preview-thumb" src="" alt="Short preview">
        </div>
        <div>
          <div class="img-prompt-label" style="margin-bottom:4px">Source</div>
          <a id="img-preview-source-link" href="#" target="_blank" rel="noopener">
            <img id="img-preview-source" src="" alt="Source image" style="width:200px;height:auto;display:block;border-radius:4px">
          </a>
        </div>
      </div>
      <div>
        <div class="img-prompt-label" style="margin-bottom:2px">Crop position — short banner</div>
        <input type="range" id="img-crop-anchor" min="0" max="100" value="50" class="img-crop-slider">
        <div class="img-crop-labels"><span>Top</span><span>Bottom</span></div>
      </div>
      <div>
        <div class="img-prompt-label" style="margin-bottom:2px">Brightness &nbsp;<span id="img-brightness-value" style="font-weight:normal;color:var(--text-soft)">100%</span></div>
        <input type="range" id="img-brightness" min="50" max="150" value="100" step="5" class="img-crop-slider">
        <div class="img-crop-labels"><span>Darker</span><span>Brighter</span></div>
      </div>
      <div class="img-artwork-actions">
        <button class="btn-img-delete" type="button" id="btn-img-delete">Delete images</button>
        <label class="btn-img-replace">Replace
          <input type="file" id="img-artwork-replace-input" accept="image/jpeg,image/png,image/webp" style="display:none">
        </label>
      </div>
    </div>

    <div id="img-artwork-status" class="img-artwork-status"></div>
  </div>
</div>`;
}

function toggleImgPromptStudio() {
  const body    = document.getElementById('img-prompt-studio-body');
  const chevron = document.getElementById('img-prompt-studio-chevron');
  const open    = body.style.display === 'none';
  body.style.display  = open ? 'block' : 'none';
  chevron.textContent = open ? '▲' : '▼';
}

function toggleMasterSpec() {
  const pre    = document.getElementById('img-prompt-master-spec-text');
  const toggle = document.querySelector('.img-prompt-toggle');
  const open   = pre.style.display === 'none';
  pre.style.display  = open ? 'block' : 'none';
  pre.textContent    = open ? MASTER_IMAGE_SPEC : '';
  toggle.textContent = open ? 'hide ▲' : 'show ▼';
}

async function generateImgPromptDraft() {
  const btn      = document.getElementById('btn-generate-draft');
  const status   = document.getElementById('img-prompt-status');
  const textarea = document.getElementById('img-prompt-scene-desc');
  const scenarioId = _imgPromptScenarioId;
  if (!scenarioId) { status.textContent = 'No scenario selected.'; return; }

  btn.disabled    = true;
  btn.textContent = '⏳ Generating…';
  status.textContent = '';

  try {
    const resp = await fetch(`${API}/scenarios/${scenarioId}/generate-image-prompt`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.detail || data.error);
    textarea.value        = data.draft;
    status.textContent    = '✓ Draft generated. Edit as needed, then save.';
    status.style.color    = 'var(--success)';
  } catch (err) {
    status.textContent = '✗ Generation failed: ' + err.message;
    status.style.color = 'var(--danger)';
  } finally {
    btn.disabled    = false;
    btn.textContent = '✦ Generate draft';
  }
}

async function saveImgPromptDraft() {
  const btn      = document.getElementById('btn-save-draft');
  const status   = document.getElementById('img-prompt-status');
  const textarea = document.getElementById('img-prompt-scene-desc');
  const scenarioId = _imgPromptScenarioId;
  if (!scenarioId) { status.textContent = 'No scenario selected.'; return; }

  btn.disabled    = true;
  btn.textContent = '⏳ Saving…';

  try {
    const resp = await fetch(`${API}/scenarios/${scenarioId}/image-prompt`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ generation_prompt: textarea.value }),
    });
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Save failed');
    status.textContent = '✓ Draft saved.';
    status.style.color = 'var(--success)';
  } catch (err) {
    status.textContent = '✗ Save failed: ' + err.message;
    status.style.color = 'var(--danger)';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save draft';
  }
}

function copyImgPrompt() {
  const textarea = document.getElementById('img-prompt-scene-desc');
  const status   = document.getElementById('img-prompt-status');
  const sceneDesc = textarea.value.trim();
  if (!sceneDesc) {
    status.textContent = '✗ Scene description is empty. Generate or write a draft first.';
    status.style.color = 'var(--danger)';
    return;
  }
  const combined = MASTER_IMAGE_SPEC + sceneDesc;
  navigator.clipboard.writeText(combined).then(() => {
    status.textContent = '✓ Full prompt copied to clipboard. Paste into ChatGPT.';
    status.style.color = 'var(--success)';
  }).catch(() => {
    status.textContent = '✗ Clipboard write failed. Try copying from the text area manually.';
    status.style.color = 'var(--danger)';
  });
}

function renderPreview(data, autoSaved = false) {
  const { scenario = {}, storyArc, characters = [], locations = [], clues = [], playerRoles = [] } = data;
  const scenarioId = scenario.id || scenario.scenario_id || '';
  _imgPromptScenarioId = scenarioId;

  setTopbar(scenario.title || 'Generated Story', [
    { label: '▶ Play',        cls: 'btn-success',   action: () => { const id = document.querySelector('[data-path="scenario.id"]')?.value || scenarioId; window.open(`/game?scenarioId=${encodeURIComponent(id)}`, '_blank'); } },
    { label: '💾 Save',       cls: 'btn-primary',   action: () => handleManualSave(data, document.getElementById('preview-form')) },
    { label: '⎘ Copy',             cls: 'btn-secondary', action: (e) => copyScenarioDoc(data, e.currentTarget) },
    { label: '⎘ Copy + AI Prompt', cls: 'btn-secondary', action: (e) => copyScenarioDocWithPrompt(data, e.currentTarget) },
    { label: '+ New Story',            cls: 'btn-secondary', action: () => renderGenerator() },
  ]);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector('.nav-link[data-view="generate"]')?.classList.add('active');

  const pillHtml = autoSaved
    ? `<span class="saved-pill ok"   id="save-status-pill">✓ Saved</span>`
    : `<span class="saved-pill warn" id="save-status-pill">⚠ Not saved</span>`;

  document.getElementById('content').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:18px;font-weight:700">${esc(scenario.title || 'Untitled')}</span>
          ${pillHtml}
        </div>
        <div style="font-size:12px;color:var(--text-soft);font-family:monospace">${esc(scenarioId)}</div>
      </div>
      <div style="display:flex;gap:16px;font-size:13px;color:var(--text-soft)">
        <span>${characters.length} characters</span>
        <span>${locations.length} locations</span>
        <span>${clues.length} clues</span>
        <span>${playerRoles.length} roles</span>
      </div>
    </div>
    <div id="preview-form" style="max-width:860px">
      ${renderScenarioSection(data)}
      ${storyArc ? renderArcSection(data) : ''}
      ${renderCharactersSection(data)}
      ${renderLocationsSection(data)}
      ${renderCluesSection(data)}
      ${renderPlayerRolesSection(data)}
      <div id="char-declarations-mount"></div>
      ${renderNameCascadeSection(scenarioId || '')}
      ${renderPublicationReview(data)}
      ${(data.scenario?.beats_status || 'not_generated') !== 'approved'
        ? `<div id="approval-warn" style="margin-bottom:12px;padding:10px 14px;background:#fef3c7;border:1px solid #d97706;border-radius:6px;font-size:13px;color:#92400e">This scenario has not been reviewer-approved. It can be saved but not published.</div>`
        : ''}
      ${renderGlossarySection(data)}
      ${renderTechnicalFactsSection(data)}
      ${renderEpilogueSection(data)}
      ${renderImgPromptStudio(data)}
      ${renderSourceNarrativeSection(data)}
      <div class="form-actions" style="padding-bottom:32px">
        <button class="btn btn-success"   id="preview-play">▶ Play Now</button>
        <button class="btn btn-primary"   id="preview-save">💾 Save</button>
        <button class="btn btn-secondary" id="preview-restart">+ New Story</button>
      </div>
    </div>`;

  if (scenarioId) {
    window._aiPanelData = data;   // section picker splices per-section data from this
    document.getElementById('content').insertAdjacentHTML('beforeend', buildAIPanel(scenarioId));
    initAIPanel(scenarioId);
    initGlossarySection(scenarioId);
    const declMount = document.getElementById('char-declarations-mount');
    if (declMount) renderCharacterDeclarationsSection(scenarioId, declMount);

    // ── Name Cascade ──────────────────────────────────────────────
    document.getElementById('nc-search-btn')?.addEventListener('click', async () => {
      const oldName = document.getElementById('nc-old-name')?.value?.trim();
      if (!oldName) { toast('Enter a name to search for', 'warn'); return; }
      const resultsEl = document.getElementById('nc-results');
      const applyBtn  = document.getElementById('nc-apply-btn');
      resultsEl.textContent = 'Searching…';
      resultsEl.style.display = 'block';
      applyBtn.style.display  = 'none';
      try {
        const data = await apiGet(`/scenarios/${encodeURIComponent(scenarioId)}/name-search?oldName=${encodeURIComponent(oldName)}`);
        if (!data.results?.length) {
          resultsEl.textContent = `No occurrences of "${oldName}" found.`;
          return;
        }
        const lines = [`Found ${data.totalHits} occurrence(s) in ${data.fileCount} file(s):\n`];
        for (const r of data.results) {
          lines.push(`── ${r.file}`);
          for (const h of r.hits) {
            lines.push(`   [L${h.lineNumber}] ${h.text}`);
          }
          lines.push('');
        }
        resultsEl.textContent = lines.join('\n');
        applyBtn.style.display = 'inline-flex';
      } catch (err) {
        resultsEl.textContent = `Error: ${err.message}`;
      }
    });

    document.getElementById('nc-apply-btn')?.addEventListener('click', async () => {
      const oldName = document.getElementById('nc-old-name')?.value?.trim();
      const newName = document.getElementById('nc-new-name')?.value?.trim();
      if (!oldName || !newName) { toast('Both names required', 'warn'); return; }
      if (!confirm(`Replace all occurrences of "${oldName}" with "${newName}" in every file linked to this scenario?\n\nThis cannot be undone.`)) return;
      try {
        const data = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/name-cascade`, { oldName, newName });
        const lines = [`Replaced "${oldName}" → "${newName}"\n${data.totalReplacements} replacement(s) in ${data.filesChanged} file(s):\n`];
        for (const r of data.report) {
          if (r.error) lines.push(`  ✗ ${r.file}: ${r.error}`);
          else lines.push(`  ✓ ${r.file}: ${r.replacements} replacement(s)`);
        }
        document.getElementById('nc-results').textContent = lines.join('\n');
        document.getElementById('nc-apply-btn').style.display = 'none';
        toast(`Replaced "${oldName}" → "${newName}" (${data.totalReplacements} occurrences)`, 'success');
      } catch (err) {
        toast(`Error: ${err.message}`, 'error');
      }
    });
  }

  const formEl = document.getElementById('preview-form');

  // ── Image Artwork section ─────────────────────────────────────────────────
  {
    const artScenarioId = scenarioId;
    const uploadZone   = document.getElementById('img-artwork-upload-zone');
    const processingEl = document.getElementById('img-artwork-processing');
    const hasImagesEl  = document.getElementById('img-artwork-has-images');
    const artStatusEl  = document.getElementById('img-artwork-status');
    const wideImg      = document.getElementById('img-preview-wide');
    const shortImg     = document.getElementById('img-preview-short');
    const sourceImg    = document.getElementById('img-preview-source');
    const sourceLink   = document.getElementById('img-preview-source-link');
    const cropSlider      = document.getElementById('img-crop-anchor');
    const brightnessSlider = document.getElementById('img-brightness');
    const brightnessValueEl = document.getElementById('img-brightness-value');
    const fileInput    = document.getElementById('img-artwork-file-input');
    const replaceInput = document.getElementById('img-artwork-replace-input');

    function showArtState(state) {
      uploadZone.style.display   = state === 'upload'     ? 'block' : 'none';
      processingEl.style.display = state === 'processing' ? 'flex'  : 'none';
      hasImagesEl.style.display  = state === 'images'     ? 'block' : 'none';
    }
    function setArtStatus(msg, type = '') {
      if (!artStatusEl) return;
      artStatusEl.textContent = msg;
      artStatusEl.style.color = type === 'error' ? 'var(--danger,#dc2626)' : type === 'success' ? 'var(--success,#16a34a)' : 'var(--text-soft)';
    }
    function setArtPreviews(wide, short, source) {
      const ts = '?t=' + Date.now();
      if (wideImg)  wideImg.src  = wide  + ts;
      if (shortImg) shortImg.src = short + ts;
      if (sourceImg && sourceLink && source) {
        sourceImg.src  = source + ts;
        sourceLink.href = source;
      }
    }

    // Set initial UI state
    if (data.scenario?.image?.url) {
      setArtPreviews(data.scenario.image.url, data.scenario.image.shortUrl || data.scenario.image.url, data.scenario.image.sourceUrl);
      if (cropSlider && data.scenario.image.cropAnchor != null) cropSlider.value = data.scenario.image.cropAnchor;
      const savedBrightness = data.scenario.image.brightness ?? 100;
      if (brightnessSlider) brightnessSlider.value = savedBrightness;
      if (brightnessValueEl) brightnessValueEl.textContent = savedBrightness + '%';
      showArtState('images');
    } else {
      showArtState('upload');
    }

    async function handleArtUpload(file) {
      if (!file) return;
      if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        setArtStatus('File must be JPEG, PNG, or WebP.', 'error'); return;
      }
      showArtState('processing');
      setArtStatus('');
      const fd = new FormData();
      fd.append('image', file);
      fd.append('cropAnchor', cropSlider?.value ?? '50');
      try {
        const resp = await fetch(`${API}/scenarios/${encodeURIComponent(artScenarioId)}/image-upload`, { method: 'POST', body: fd });
        const result = await resp.json();
        if (result.error) throw new Error(result.detail || result.error);
        data.scenario = data.scenario || {};
        data.scenario.image = { ...(data.scenario.image || {}), url: result.wide, shortUrl: result.short, sourceUrl: result.source };
        setArtPreviews(result.wide, result.short, result.source);
        showArtState('images');
        setArtStatus('Images saved.', 'success');
      } catch (err) {
        showArtState(data.scenario?.image?.url ? 'images' : 'upload');
        setArtStatus('Upload failed: ' + err.message, 'error');
      }
    }

    fileInput?.addEventListener('change',  e => { handleArtUpload(e.target.files[0]); e.target.value = ''; });
    replaceInput?.addEventListener('change', e => { handleArtUpload(e.target.files[0]); e.target.value = ''; });

    uploadZone?.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone?.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone?.addEventListener('drop', e => {
      e.preventDefault(); uploadZone.classList.remove('drag-over');
      handleArtUpload(e.dataTransfer.files[0]);
    });

    formEl.addEventListener('click', e => {
      if (e.target.closest('.btn-img-pick')) { fileInput?.click(); }
    });

    formEl.addEventListener('click', async e => {
      if (!e.target.closest('#btn-img-delete')) return;
      if (!confirm('Delete all images for this scenario? This cannot be undone.')) return;
      setArtStatus('Deleting…');
      try {
        const resp = await fetch(`${API}/scenarios/${encodeURIComponent(artScenarioId)}/image`, { method: 'DELETE' });
        const result = await resp.json();
        if (result.error) throw new Error(result.error);
        data.scenario = data.scenario || {};
        data.scenario.image = {};
        if (wideImg)  wideImg.src  = '';
        if (shortImg) shortImg.src = '';
        showArtState('upload');
        setArtStatus('Images deleted.', 'success');
      } catch (err) {
        setArtStatus('Delete failed: ' + err.message, 'error');
      }
    });

    let _recropTimer;
    cropSlider?.addEventListener('input', () => {
      clearTimeout(_recropTimer);
      _recropTimer = setTimeout(async () => {
        if (!data.scenario?.image?.sourceUrl) return;
        const anchor = parseInt(cropSlider.value, 10);
        if (shortImg) shortImg.style.opacity = '0.5';
        setArtStatus('Re-cropping…');
        try {
          const resp = await fetch(`${API}/scenarios/${encodeURIComponent(artScenarioId)}/image-recrop`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cropAnchor: anchor }),
          });
          const result = await resp.json();
          if (result.error) throw new Error(result.detail || result.error);
          data.scenario.image.shortUrl = result.short;
          data.scenario.image.cropAnchor = anchor;
          if (shortImg) { shortImg.src = result.short + '?t=' + Date.now(); shortImg.style.opacity = '1'; }
          setArtStatus('Crop updated.', 'success');
        } catch (err) {
          if (shortImg) shortImg.style.opacity = '1';
          setArtStatus('Recrop failed: ' + err.message, 'error');
        }
      }, 500);
    });

    brightnessSlider?.addEventListener('input', () => {
      if (brightnessValueEl) brightnessValueEl.textContent = brightnessSlider.value + '%';
    });

    let _brightnessTimer;
    brightnessSlider?.addEventListener('input', () => {
      clearTimeout(_brightnessTimer);
      _brightnessTimer = setTimeout(async () => {
        if (!data.scenario?.image?.sourceUrl) return;
        const brightnessVal = parseInt(brightnessSlider.value, 10);
        const cropAnchor    = parseInt(cropSlider?.value ?? '50', 10);
        if (wideImg)  wideImg.style.opacity  = '0.5';
        if (shortImg) shortImg.style.opacity = '0.5';
        setArtStatus('Adjusting brightness…');
        try {
          const resp = await fetch(`${API}/scenarios/${encodeURIComponent(artScenarioId)}/image-reprocess`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ brightness: brightnessVal, cropAnchor }),
          });
          const result = await resp.json();
          if (result.error) throw new Error(result.detail || result.error);
          data.scenario.image.url        = result.wide;
          data.scenario.image.shortUrl   = result.short;
          data.scenario.image.brightness = brightnessVal;
          if (wideImg)  { wideImg.src  = result.wide  + '?t=' + Date.now(); wideImg.style.opacity  = '1'; }
          if (shortImg) { shortImg.src = result.short + '?t=' + Date.now(); shortImg.style.opacity = '1'; }
          setArtStatus('Brightness updated.', 'success');
        } catch (err) {
          if (wideImg)  wideImg.style.opacity  = '1';
          if (shortImg) shortImg.style.opacity = '1';
          setArtStatus('Brightness update failed: ' + err.message, 'error');
        }
      }, 500);
    });
  }

  document.getElementById('preview-play').addEventListener('click', () => {
    const id = formEl.querySelector('[data-path="scenario.id"]')?.value || scenarioId;
    window.open(`/game?scenarioId=${encodeURIComponent(id)}`, '_blank');
  });
  document.getElementById('preview-save').addEventListener('click',
    () => handleManualSave(data, formEl));
  document.getElementById('preview-restart').addEventListener('click',
    () => renderGenerator());

  // ── Bridge Sentence — generate draft ───────────────────────────
  formEl.addEventListener('click', async e => {
    const btn = e.target.closest('.generate-bridge-btn');
    if (!btn) return;
    const roleId    = btn.dataset.roleId;
    const roleIndex = btn.dataset.roleIndex;
    if (!roleId || !scenarioId) return;
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    try {
      const result = await apiPost(`/scenarios/${encodeURIComponent(scenarioId)}/roles/${encodeURIComponent(roleId)}/generate-bridge-sentence`, {});
      // Write the draft value into the input field
      const input = formEl.querySelector(`[data-path="playerRoles.${roleIndex}.bridge_sentence"]`);
      if (input) {
        input.value = result.bridge_sentence;
        input.dispatchEvent(new Event('input'));
      }
      toast('Bridge sentence draft generated — review before saving', 'warn');
    } catch (err) {
      toast(`Error: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  });

  // ── Generate Premise ───────────────────────────────────────────
  formEl.addEventListener('click', async e => {
    if (!e.target.closest('#gen-premise-btn')) return;
    const btn = e.target.closest('#gen-premise-btn');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    try {
      const title       = formEl.querySelector('[data-path="scenario.title"]')?.value.trim()       || '';
      const description = formEl.querySelector('[data-path="scenario.description"]')?.value.trim() || '';
      const world       = formEl.querySelector('[data-path="storyArc.premise"]')?.value.trim()     || '';
      const stakes      = formEl.querySelector('[data-path="storyArc.goal"]')?.value.trim()        || '';
      const result = await apiPost('/generate/premise', { title, description, world, stakes });
      const textarea = formEl.querySelector('[data-path="scenario.premise"]');
      if (textarea) {
        textarea.value = result.premise;
        textarea.dispatchEvent(new Event('input'));
      }
      toast('Premise generated — review and edit before saving.', 'warn');
    } catch (err) {
      toast(`Premise generation failed: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = originalText;
    }
  });

  // ── Beat count indicator ────────────────────────────────────────
  function updateBeatCount() {
    const filled = [...formEl.querySelectorAll('.beat-desc')].filter(el => el.value.trim()).length;
    const color  = filled < 3 ? 'var(--warn)' : filled > 6 ? 'var(--danger)' : 'var(--success)';
    const ind = document.getElementById('beat-count-indicator');
    if (ind) ind.innerHTML = `<span style="color:${color};font-weight:600">Total beats: ${filled}</span> <span style="color:var(--text-soft)">/ target 3–6</span>`;
  }

  // ── Status display updater ──────────────────────────────────────
  function updateStatusDisplay(newStatus) {
    const cfg = {
      not_generated:  { label: 'Not Generated',             color: 'var(--text-soft)', bg: '#f1f5f9' },
      pending_review: { label: 'Generated — Pending Review', color: '#92400e',          bg: '#fef3c7' },
      approved:       { label: 'Reviewer Approved',          color: '#166534',          bg: '#f0fdf4' },
    };
    const s = cfg[newStatus] || cfg.not_generated;
    const badge = formEl.querySelector('#beats-status-badge');
    if (badge) { badge.style.background = s.bg; badge.style.color = s.color; badge.textContent = s.label; }
    const appBtn = formEl.querySelector('#mark-approved-btn');
    if (appBtn) appBtn.disabled = newStatus !== 'pending_review';
    if (newStatus === 'approved') {

        .map(el => el.value.trim()).filter(Boolean);

      genBeatsBtn.disabled = true;
      genBeatsBtn.textContent = 'Generating…';
      try {
        const beats = await apiPost('/generate/essential-beats', { title, premise, world, stakes, briefings });
        if (!Array.isArray(beats)) throw new Error('Unexpected response shape');

        // Clear all act repeaters then populate into Act 1
        formEl.querySelectorAll('[data-beat-list]').forEach(w => { w.innerHTML = ''; });
        const act0 = formEl.querySelector('[data-beat-list="0"]');
        if (act0) {
          beats.forEach(beat => {
            const div = document.createElement('div');
            div.innerHTML = buildBeatRow(beat, 0);
            act0.appendChild(div.firstElementChild);
          });
        }
        updateBeatCount();
        updateStatusDisplay('pending_review');
        toast('Essential beats generated. Review and approve before publishing.', 'success');
      } catch (err) {
        toast(`Beat generation failed: ${err.message}`, 'error');
      } finally {
        genBeatsBtn.disabled = false;
        genBeatsBtn.textContent = '✦ Generate Essential Beats';
      }
    });
  }
}

    return;
  }

  const badge = document.getElementById('badge-transcripts');

        <p>No transcripts yet.</p>
        <p style="font-size:13px">Transcripts are recorded automatically when you play a session from start to finish.</p>
      </div>`;
    return;
  }

  const resultBadge = r => {
    if (r === 'in-progress') return `<span class="tag" style="background:#fef3c7;color:#92400e">In progress</span>`;
    if (r.includes('success')) return `<span class="tag" style="background:#f0fdf4;color:#166534">Success</span>`;
    return `<span class="tag" style="background:#fef2f2;color:#991b1b">${r}</span>`;
  };

  const rows = items.map(t => {
    const dateStr = t.started ? new Date(t.started).toLocaleString() : '—';
    const kb = t.size ? `${(t.size / 1024).toFixed(1)} KB` : '—';
    return `<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text-soft)">${t.id.slice(0, 8)}…</td>
      <td>${esc(t.scenario)}</td>
      <td>${esc(t.character)}</td>
      <td>${dateStr}</td>
      <td style="text-align:center">${t.turns}</td>
      <td>${resultBadge(t.result)}</td>
      <td style="text-align:right;white-space:nowrap;color:var(--text-soft);font-size:12px">${kb}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-secondary btn-sm" style="margin-right:6px" onclick="copyTranscript(this,'${t.id}')">⎘ Copy</button>
        <button class="btn btn-danger btn-sm" data-delete-transcript="${t.id}">Delete</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:#f8fafc;border-bottom:1px solid var(--border)">
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Session</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Scenario</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Character</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Started</th>
            <th style="padding:10px 14px;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Turns</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Result</th>
            <th style="padding:10px 14px;text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-soft)">Size</th>
            <th style="padding:10px 14px"></th>
          </tr>
        </thead>
        <tbody id="transcript-tbody">
          ${rows}
        </tbody>
      </table>
    </div>`;

  document.getElementById('transcript-tbody').addEventListener('click', async e => {
    const btn = e.target.closest('[data-delete-transcript]');
    if (!btn) return;
    const id   = btn.dataset.deleteTranscript;
    const name = `transcript-${id.slice(0, 8)}…`;
    document.getElementById('modal-title').textContent = 'Delete Transcript';
    document.getElementById('modal-body').textContent  = `Delete ${name}? This cannot be undone.`;
    document.getElementById('modal-overlay').classList.remove('hidden');

    const onConfirm = async () => {
      cleanup();
      try {
        await apiDelete(`/transcripts/${id}`);
        toast('Transcript deleted.', 'success');
        renderTranscripts();
      } catch (err) { toast(err.message, 'error'); }
    };
    const cleanup = () => {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-confirm').removeEventListener('click', onConfirm);
      document.getElementById('modal-cancel').removeEventListener('click', cleanup);
    };
    document.getElementById('modal-confirm').addEventListener('click', onConfirm);
    document.getElementById('modal-cancel').addEventListener('click', cleanup);
  });
}
